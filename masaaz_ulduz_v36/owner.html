function getWACreds(){
  return{inst:localStorage.getItem("wa_instance")||"",tok:localStorage.getItem("wa_token")||""};
}
async function sendWA(phone,message){
  const{inst,tok}=getWACreds();
  if(!inst||!tok)return;
  try{
    let num=(phone||"").replace(/[\s\-\(\)]/g,"");
    if(num.startsWith("+"))num=num.slice(1);
    if(num.startsWith("0"))num="994"+num.slice(1);
    if(!num.startsWith("994"))num="994"+num;
    await fetch(`https://api.green-api.com/waInstance${inst}/sendMessage/${tok}`,
      {method:"POST",headers:{"Content-Type":"application/json"},
       body:JSON.stringify({chatId:num+"@c.us",message})});
  }catch(e){console.warn("WA:",e.message);}
}

// ── ABUNƏLİK HELPERLƏRİ ──────────────────────────────────
function subActive(s){
  if(!s) return false;
  if(s.status==="active" && new Date(s.expires_at)>new Date()) return true;
  if(s.status==="trial"  && new Date(s.trial_ends_at)>new Date()) return true;
  return false;
}
function subDaysLeft(s){
  const d = s?.status==="active" ? s.expires_at : s?.trial_ends_at;
  return d ? Math.ceil((new Date(d)-new Date())/864e5) : 0;
}
function subLabel(s){
  if(!s) return {t:"Yoxdur",c:"#EF4444",bg:"#FEF2F2",bd:"#FECACA"};
  if(s.status==="active"&&subActive(s)) return {t:"Aktiv ✅",c:"#16A34A",bg:"#F0FDF4",bd:"#86EFAC"};
  if(s.status==="trial"&&subActive(s))  return {t:"Trial 🕐",c:"#D97706",bg:"#FFFBEB",bd:"#FDE68A"};
  return {t:"Bitmişdir ❌",c:"#DC2626",bg:"#FEF2F2",bd:"#FECACA"};
}

// ── AUTH HELPERLƏRİ ────────────────────────────────────────
const AUTH_KEY = "masaaz_owner_session";
function getSession(){
  try{
    const s = localStorage.getItem(AUTH_KEY);
    if(!s) return null;
    const parsed = JSON.parse(s);
    if(parsed.expires && Date.now() > parsed.expires) {
      localStorage.removeItem(AUTH_KEY);
      return null;
    }
    return parsed;
  } catch(e){ return null; }
}
function saveSession(admin){
  const session = {
    ...admin,
    expires: Date.now() + 30 * 24 * 60 * 60 * 1000 // 30 gün
  };
  localStorage.setItem(AUTH_KEY, JSON.stringify(session));
}
function clearSession(){
  localStorage.removeItem(AUTH_KEY);
}

let _audioCtx=null;
function getAudioCtx(){
  if(!_audioCtx){try{_audioCtx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}}
  if(_audioCtx&&_audioCtx.state==="suspended")_audioCtx.resume();
  return _audioCtx;
}
document.addEventListener("click",()=>getAudioCtx(),{once:true});
function playSound(){
  try{
    const ctx=getAudioCtx();if(!ctx)return;
    [[523,0,.18],[659,.2,.18],[784,.4,.3]].forEach(([f,w,d])=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);o.type="triangle";o.frequency.value=f;
      g.gain.setValueAtTime(0,ctx.currentTime+w);
      g.gain.linearRampToValueAtTime(.55,ctx.currentTime+w+.04);
      g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+w+d);
      o.start(ctx.currentTime+w);o.stop(ctx.currentTime+w+d+.05);
    });
  }catch(e){}
}

async function uploadImg(file){
  const ext=file.name.split(".").pop();
  const name=`${Date.now()}.${ext}`;
  const {error}=await sb.storage.from("table-images").upload(name,file,{upsert:true});
  if(error)return{url:null,error};
  const {data}=sb.storage.from("table-images").getPublicUrl(name);
  return{url:data.publicUrl,error:null};
}

function TableCanvas({tables,onPositionSave}){
  const canvasRef=useRef();
  const dragging=useRef(null);
  const [positions,setPositions]=useState(()=>{
    const m={};tables.forEach(t=>{m[t.id]={x:t.x||10,y:t.y||10};});return m;
  });
  const [dirty,setDirty]=useState({});

  useEffect(()=>{
    const m={};tables.forEach(t=>{m[t.id]={x:t.x||10,y:t.y||10};});
    setPositions(m);setDirty({});
  },[tables]);

  const onMouseDown=(e,id)=>{
    e.preventDefault();
    const canvas=canvasRef.current.getBoundingClientRect();
    dragging.current={id,startX:e.clientX,startY:e.clientY,origX:positions[id]?.x||10,origY:positions[id]?.y||10,canvas};
    document.getElementById(`tbl-${id}`)?.classList.add("dragging");
  };

  useEffect(()=>{
    const mv=e=>{
      if(!dragging.current)return;
      const{id,startX,startY,origX,origY,canvas}=dragging.current;
      const dx=(e.clientX-startX)/canvas.width*100;
      const dy=(e.clientY-startY)/canvas.height*100;
      setPositions(p=>({...p,[id]:{x:Math.max(0,Math.min(88,origX+dx)),y:Math.max(0,Math.min(82,origY+dy))}}));
    };
    const up=async()=>{
      if(!dragging.current)return;
      const{id,origX,origY}=dragging.current;
      const pos=positions;
      document.getElementById(`tbl-${id}`)?.classList.remove("dragging");
      const cur=pos[id]||{x:origX,y:origY};
      if(Math.abs(cur.x-origX)>0.5||Math.abs(cur.y-origY)>0.5){
        setDirty(p=>({...p,[id]:true}));
        await sb.from("tables").update({x:Math.round(cur.x*10)/10,y:Math.round(cur.y*10)/10}).eq("id",id);
        setDirty(p=>{const n={...p};delete n[id];return n;});
        onPositionSave&&onPositionSave();
      }
      dragging.current=null;
    };
    window.addEventListener("mousemove",mv);
    window.addEventListener("mouseup",up);
    return()=>{window.removeEventListener("mousemove",mv);window.removeEventListener("mouseup",up);};
  },[positions]);

  const shapes={
    round:<svg width="60" height="68" viewBox="0 0 68 76"><rect x="16" y="1" width="36" height="14" rx="7" fill="#E2E8F0" stroke="#CBD5E1" strokeWidth="1.2"/><rect x="16" y="61" width="36" height="14" rx="7" fill="#E2E8F0" stroke="#CBD5E1" strokeWidth="1.2"/><circle cx="34" cy="38" r="22" fill="#F1F5F9" stroke="#CBD5E1" strokeWidth="1.5"/></svg>,
    rect: <svg width="86" height="72" viewBox="0 0 96 82"><rect x="5" y="1" width="24" height="13" rx="6.5" fill="#E2E8F0" stroke="#CBD5E1" strokeWidth="1.2"/><rect x="67" y="1" width="24" height="13" rx="6.5" fill="#E2E8F0" stroke="#CBD5E1" strokeWidth="1.2"/><rect x="5" y="68" width="24" height="13" rx="6.5" fill="#E2E8F0" stroke="#CBD5E1" strokeWidth="1.2"/><rect x="67" y="68" width="24" height="13" rx="6.5" fill="#E2E8F0" stroke="#CBD5E1" strokeWidth="1.2"/><rect x="3" y="16" width="90" height="50" rx="8" fill="#F1F5F9" stroke="#CBD5E1" strokeWidth="1.5"/></svg>,
    rect6:<svg width="104" height="72" viewBox="0 0 114 82">{[4,45,86].map((x,i)=><rect key={i} x={x} y="1" width="24" height="13" rx="6.5" fill="#E2E8F0" stroke="#CBD5E1" strokeWidth="1.2"/>)}{[4,45,86].map((x,i)=><rect key={i} x={x} y="68" width="24" height="13" rx="6.5" fill="#E2E8F0" stroke="#CBD5E1" strokeWidth="1.2"/>)}<rect x="3" y="16" width="108" height="50" rx="8" fill="#F1F5F9" stroke="#CBD5E1" strokeWidth="1.5"/></svg>,
    vip:  <svg width="130" height="78" viewBox="0 0 150 88">{[4,43,82,121].map((x,i)=><rect key={i} x={x} y="1" width="24" height="13" rx="6.5" fill="#FEF3C7" stroke="#FDE68A" strokeWidth="1.2"/>)}{[4,43,82,121].map((x,i)=><rect key={i} x={x} y="74" width="24" height="13" rx="6.5" fill="#FEF3C7" stroke="#FDE68A" strokeWidth="1.2"/>)}<rect x="3" y="16" width="144" height="56" rx="10" fill="#FFFDF5" stroke="#FDE68A" strokeWidth="1.5"/></svg>,
  };

  return(
    <div>
      <div ref={canvasRef} style={{position:"relative",width:"100%",height:"420px",background:"linear-gradient(135deg,#F8FAFC,#F1F5F9)",borderRadius:"10px",border:"1px solid #E2E8F0",overflow:"hidden"}}>
        <svg style={{position:"absolute",inset:0,width:"100%",height:"100%",pointerEvents:"none",opacity:.3}}>
          {[10,20,30,40,50,60,70,80,90].map(p=><line key={`v${p}`} x1={`${p}%`} y1="0" x2={`${p}%`} y2="100%" stroke="#CBD5E1" strokeWidth=".5" strokeDasharray="4,4"/>)}
          {[10,20,30,40,50,60,70,80,90].map(p=><line key={`h${p}`} x1="0" y1={`${p}%`} x2="100%" y2={`${p}%`} stroke="#CBD5E1" strokeWidth=".5" strokeDasharray="4,4"/>)}
        </svg>
        {tables.length===0&&(
          <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",color:"#94A3B8",flexDirection:"column",gap:".5rem"}}>
            <div style={{fontSize:"2rem"}}>🪑</div><div style={{fontSize:".85rem"}}>Masa yoxdur. "İdarəetmə"-dən əlavə edin.</div>
          </div>
        )}
        {tables.map(t=>{
          const pos=positions[t.id]||{x:t.x||10,y:t.y||10};
          return(
            <div key={t.id} id={`tbl-${t.id}`} className="tbl-canvas-item" style={{left:`${pos.x}%`,top:`${pos.y}%`}} onMouseDown={e=>onMouseDown(e,t.id)}>
              <div style={{position:"relative"}}>
                {shapes[t.shape]||shapes.rect}
                <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",pointerEvents:"none"}}>
                  <div style={{fontWeight:700,fontSize:".75rem",color:"#475569"}}>{t.label}</div>
                  <div style={{fontSize:".58rem",color:"#94A3B8"}}>{t.seats}nf</div>
                </div>
                {dirty[t.id]&&<div style={{position:"absolute",top:"-8px",right:"-8px"}}><Spin s={12}/></div>}
                {t.img_url&&<img src={t.img_url} alt="" style={{position:"absolute",bottom:"-24px",left:"50%",transform:"translateX(-50%)",width:"36px",height:"26px",borderRadius:"4px",objectFit:"cover",border:"1.5px solid #fff",boxShadow:"0 2px 6px rgba(0,0,0,.15)"}}/>}
              </div>
            </div>
          );
        })}
      </div>
      <div style={{fontSize:".68rem",color:"#94A3B8",marginTop:".5rem",textAlign:"center"}}>💡 Masaları sürükləyib mövqe dəyişin — avtomatik saxlanır</div>
    </div>
  );
}

              <select style={inp} value={menuRest} onChange={e=>setMenuRest(e.target.value)}>
                <option value="">Restoran seç...</option>
                {myRestaurants.map(r=><option key={r.id} value={r.id}>{r.name}</option>)}
              </select>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:".8rem",marginBottom:".8rem"}}>
              <div style={{gridColumn:"1/-1"}}><label style={lbl}>Yeməyin adı *</label><input style={inp} value={mName} onChange={e=>setMN(e.target.value)} placeholder="Piti"/></div>
              <div style={{gridColumn:"1/-1"}}><label style={lbl}>Təsvir</label><input style={inp} value={mDesc} onChange={e=>setMD(e.target.value)} placeholder="Quzulu şorba, nar suyu ilə"/></div>
              <div><label style={lbl}>Qiymət (₼) *</label><input style={inp} type="number" min="0" step="0.5" value={mPrice} onChange={e=>setMP(e.target.value)} placeholder="18"/></div>
              <div><label style={lbl}>Kateqoriya</label><input style={inp} value={mCat} onChange={e=>setMC(e.target.value)} placeholder="Şorba"/></div>
              <div><label style={lbl}>Emoji</label><input style={inp} value={mEmoji} onChange={e=>setME(e.target.value)} placeholder="🍲"/></div>
            </div>
            <button className="btn" onClick={addMenuItem} disabled={menuSaving||!menuRest} style={{background:"#0a1f35",color:"#fff",border:"none",borderRadius:"8px",padding:".65rem 1.2rem",fontSize:".85rem",fontWeight:700,cursor:"pointer",width:"100%"}}>
              {menuSaving?"...":"+ Menyu əlavə et"}
            </button>
          </div>
          <div style={{background:"#fff",borderRadius:"14px",border:"1px solid #E2E8F0",overflow:"hidden"}}>
            <div style={{padding:"1rem 1.2rem",borderBottom:"1px solid #F1F5F9",fontWeight:700,fontSize:".95rem"}}>
              {menuRest?`${myRestaurants.find(r=>String(r.id)===menuRest)?.name||""} menyusu`:"Restoran seçin"}
              <span style={{marginLeft:".5rem",fontSize:".7rem",color:"#94A3B8",fontWeight:400}}>({menuItems.length} maddə)</span>
            </div>
            <div style={{maxHeight:"500px",overflowY:"auto"}}>
              {menuItems.length===0
                ?<div style={{padding:"2rem",textAlign:"center",color:"#94A3B8",fontSize:".85rem"}}>{menuRest?"Menyu boşdur":"Restoran seçin"}</div>
                :[...new Set(menuItems.map(i=>i.cat))].map(cat=>(
                  <div key={cat}>
                    <div style={{padding:".5rem 1.2rem",background:"#F8FAFC",fontSize:".65rem",fontWeight:700,letterSpacing:".08em",textTransform:"uppercase",color:"#94A3B8"}}>{cat}</div>
                    {menuItems.filter(i=>i.cat===cat).map(item=>(
                      <div key={item.id} style={{padding:".75rem 1.2rem",borderBottom:"1px solid #F8FAFC",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                        <div style={{display:"flex",alignItems:"center",gap:".7rem"}}>
                          <span style={{fontSize:"1.3rem"}}>{item.emoji||"🍽️"}</span>
                          <div><div style={{fontWeight:600,fontSize:".85rem"}}>{item.name}</div><div style={{fontSize:".7rem",color:"#94A3B8"}}>{item.desc} · {item.price}₼</div></div>
                        </div>
                        <button className="btn" onClick={()=>delMenuItem(item)} style={{background:"#FEF2F2",color:"#DC2626",border:"1px solid #FECACA",borderRadius:"6px",padding:".3rem .6rem",fontSize:".72rem",fontWeight:600,cursor:"pointer"}}>Sil</button>
                      </div>
                    ))}
                  </div>
                ))
              }
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// 📈 ANALİTİKA SƏHİFƏSİ
// ════════════════════════════════════════════════════════════
function AnalyticsPage({restaurants}){
  const [rows,setRows]=useState([]);
  const [allTables,setAllTbls]=useState([]);
  useEffect(()=>{
    Promise.all([
      sb.from("reservations").select("*"),
      sb.from("tables").select("*"),
    ]).then(([r1,r2])=>{setRows(r1.data||[]);setAllTbls(r2.data||[]);});
  },[]);
  const [period, setPeriod] = useState("7"); // days
  const [selRest, setSelRest] = useState("hamısı");

  const now = new Date();
  const days = parseInt(period);

  const inRange = (dateStr) => {
    const d = new Date(dateStr);
    const diff = (now - d) / (1000*60*60*24);
    return diff <= days;
  };

  const filtRows = rows.filter(r => {
    if(!inRange(r.date)) return false;
    if(selRest!=="hamısı" && r.restaurant_name!==selRest) return false;
    return r.status !== "ləğv edildi";
  });

  // Günlük rezervasiya sayı
  const dailyMap = {};
  for(let i=days-1; i>=0; i--){
    const d = new Date(now);
    d.setDate(d.getDate()-i);
    const key = d.toISOString().split("T")[0];
    dailyMap[key] = 0;
  }
  filtRows.forEach(r => { if(dailyMap[r.date]!==undefined) dailyMap[r.date]++; });
  const dailyData = Object.entries(dailyMap);
  const maxDay = Math.max(...Object.values(dailyMap), 1);

  // Saat analizi
  const hourMap = {};
  filtRows.forEach(r => { hourMap[r.time] = (hourMap[r.time]||0)+1; });
  const hourData = Object.entries(hourMap).sort((a,b)=>a[0].localeCompare(b[0]));
  const maxHour = Math.max(...Object.values(hourMap), 1);

  // Restoran payı
  const restMap = {};
  filtRows.forEach(r => { restMap[r.restaurant_name||"Digər"] = (restMap[r.restaurant_name||"Digər"]||0)+1; });
  const restData = Object.entries(restMap).sort((a,b)=>b[1]-a[1]);
  const totalRest = restData.reduce((s,[,v])=>s+v,0)||1;

  // Masa populyarlığı
  const tableMap = {};
  filtRows.forEach(r => { tableMap[r.table_label||"?"] = (tableMap[r.table_label||"?"]||0)+1; });
  const tableData = Object.entries(tableMap).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const maxTable = Math.max(...Object.values(tableMap),1);

  // Sadiq müştərilər
  const custMap = {};
  rows.filter(r=>r.status!=="ləğv edildi").forEach(r => {
    if(!r.phone) return;
    if(!custMap[r.phone]) custMap[r.phone] = {name:r.name, phone:r.phone, count:0, total:0, last:""};
    custMap[r.phone].count++;
    custMap[r.phone].total += r.pre_order_total||0;
    if(r.date > custMap[r.phone].last) custMap[r.phone].last = r.date;
  });
  const topCustomers = Object.values(custMap).sort((a,b)=>b.count-a.count).slice(0,5);

  // Ümumi statistika
  const totalRevenue = filtRows.reduce((s,r)=>s+(r.pre_order_total||0),0);
  const avgGuests = filtRows.length ? (filtRows.reduce((s,r)=>s+r.guests,0)/filtRows.length).toFixed(1) : 0;
  const cancelRate = rows.length ? Math.round(rows.filter(r=>r.status==="ləğv edildi").length/rows.length*100) : 0;

  // AI Tövsiyələri
  const aiTips = [];
  const peakHour = hourData.sort((a,b)=>b[1]-a[1])[0];
  if(peakHour) aiTips.push({icon:"⏰", tip:`"${peakHour[0]}" saatı ən sıx vaxtdır (${peakHour[1]} rezerv). Bu saatda əlavə personal lazım ola bilər.`, type:"info"});
  if(cancelRate > 20) aiTips.push({icon:"⚠️", tip:`Ləğvetmə faizi yüksəkdir: ${cancelRate}%. Müştərilərə xatırlatma göndərmək faydalı ola bilər.`, type:"warn"});
  if(topCustomers[0]?.count >= 3) aiTips.push({icon:"⭐", tip:`${topCustomers[0].name} ${topCustomers[0].count} dəfə gəlib — VIP müştəri kimi qeyd edin, endirim təklif edin!`, type:"success"});
  const quietHour = hourData.sort((a,b)=>a[1]-b[1])[0];
  if(quietHour) aiTips.push({icon:"💡", tip:`"${quietHour[0]}" saatında az rezerv var. Bu saatda kampaniya başlatsanız doluluk artacaq.`, type:"info"});
  const topTable = tableData[0];
  if(topTable) aiTips.push({icon:"🏆", tip:`Masa ${topTable[0]} ən çox seçilən masadır (${topTable[1]} dəfə). Onu premium zone kimi tanıtın!`, type:"success"});

  const colors = ["#12487a","#22C55E","#F59E0B","#EF4444","#8B5CF6","#06B6D4","#F97316","#EC4899"];

  return(
    <div>
      {/* Header */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end",marginBottom:"1.5rem",flexWrap:"wrap",gap:"1rem"}}>
        <div>
          <div style={{fontSize:"1.4rem",fontWeight:800,letterSpacing:"-.02em",marginBottom:".2rem"}}>📈 Analitika</div>
          <div style={{fontSize:".8rem",color:"#94A3B8"}}>Biznes göstəriciləri və AI tövsiyələri</div>
        </div>
        <div style={{display:"flex",gap:".6rem",flexWrap:"wrap"}}>
          <select value={selRest} onChange={e=>setSelRest(e.target.value)} style={{border:"1px solid #E2E8F0",borderRadius:"8px",padding:".45rem .8rem",fontSize:".82rem",outline:"none",background:"#fff"}}>
            <option value="hamısı">Bütün restoranlar</option>
            {restaurants.map(r=><option key={r.id} value={r.name}>{r.name}</option>)}
          </select>
          {["7","30","90"].map(d=>(
            <button key={d} onClick={()=>setPeriod(d)} style={{padding:".45rem .9rem",borderRadius:"8px",border:`1px solid ${period===d?"#12487a":"#E2E8F0"}`,background:period===d?"#e8f2fb":"#fff",color:period===d?"#1a5c8a":"#64748B",fontSize:".82rem",fontWeight:period===d?700:500,cursor:"pointer",fontFamily:"inherit"}}>
              {d} gün
            </button>
          ))}
        </div>
      </div>

      {/* KPI kartları */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(180px,1fr))",gap:"1rem",marginBottom:"1.5rem"}}>
        {[
          {icon:"📋",label:"Cəmi rezerv",val:filtRows.length,sub:`Son ${days} gün`,color:"#12487a"},
          {icon:"💰",label:"Ön sifariş gəliri",val:`${totalRevenue}₼`,sub:`Son ${days} gün`,color:"#16A34A"},
          {icon:"👥",label:"Orta qonaq",val:`${avgGuests} nf`,sub:"rezerv başına",color:"#8B5CF6"},
          {icon:"❌",label:"Ləğvetmə",val:`${cancelRate}%`,sub:"bütün vaxtlar",color:cancelRate>20?"#EF4444":"#64748B"},
          {icon:"🏆",label:"Ən aktiv masa",val:tableData[0]?`Masa ${tableData[0][0]}`:"—",sub:tableData[0]?`${tableData[0][1]} dəfə`:"məlumat yoxdur",color:"#F59E0B"},
        ].map(s=>(
          <div key={s.label} style={{background:"#fff",borderRadius:"12px",padding:"1.2rem",border:"1px solid #E2E8F0"}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:".7rem"}}>
              <div style={{fontSize:".65rem",fontWeight:600,letterSpacing:".08em",textTransform:"uppercase",color:"#94A3B8"}}>{s.label}</div>
              <div style={{fontSize:"1.2rem"}}>{s.icon}</div>
            </div>
            <div style={{fontSize:"1.8rem",fontWeight:800,color:s.color,letterSpacing:"-.02em",marginBottom:".2rem"}}>{s.val}</div>
            <div style={{fontSize:".7rem",color:"#94A3B8"}}>{s.sub}</div>
          </div>
        ))}
      </div>

      {/* AI TÖVSİYƏLƏRİ */}
      <div style={{background:"linear-gradient(135deg,#0a1f35,#1a4a6e)",borderRadius:"16px",padding:"1.4rem",marginBottom:"1.5rem"}}>
        <div style={{display:"flex",alignItems:"center",gap:".7rem",marginBottom:"1.2rem"}}>
          <div style={{width:"36px",height:"36px",borderRadius:"10px",background:"linear-gradient(135deg,#12487a,#8B5CF6)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"1.2rem"}}>🤖</div>
          <div>
            <div style={{fontWeight:800,fontSize:".95rem",color:"#fff"}}>AI Tövsiyələri</div>
            <div style={{fontSize:".7rem",color:"#64748B"}}>Məlumatlarınıza əsaslanan ağıllı təkliflər</div>
          </div>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:".7rem"}}>
          {aiTips.length===0&&<div style={{color:"#475569",fontSize:".85rem"}}>Tövsiyə üçün daha çox məlumat lazımdır</div>}
          {aiTips.map((t,i)=>(
            <div key={i} style={{background:t.type==="warn"?"rgba(245,158,11,.15)":t.type==="success"?"rgba(34,197,94,.15)":"rgba(59,130,246,.15)",borderRadius:"10px",padding:".8rem 1rem",display:"flex",gap:".7rem",alignItems:"flex-start",border:`1px solid ${t.type==="warn"?"rgba(245,158,11,.3)":t.type==="success"?"rgba(34,197,94,.3)":"rgba(59,130,246,.3)"}`}}>
              <span style={{fontSize:"1.1rem",flexShrink:0}}>{t.icon}</span>
              <span style={{fontSize:".82rem",color:"#E2E8F0",lineHeight:1.5}}>{t.tip}</span>
            </div>
          ))}
        </div>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"1.5rem",marginBottom:"1.5rem"}}>
        {/* Günlük qrafik */}
        <div style={{background:"#fff",borderRadius:"14px",border:"1px solid #E2E8F0",padding:"1.2rem"}}>
          <div style={{fontWeight:700,fontSize:".9rem",marginBottom:"1.2rem"}}>Günlük rezervasiyalar</div>
          <div style={{display:"flex",alignItems:"flex-end",gap:"4px",height:"140px"}}>
            {dailyData.map(([date,count])=>(
              <div key={date} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:"4px",height:"100%",justifyContent:"flex-end"}}>
                <div style={{fontSize:".55rem",color:"#94A3B8",fontWeight:600}}>{count||""}</div>
                <div style={{width:"100%",background:`linear-gradient(to top, #12487a, #78b4d4)`,borderRadius:"4px 4px 0 0",height:`${(count/maxDay)*100}%`,minHeight:count?"4px":"2px",opacity:count?1:.2,transition:"height .3s"}}/>
                <div style={{fontSize:".5rem",color:"#94A3B8",transform:"rotate(-45deg)",transformOrigin:"center",whiteSpace:"nowrap"}}>{date.slice(5)}</div>
              </div>
            ))}
          </div>
        </div>

        {/* Saat analizi */}
        <div style={{background:"#fff",borderRadius:"14px",border:"1px solid #E2E8F0",padding:"1.2rem"}}>
          <div style={{fontWeight:700,fontSize:".9rem",marginBottom:"1.2rem"}}>Populyar saatlar</div>
          {hourData.length===0&&<div style={{color:"#94A3B8",fontSize:".85rem",textAlign:"center",padding:"2rem"}}>Məlumat yoxdur</div>}
          <div style={{display:"flex",flexDirection:"column",gap:".5rem"}}>
            {hourData.sort((a,b)=>b[1]-a[1]).slice(0,6).map(([hour,count])=>(
              <div key={hour} style={{display:"flex",alignItems:"center",gap:".7rem"}}>
                <div style={{width:"48px",fontSize:".78rem",fontWeight:600,color:"#0a1f35",flexShrink:0}}>{hour}</div>
                <div style={{flex:1,background:"#F1F5F9",borderRadius:"20px",height:"10px",overflow:"hidden"}}>
                  <div style={{width:`${count/maxHour*100}%`,height:"100%",background:"linear-gradient(90deg,#12487a,#8B5CF6)",borderRadius:"20px",transition:"width .4s"}}/>
                </div>
                <div style={{width:"30px",fontSize:".75rem",color:"#64748B",textAlign:"right",flexShrink:0}}>{count}</div>
              </div>
            ))}
          </div>
        </div>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"1.5rem",marginBottom:"1.5rem"}}>
        {/* Restoran payı */}
        <div style={{background:"#fff",borderRadius:"14px",border:"1px solid #E2E8F0",padding:"1.2rem"}}>
          <div style={{fontWeight:700,fontSize:".9rem",marginBottom:"1.2rem"}}>Restoran payları</div>
          {restData.length===0&&<div style={{color:"#94A3B8",fontSize:".85rem",textAlign:"center",padding:"2rem"}}>Məlumat yoxdur</div>}
          <div style={{display:"flex",flexDirection:"column",gap:".7rem"}}>
            {restData.map(([name,count],i)=>(
              <div key={name}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:".3rem"}}>
                  <span style={{fontSize:".82rem",fontWeight:600,color:"#0a1f35"}}>{name}</span>
                  <span style={{fontSize:".78rem",color:"#64748B"}}>{count} ({Math.round(count/totalRest*100)}%)</span>
                </div>
                <div style={{background:"#F1F5F9",borderRadius:"20px",height:"8px",overflow:"hidden"}}>
                  <div style={{width:`${count/totalRest*100}%`,height:"100%",background:colors[i%colors.length],borderRadius:"20px",transition:"width .4s"}}/>
                </div>
              </div>
            ))}
          </div>
        </div>

        {/* Populyar masalar */}
        <div style={{background:"#fff",borderRadius:"14px",border:"1px solid #E2E8F0",padding:"1.2rem"}}>
          <div style={{fontWeight:700,fontSize:".9rem",marginBottom:"1.2rem"}}>Ən populyar masalar</div>
          {tableData.length===0&&<div style={{color:"#94A3B8",fontSize:".85rem",textAlign:"center",padding:"2rem"}}>Məlumat yoxdur</div>}
          <div style={{display:"flex",flexDirection:"column",gap:".5rem"}}>
            {tableData.map(([label,count],i)=>(
              <div key={label} style={{display:"flex",alignItems:"center",gap:".7rem"}}>
                <div style={{width:"24px",height:"24px",borderRadius:"6px",background:colors[i%colors.length]+"20",display:"flex",alignItems:"center",justifyContent:"center",fontSize:".65rem",fontWeight:700,color:colors[i%colors.length],flexShrink:0}}>#{i+1}</div>
                <div style={{flex:1,background:"#F1F5F9",borderRadius:"20px",height:"10px",overflow:"hidden"}}>
                  <div style={{width:`${count/maxTable*100}%`,height:"100%",background:colors[i%colors.length],borderRadius:"20px"}}/>
                </div>
                <div style={{width:"70px",fontSize:".75rem",color:"#64748B",flexShrink:0}}>Masa {label} · {count}</div>
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* Sadiq müştərilər */}
      <div style={{background:"#fff",borderRadius:"14px",border:"1px solid #E2E8F0",overflow:"hidden"}}>
        <div style={{padding:"1rem 1.2rem",borderBottom:"1px solid #F1F5F9",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{fontWeight:700,fontSize:".9rem"}}>🏅 Sadiq müştərilər</div>
          <span style={{fontSize:".7rem",color:"#94A3B8"}}>Bütün vaxtlar</span>
        </div>
        {topCustomers.length===0&&<div style={{padding:"2rem",textAlign:"center",color:"#94A3B8"}}>Məlumat yoxdur</div>}
        {topCustomers.map((c,i)=>(
          <div key={c.phone} style={{padding:".9rem 1.2rem",borderBottom:"1px solid #F8FAFC",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div style={{display:"flex",alignItems:"center",gap:".9rem"}}>
              <div style={{width:"36px",height:"36px",borderRadius:"50%",background:["linear-gradient(135deg,#FFD700,#FFA500)","linear-gradient(135deg,#C0C0C0,#A0A0A0)","linear-gradient(135deg,#CD7F32,#8B5A2B)","linear-gradient(135deg,#12487a,#0e3d6b)","linear-gradient(135deg,#8B5CF6,#5B21B6)"][i],display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:".85rem",color:"#fff",flexShrink:0}}>
                {i===0?"🥇":i===1?"🥈":i===2?"🥉":`#${i+1}`}
              </div>
              <div>
                <div style={{fontWeight:700,fontSize:".88rem"}}>{c.name}</div>
                <div style={{fontSize:".72rem",color:"#94A3B8"}}>{c.phone} · Son: {c.last}</div>
              </div>
            </div>
            <div style={{textAlign:"right"}}>
              <div style={{fontWeight:700,fontSize:".9rem",color:"#0a1f35"}}>{c.count} rezerv</div>
              {c.total>0&&<div style={{fontSize:".72rem",color:"#16A34A",fontWeight:600}}>{c.total}₼ ön sifariş</div>}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ⭐ RƏYLƏR SƏHİFƏSİ
// ════════════════════════════════════════════════════════════
function ReviewsPage({restaurants}){
  const [reviews,setReviews]=useState([]);
  const [loading,setLoading]=useState(true);
  const [filterRest,setFilterRest]=useState("hamısı");
  const [filterStar,setFilterStar]=useState("hamısı");

  useEffect(()=>{
    sb.from("reviews").select("*").order("created_at",{ascending:false})
      .then(({data})=>{setReviews(data||[]);setLoading(false);})
      .catch(()=>setLoading(false));
  },[]);

  const filtered=reviews.filter(r=>{
    if(filterRest!=="hamısı"&&r.restaurant_name!==filterRest)return false;
    if(filterStar!=="hamısı"&&r.stars!==parseInt(filterStar))return false;
    return true;
  });

  const avgRating=reviews.length?(reviews.reduce((s,r)=>s+r.stars,0)/reviews.length).toFixed(1):0;
  const starDist=[5,4,3,2,1].map(s=>({s,count:reviews.filter(r=>r.stars===s).length}));

  return(
    <div>
      <div style={{marginBottom:"1.5rem"}}>
        <div style={{fontSize:"1.4rem",fontWeight:800,letterSpacing:"-.02em",marginBottom:".2rem"}}>⭐ Müştəri Rəyləri</div>
        <div style={{fontSize:".8rem",color:"#94A3B8"}}>Rezervasiyadan sonra avtomatik toplanan rəylər</div>
      </div>

      {loading&&<div style={{textAlign:"center",padding:"3rem",color:"#94A3B8"}}>Yüklənir...</div>}

      {!loading&&(
        <>
          {/* Ümumi rating */}
          <div style={{display:"grid",gridTemplateColumns:"200px 1fr",gap:"1.5rem",marginBottom:"1.5rem"}}>
            <div style={{background:"#fff",borderRadius:"14px",border:"1px solid #E2E8F0",padding:"1.5rem",textAlign:"center",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
              <div style={{fontSize:"3.5rem",fontWeight:800,letterSpacing:"-.03em",color:"#0a1f35",lineHeight:1}}>{avgRating}</div>
              <div style={{display:"flex",gap:"2px",margin:".5rem 0"}}>
                {[1,2,3,4,5].map(s=><span key={s} style={{fontSize:"1.2rem",color:s<=Math.round(avgRating)?"#F59E0B":"#E2E8F0"}}>★</span>)}
              </div>
              <div style={{fontSize:".75rem",color:"#94A3B8"}}>{reviews.length} rəy</div>
            </div>
            <div style={{background:"#fff",borderRadius:"14px",border:"1px solid #E2E8F0",padding:"1.2rem"}}>
              <div style={{fontWeight:700,fontSize:".88rem",marginBottom:"1rem"}}>Ulduz paylanması</div>
              {starDist.map(({s,count})=>(
                <div key={s} style={{display:"flex",alignItems:"center",gap:".7rem",marginBottom:".5rem"}}>
                  <div style={{display:"flex",alignItems:"center",gap:"2px",width:"60px",flexShrink:0}}>
                    <span style={{fontSize:".8rem",color:"#F59E0B"}}>{"★".repeat(s)}</span>
                  </div>
                  <div style={{flex:1,background:"#F1F5F9",borderRadius:"20px",height:"10px",overflow:"hidden"}}>
                    <div style={{width:reviews.length?`${count/reviews.length*100}%`:"0%",height:"100%",background:"#F59E0B",borderRadius:"20px",transition:"width .4s"}}/>
                  </div>
                  <div style={{width:"30px",fontSize:".75rem",color:"#64748B",textAlign:"right",flexShrink:0}}>{count}</div>
                </div>
              ))}
            </div>
          </div>

          {/* Filtrlər */}
          <div style={{display:"flex",gap:".6rem",marginBottom:"1rem",flexWrap:"wrap"}}>
            <select value={filterRest} onChange={e=>setFilterRest(e.target.value)} style={{border:"1px solid #E2E8F0",borderRadius:"8px",padding:".45rem .8rem",fontSize:".82rem",outline:"none",background:"#fff"}}>
              <option value="hamısı">Bütün restoranlar</option>
              {restaurants.map(r=><option key={r.id} value={r.name}>{r.name}</option>)}
            </select>
            <select value={filterStar} onChange={e=>setFilterStar(e.target.value)} style={{border:"1px solid #E2E8F0",borderRadius:"8px",padding:".45rem .8rem",fontSize:".82rem",outline:"none",background:"#fff"}}>
              <option value="hamısı">Bütün ulduzlar</option>
              {[5,4,3,2,1].map(s=><option key={s} value={s}>{"★".repeat(s)}</option>)}
            </select>
          </div>

          {/* Rəy siyahısı */}
          <div style={{background:"#fff",borderRadius:"14px",border:"1px solid #E2E8F0",overflow:"hidden"}}>
            {filtered.length===0
              ?<div style={{padding:"3rem",textAlign:"center",color:"#94A3B8"}}>
                <div style={{fontSize:"2rem",marginBottom:".5rem"}}>⭐</div>
                <div style={{fontWeight:600,marginBottom:".3rem"}}>Hələ rəy yoxdur</div>
                <div style={{fontSize:".82rem"}}>Müştərilər rezervasiyadan sonra rəy buraxa bilərlər</div>
                <div style={{marginTop:"1rem",fontSize:".75rem",color:"#CBD5E1"}}>Rəy linki: masaaz.vercel.app/review?code=REZERV_KODU</div>
              </div>
              :filtered.map(r=>(
                <div key={r.id} style={{padding:"1.1rem 1.2rem",borderBottom:"1px solid #F8FAFC"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:".5rem"}}>
                    <div>
                      <div style={{fontWeight:700,fontSize:".9rem"}}>{r.customer_name||"Anonim"}</div>
                      <div style={{fontSize:".7rem",color:"#94A3B8"}}>{r.restaurant_name} · {r.created_at?.slice(0,10)}</div>
                    </div>
                    <div style={{display:"flex",gap:"1px"}}>
                      {[1,2,3,4,5].map(s=><span key={s} style={{fontSize:"1rem",color:s<=r.stars?"#F59E0B":"#E2E8F0"}}>★</span>)}
                    </div>
                  </div>
                  {r.comment&&<div style={{fontSize:".83rem",color:"#475569",background:"#F8FAFC",borderRadius:"8px",padding:".6rem .8rem",lineHeight:1.5}}>"{r.comment}"</div>}
                </div>
              ))
            }
          </div>

          {/* SQL hint */}
          <div style={{marginTop:"1rem",background:"#F8FAFC",borderRadius:"10px",padding:"1rem 1.2rem",border:"1px solid #E2E8F0"}}>
            <div style={{fontSize:".72rem",fontWeight:700,color:"#94A3B8",marginBottom:".5rem"}}>📌 Rəy cədvəlini Supabase-də yaradın (bir dəfə):</div>
            <pre style={{fontSize:".72rem",color:"#475569",fontFamily:"monospace",overflow:"auto"}}>{"CREATE TABLE IF NOT EXISTS reviews (\n  id serial primary key,\n  booking_code text,\n  customer_name text,\n  restaurant_name text,\n  stars integer check (stars between 1 and 5),\n  comment text,\n  created_at timestamptz default now()\n);\nALTER TABLE reviews ENABLE ROW LEVEL SECURITY;\nCREATE POLICY Public_insert ON reviews FOR INSERT WITH CHECK (true);\nCREATE POLICY Public_read ON reviews FOR SELECT USING (true);"}</pre>
          </div>
        </>
      )}
    </div>
  );
}

// 📱 QR KOD SƏHİFƏSİ
// ════════════════════════════════════════════════════════════
function QRPage({restaurants, allTables}){
  const [selRest, setSelRest] = useState("");
  const [qrMode, setQrMode] = useState("table"); // "table" | "restaurant"
  const [generated, setGenerated] = useState([]);
  const BASE_URL = "https://masaaz.vercel.app";

  const restTables = useMemo(()=>{
    if(!selRest) return [];
    const rid = parseInt(selRest);
    return allTables.filter(t=>t.restaurant_id===rid);
  },[selRest,allTables]);

  const generate = () => {
    const rest = restaurants.find(r=>String(r.id)===selRest);
    if(!rest) return;
    if(qrMode==="restaurant"){
      setGenerated([{
        label: rest.name,
        url: `${BASE_URL}?rest=${encodeURIComponent(rest.name)}`,
        subtitle: "Restoran girişi",
      }]);
    } else {
      setGenerated(restTables.map(t=>({
        label: `Masa ${t.label}`,
        url: `${BASE_URL}?rest=${encodeURIComponent(rest.name)}&table=${encodeURIComponent(t.label)}`,
        subtitle: `${t.zone||""} · ${t.seats} nəfərlik`,
      })));
    }
  };

  const getQRUrl = (url) =>
    `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(url)}&bgcolor=ffffff&color=0f172a&margin=10`;

  const printAll = () => {
    const win = window.open("","_blank");
    const css = "body{font-family:system-ui,sans-serif;background:#fff;margin:0;padding:20px;}.grid{display:flex;flex-wrap:wrap;gap:20px;}.card{border:1.5px solid #E2E8F0;border-radius:12px;padding:16px;text-align:center;width:180px;break-inside:avoid;}.label{font-weight:800;font-size:14px;margin-top:8px;}.sub{font-size:11px;color:#94A3B8;margin-top:3px;}img{width:150px;height:150px;}@media print{body{padding:0}.grid{gap:10px}.card{width:160px;padding:10px;}}";
    const cards = generated.map(g=>"<div class=\"card\"><img src=\""+getQRUrl(g.url)+"\" alt=\""+g.label+"\"/><div class=\"label\">"+g.label+"</div><div class=\"sub\">"+g.subtitle+"</div></div>").join("");
    const html = "<!DOCTYPE html><html><head><title>MasaAz QR Kodlar</title><style>"+css+"</style></head><body><h2 style=\"margin-bottom:16px;font-size:18px;\">MasaAz QR Kodlar</h2><div class=\"grid\">"+cards+"</div><script>window.print();<\/script></body></html>";
    win.document.write(html);
    win.document.close();
  };

  return(
    <div>
      <div style={{marginBottom:"1.5rem"}}>
        <div style={{fontSize:"1.4rem",fontWeight:800,letterSpacing:"-.02em",marginBottom:".2rem"}}>📱 QR Kodlar</div>
        <div style={{fontSize:".8rem",color:"#94A3B8"}}>Masalara qoyun — müştəri skan edib birbaşa rezerv etsin</div>
      </div>

      <div style={{background:"#fff",borderRadius:"14px",border:"1px solid #E2E8F0",padding:"1.4rem",marginBottom:"1.5rem"}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr auto",gap:"1rem",alignItems:"flex-end",flexWrap:"wrap"}}>
          <div>
            <label style={{fontSize:".65rem",fontWeight:600,letterSpacing:".08em",textTransform:"uppercase",color:"#94A3B8",display:"block",marginBottom:".3rem"}}>Restoran</label>
            <select value={selRest} onChange={e=>setSelRest(e.target.value)} style={{width:"100%",border:"1px solid #E2E8F0",borderRadius:"8px",padding:".55rem .8rem",fontSize:".85rem",outline:"none",background:"#fff"}}>
              <option value="">Restoran seç...</option>
              {restaurants.map(r=><option key={r.id} value={r.id}>{r.name}</option>)}
            </select>
          </div>
          <div>
            <label style={{fontSize:".65rem",fontWeight:600,letterSpacing:".08em",textTransform:"uppercase",color:"#94A3B8",display:"block",marginBottom:".3rem"}}>QR növü</label>
            <div style={{display:"flex",gap:".4rem"}}>
              {[{v:"table",l:"🪑 Hər masa üçün"},{v:"restaurant",l:"🏛️ Restoran üçün"}].map(m=>(
                <button key={m.v} onClick={()=>setQrMode(m.v)} style={{flex:1,padding:".5rem .6rem",borderRadius:"8px",border:`1px solid ${qrMode===m.v?"#12487a":"#E2E8F0"}`,background:qrMode===m.v?"#e8f2fb":"#fff",color:qrMode===m.v?"#1a5c8a":"#64748B",fontSize:".75rem",fontWeight:qrMode===m.v?700:500,cursor:"pointer",fontFamily:"inherit"}}>{m.l}</button>
              ))}
            </div>
          </div>
          <button onClick={generate} disabled={!selRest} style={{background:selRest?"#0a1f35":"#E2E8F0",color:selRest?"#fff":"#94A3B8",border:"none",borderRadius:"8px",padding:".6rem 1.2rem",fontSize:".85rem",fontWeight:700,cursor:selRest?"pointer":"not-allowed",fontFamily:"inherit",whiteSpace:"nowrap"}}>
            QR Yarat ✨
          </button>
        </div>
      </div>

      {generated.length>0&&(
        <>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"1rem"}}>
            <div style={{fontWeight:700,fontSize:".9rem"}}>{generated.length} QR kod hazırlandı</div>
            <button onClick={printAll} style={{background:"#16A34A",color:"#fff",border:"none",borderRadius:"8px",padding:".5rem 1.1rem",fontSize:".82rem",fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>🖨️ Hamısını Çap Et</button>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:"1rem"}}>
            {generated.map((g,i)=>(
              <div key={i} style={{background:"#fff",borderRadius:"14px",border:"1px solid #E2E8F0",padding:"1.2rem",textAlign:"center"}}>
                <img src={getQRUrl(g.url)} alt={g.label} style={{width:"160px",height:"160px",borderRadius:"8px"}}/>
                <div style={{fontWeight:800,fontSize:".95rem",marginTop:".7rem",color:"#0a1f35"}}>{g.label}</div>
                <div style={{fontSize:".7rem",color:"#94A3B8",marginBottom:".8rem"}}>{g.subtitle}</div>
                <div style={{fontSize:".6rem",color:"#CBD5E1",wordBreak:"break-all",background:"#F8FAFC",borderRadius:"6px",padding:".4rem",marginBottom:".7rem"}}>{g.url}</div>
                <a href={g.url} target="_blank" style={{fontSize:".75rem",color:"#12487a",textDecoration:"none",fontWeight:600}}>🔗 Linki aç →</a>
              </div>
            ))}
          </div>
          <div style={{marginTop:"1rem",background:"#FEF9C3",borderRadius:"10px",padding:"1rem 1.2rem",border:"1px solid #FDE047",fontSize:".8rem",color:"#92400E"}}>
            💡 <b>İstifadə qaydası:</b> QR kodları çap edin → laminate edin → hər masaya qoyun. Müştəri telefonu ilə skan edir → birbaşa həmin masanı seçmiş halda rezervasiya forması açılır!
          </div>
        </>
      )}

      {generated.length===0&&selRest&&(
        <div style={{background:"#fff",borderRadius:"14px",border:"2px dashed #E2E8F0",padding:"3rem",textAlign:"center",color:"#94A3B8"}}>
          <div style={{fontSize:"2.5rem",marginBottom:".7rem"}}>📱</div>
          <div style={{fontWeight:600,marginBottom:".3rem"}}>QR yaratmaq hazırsınız</div>
          <div style={{fontSize:".82rem"}}>"QR Yarat" düyməsinə basın</div>
        </div>
      )}
    </div>
  );
}

// 💳 ABUNƏLİKLƏR — OWNER PANELİ
// Bütün restoran abunəliklərini idarə et
// ════════════════════════════════════════════════════════════
function AdminSubsPage({restaurants}){
  const [subs,    setSubs]    = useState([]);
  const [loading, setLoading] = useState(true);
  const [saving,  setSaving]  = useState(null);
  const [msg,     setMsg]     = useState(null);
  const [payments,setPayments]= useState([]);
  const [dbErr,   setDbErr]   = useState(null);
  const [approved,setApproved]= useState(null);
  // Stripe Payment Link konfiqurasiyası
  const [stripeLink, setStripeLink] = useState("");
  const [savingLink, setSavingLink] = useState(false);

  const show = (text,ok=true)=>{ setMsg({text,ok}); setTimeout(()=>setMsg(null),3500); };

  const load = async()=>{
    setLoading(true);
    setDbErr(null);
    // Load settings
    const {data:settings} = await sb.from("platform_settings").select("*").eq("key","stripe_payment_link").maybeSingle();
    if(settings?.value) setStripeLink(settings.value);

    const [{data:s, error:subErr},{data:p}] = await Promise.all([
      sb.from("subscriptions").select("*"),
      sb.from("payment_history").select("*").order("created_at",{ascending:false}).limit(30),
    ]);
    if(subErr){ setDbErr(subErr.message); }
    setSubs(s||[]); setPayments(p||[]);
    setLoading(false);
  };

  const saveStripeLink = async()=>{
    if(!stripeLink.trim()){ show("Link boş ola bilməz",false); return; }
    setSavingLink(true);
    await sb.from("platform_settings").upsert({key:"stripe_payment_link",value:stripeLink.trim()},{onConflict:"key"});
    setSavingLink(false);
    show("Stripe Payment Link saxlandı ✓");
  };

  useEffect(()=>{ load(); },[]);

  const getSub = rid => subs.find(s=>s.restaurant_id===rid);

  const activate = async(rid, months=1)=>{
    setSaving(rid);
    const now=new Date(), exp=new Date(now);
    exp.setMonth(exp.getMonth()+months);
    const {error}=await sb.from("subscriptions").upsert({
      restaurant_id:rid, status:"active",
      started_at:now.toISOString(), expires_at:exp.toISOString(),
      updated_at:now.toISOString(),
      notes:`Manual — owner panel · ${now.toLocaleDateString("az-AZ")}`
    },{onConflict:"restaurant_id"});
    setSaving(null);
    if(error){ show("Xəta: "+error.message,false); return; }
    show(`✅ ${months} ay aktiv edildi`);
    load();
  };

  const deactivate = async(rid)=>{
    if(!confirm("Abunəliyi ləğv etmək istəyirsiniz?")) return;
    setSaving(rid);
    await sb.from("subscriptions").update({status:"expired",updated_at:new Date().toISOString()}).eq("restaurant_id",rid);
    setSaving(null);
    show("Ləğv edildi");
    load();
  };

  const extendTrial = async(rid,days=7)=>{
    setSaving(rid);
    const sub=getSub(rid);
    const base=sub?.trial_ends_at&&new Date(sub.trial_ends_at)>new Date()?new Date(sub.trial_ends_at):new Date();
    base.setDate(base.getDate()+days);
    await sb.from("subscriptions").upsert({
      restaurant_id:rid, status:"trial", trial_ends_at:base.toISOString(), updated_at:new Date().toISOString()
    },{onConflict:"restaurant_id"});
    setSaving(null);
    show(`Trial ${days} gün uzadıldı`);
    load();
  };

  const stats={
    active:  subs.filter(s=>s.status==="active"&&new Date(s.expires_at)>new Date()).length,
    trial:   subs.filter(s=>s.status==="trial"&&new Date(s.trial_ends_at)>new Date()).length,
    expired: subs.filter(s=>!subActive(s)).length,
    revenue: payments.filter(p=>p.status==="paid").reduce((acc,p)=>acc+(p.amount||0),0),
  };

  if(loading) return <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"60vh"}}><Spin s={36}/></div>;

  // ── TƏSDİQ MODAL ──────────────────────────────────────────
  if(approved) return(
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"60vh"}}>
      <div style={{background:"#fff",borderRadius:"20px",border:"1px solid #E2E8F0",padding:"2.5rem",maxWidth:"420px",width:"100%",textAlign:"center",boxShadow:"0 8px 40px rgba(0,0,0,.08)"}}>
        <div style={{fontSize:"3rem",marginBottom:"1rem"}}>🎉</div>
        <div style={{fontWeight:800,fontSize:"1.2rem",marginBottom:".5rem"}}>Hesab yaradıldı!</div>
        <div style={{fontSize:".85rem",color:"#64748B",marginBottom:"1.5rem"}}>
          <b>{approved.restName}</b> üçün admin hesabı hazırdır.<br/>Aşağıdakı məlumatları restoran sahibinə göndərin.
        </div>

        {/* Giriş məlumatları */}
        <div style={{background:"#F8FAFC",borderRadius:"12px",border:"1px solid #E2E8F0",padding:"1.2rem",marginBottom:"1.2rem",textAlign:"left"}}>
          <div style={{fontSize:".65rem",fontWeight:700,color:"#94A3B8",textTransform:"uppercase",letterSpacing:".1em",marginBottom:".8rem"}}>Giriş məlumatları</div>
          {[["🌐 Panel URL","https://monster-0548.vercel.app/admin.html"],["👤 İstifadəçi adı",approved.username],["🔑 Şifrə",approved.password]].map(([k,v])=>(
            <div key={k} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:".5rem 0",borderBottom:"1px solid #F1F5F9",gap:".5rem"}}>
              <span style={{fontSize:".75rem",color:"#94A3B8",flexShrink:0}}>{k}</span>
              <div style={{display:"flex",alignItems:"center",gap:".4rem"}}>
                <span style={{fontSize:".85rem",fontWeight:700,fontFamily:"monospace"}}>{v}</span>
                <button onClick={()=>navigator.clipboard.writeText(v)}
                  style={{background:"#e8f2fb",border:"1px solid #a8cce0",borderRadius:"5px",padding:".1rem .4rem",fontSize:".65rem",color:"#1a5c8a",cursor:"pointer",fontFamily:"inherit"}}>
                  Kopyala
                </button>
              </div>
            </div>
          ))}
        </div>

        {/* WhatsApp göndər */}
        {approved.phone&&(
          <a href={`https://wa.me/${approved.phone.replace(/[^0-9]/g,"")}?text=${encodeURIComponent(
            `Salam! MasaAz admin panelinizə giriş məlumatlarınız:

🌐 Link: https://monster-0548.vercel.app/admin.html
👤 İstifadəçi adı: ${approved.username}
🔑 Şifrə: ${approved.password}

1 ay pulsuz sınaq müddətiniz başladı. ✅`
          )}`} target="_blank"
            style={{display:"block",background:"#22C55E",color:"#fff",borderRadius:"10px",padding:".8rem",fontSize:".9rem",fontWeight:700,textDecoration:"none",marginBottom:".8rem"}}>
            💬 WhatsApp ilə göndər
          </a>
        )}

        <button onClick={()=>setApproved(null)}
          style={{width:"100%",background:"#0a1f35",color:"#fff",border:"none",borderRadius:"10px",padding:".75rem",fontSize:".9rem",fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>
          ✓ Tamam
        </button>
      </div>
    </div>
  );

  return(
    <div>
      <div style={{marginBottom:"1.5rem",display:"flex",justifyContent:"space-between",alignItems:"flex-end",flexWrap:"wrap",gap:"1rem"}}>
        <div>
          <div style={{fontSize:"1.4rem",fontWeight:800,letterSpacing:"-.02em",marginBottom:".2rem"}}>💳 Abunəliklər</div>
          <div style={{fontSize:".8rem",color:"#94A3B8"}}>Bütün restoran abunəliklərini idarə et</div>
        </div>
        <button onClick={load} style={{background:"#F1F5F9",border:"1px solid #E2E8F0",borderRadius:"8px",padding:".5rem 1rem",fontSize:".8rem",cursor:"pointer",fontFamily:"inherit",color:"#64748B"}}>🔄 Yenilə</button>
      </div>

      {msg&&<div style={{background:msg.ok?"#F0FDF4":"#FEF2F2",border:`1px solid ${msg.ok?"#86EFAC":"#FECACA"}`,borderRadius:"10px",padding:".8rem 1.2rem",marginBottom:"1rem",color:msg.ok?"#16A34A":"#DC2626",fontSize:".85rem",fontWeight:600}}>{msg.text}</div>}

      {/* DB xəta — SQL run edilməyib */}
      {dbErr&&(
        <div style={{background:"#FEF2F2",border:"1px solid #FECACA",borderRadius:"12px",padding:"1rem 1.4rem",marginBottom:"1.2rem"}}>
          <div style={{fontWeight:700,color:"#DC2626",marginBottom:".4rem"}}>⚠️ Verilənlər bazası xətası</div>
          <div style={{fontSize:".82rem",color:"#EF4444",marginBottom:".8rem",fontFamily:"monospace"}}>{dbErr}</div>
          <div style={{fontSize:".82rem",color:"#7F1D1D",background:"#fff",borderRadius:"8px",padding:".8rem 1rem",border:"1px solid #FECACA"}}>
            <b>Həll:</b> Supabase → SQL Editor-da <code style={{background:"#FEE2E2",padding:".1rem .4rem",borderRadius:"4px"}}>SUBSCRIPTION_SQL.sql</code> faylını run edin, sonra bu səhifəni yeniləyin.
          </div>
        </div>
      )}

      {/* Stripe Payment Link konfiqurasiyası */}
      <div style={{background:"#fff",borderRadius:"14px",border:"1px solid #E2E8F0",padding:"1.4rem",marginBottom:"1.5rem"}}>
        <div style={{fontWeight:700,fontSize:".9rem",marginBottom:".4rem"}}>🔗 Stripe Payment Link</div>
        <div style={{fontSize:".78rem",color:"#64748B",marginBottom:"1rem"}}>
          Stripe Dashboard → <b>Payment Links → Create</b> → $29/ay məhsul yarat → linki bura yaz.<br/>
          Restoran sahibi ödəniş düyməsinə basdıqda bu linkə yönləndirilir.
        </div>
        <div style={{display:"flex",gap:".6rem"}}>
          <input value={stripeLink} onChange={e=>setStripeLink(e.target.value)}
            placeholder="https://buy.stripe.com/xxxxxxxxxxxx"
            style={{flex:1,border:"1px solid #E2E8F0",borderRadius:"8px",padding:".6rem .9rem",fontSize:".85rem",outline:"none",fontFamily:"monospace"}}/>
          <button onClick={saveStripeLink} disabled={savingLink}
            style={{background:"#0a1f35",color:"#fff",border:"none",borderRadius:"8px",padding:".6rem 1.2rem",fontSize:".85rem",fontWeight:700,cursor:"pointer",fontFamily:"inherit",whiteSpace:"nowrap"}}>
            {savingLink?"⏳ Saxlanır...":"💾 Saxla"}
          </button>
        </div>
        {stripeLink&&<div style={{marginTop:".5rem",fontSize:".75rem",color:"#16A34A"}}>✅ Link aktivdir — restoran sahibləri bu linkdən ödəniş edə bilərlər</div>}
      </div>

      {/* Statistika */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:"1rem",marginBottom:"1.5rem"}}>
        {[
          {icon:"✅",l:"Aktiv",v:stats.active,c:"#16A34A",bg:"#F0FDF4"},
          {icon:"🕐",l:"Trial",v:stats.trial,c:"#D97706",bg:"#FFFBEB"},
          {icon:"❌",l:"Bitmiş/Yox",v:stats.expired,c:"#DC2626",bg:"#FEF2F2"},
          {icon:"💰",l:"Cəmi gəlir",v:`$${stats.revenue.toFixed(0)}`,c:"#7C3AED",bg:"#F5F3FF"},
        ].map(s=>(
          <div key={s.l} style={{background:s.bg,borderRadius:"12px",padding:"1rem 1.2rem"}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:".5rem"}}><span style={{fontSize:".68rem",fontWeight:600,color:s.c,textTransform:"uppercase",letterSpacing:".06em"}}>{s.l}</span><span style={{fontSize:"1.3rem"}}>{s.icon}</span></div>
            <div style={{fontSize:"1.8rem",fontWeight:800,color:s.c}}>{s.v}</div>
          </div>
        ))}
      </div>

      {/* Restoran siyahısı */}
      <div style={{background:"#fff",borderRadius:"14px",border:"1px solid #E2E8F0",overflow:"hidden",marginBottom:"1.5rem"}}>
        <div style={{padding:"1rem 1.2rem",borderBottom:"1px solid #F1F5F9",fontWeight:700,fontSize:".9rem"}}>Restoran Abunəlikləri</div>
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:".82rem"}}>
          <thead><tr style={{background:"#F8FAFC"}}>
            {["Restoran","Status","Bitmə tarixi","Əməliyyatlar"].map(h=>(
              <th key={h} style={{padding:".65rem 1.1rem",textAlign:"left",fontWeight:600,fontSize:".67rem",letterSpacing:".05em",textTransform:"uppercase",color:"#94A3B8",borderBottom:"1px solid #E2E8F0"}}>{h}</th>
            ))}
          </tr></thead>
          <tbody>
            {restaurants.map(r=>{
              const s=getSub(r.id);
              const sl=subLabel(s);
              const days=subDaysLeft(s);
              return(
                <tr key={r.id} style={{borderBottom:"1px solid #F8FAFC"}}>
                  <td style={{padding:".9rem 1.1rem"}}>
                    <div style={{fontWeight:600}}>{r.name}</div>
                    <div style={{fontSize:".7rem",color:"#94A3B8"}}>ID: {r.id}</div>
                  </td>
                  <td style={{padding:".9rem 1.1rem"}}>
                    <span style={{padding:".22rem .7rem",borderRadius:"20px",fontSize:".72rem",fontWeight:700,background:sl.bg,color:sl.c,border:`1px solid ${sl.bd}`}}>{sl.t}</span>
                    {days>0&&<div style={{fontSize:".7rem",color:"#94A3B8",marginTop:".25rem"}}>{days} gün qaldı</div>}
                  </td>
                  <td style={{padding:".9rem 1.1rem",color:"#64748B",fontSize:".8rem"}}>
                    {s?.status==="active"&&s.expires_at?new Date(s.expires_at).toLocaleDateString("az-AZ"):
                     s?.status==="trial"&&s.trial_ends_at?"Trial: "+new Date(s.trial_ends_at).toLocaleDateString("az-AZ"):"—"}
                  </td>
                  <td style={{padding:".9rem 1.1rem"}}>
                    <div style={{display:"flex",gap:".4rem",flexWrap:"wrap"}}>
                      <button onClick={()=>activate(r.id,1)} disabled={saving===r.id}
                        style={{background:"#DCFCE7",border:"1px solid #86EFAC",color:"#16A34A",borderRadius:"6px",padding:".3rem .7rem",fontSize:".72rem",fontWeight:700,cursor:"pointer",fontFamily:"inherit",whiteSpace:"nowrap"}}>
                        {saving===r.id?<Spin s={10}/>:"✅ 1 ay aktiv"}
                      </button>
                      <button onClick={()=>activate(r.id,3)} disabled={saving===r.id}
                        style={{background:"#d0e8f5",border:"1px solid #90bfda",color:"#1a5c8a",borderRadius:"6px",padding:".3rem .7rem",fontSize:".72rem",fontWeight:700,cursor:"pointer",fontFamily:"inherit",whiteSpace:"nowrap"}}>
                        3 ay
                      </button>
                      <button onClick={()=>extendTrial(r.id,7)} disabled={saving===r.id}
                        style={{background:"#FFFBEB",border:"1px solid #FDE68A",color:"#D97706",borderRadius:"6px",padding:".3rem .7rem",fontSize:".72rem",fontWeight:700,cursor:"pointer",fontFamily:"inherit",whiteSpace:"nowrap"}}>
                        +7 gün trial
                      </button>
                      {subActive(s)&&<button onClick={()=>deactivate(r.id)} disabled={saving===r.id}
                        style={{background:"#FEE2E2",border:"1px solid #FECACA",color:"#DC2626",borderRadius:"6px",padding:".3rem .7rem",fontSize:".72rem",fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>
                        Ləğv et
                      </button>}
                    </div>
                  </td>
                </tr>
              );
            })}
            {restaurants.length===0&&<tr><td colSpan={4} style={{padding:"3rem",textAlign:"center",color:"#94A3B8"}}>Restoran tapılmadı</td></tr>}
          </tbody>
        </table>
      </div>

      {/* Son ödənişlər */}
      {payments.length>0&&(
        <div style={{background:"#fff",borderRadius:"14px",border:"1px solid #E2E8F0",overflow:"hidden"}}>
          <div style={{padding:"1rem 1.2rem",borderBottom:"1px solid #F1F5F9",fontWeight:700,fontSize:".9rem"}}>📜 Gələn ödənişlər (Stripe)</div>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:".8rem"}}>
            <thead><tr style={{background:"#F8FAFC"}}>
              {["Tarix","Restoran","Məbləğ","Status","Dövr"].map(h=>(
                <th key={h} style={{padding:".55rem .9rem",textAlign:"left",fontWeight:600,fontSize:".65rem",letterSpacing:".05em",textTransform:"uppercase",color:"#94A3B8",borderBottom:"1px solid #E2E8F0"}}>{h}</th>
              ))}
            </tr></thead>
            <tbody>
              {payments.map(p=>{
                const r=restaurants.find(x=>x.id===p.restaurant_id);
                return(
                  <tr key={p.id} style={{borderBottom:"1px solid #F8FAFC"}}>
                    <td style={{padding:".7rem .9rem",color:"#64748B"}}>{p.created_at?.slice(0,10)}</td>
                    <td style={{padding:".7rem .9rem",fontWeight:600}}>{r?.name||"#"+p.restaurant_id}</td>
                    <td style={{padding:".7rem .9rem",fontWeight:700,color:"#16A34A"}}>${p.amount}</td>
                    <td style={{padding:".7rem .9rem"}}>
                      <span style={{padding:".18rem .5rem",borderRadius:"20px",fontSize:".7rem",fontWeight:600,
                        background:p.status==="paid"?"#DCFCE7":p.status==="pending"?"#FEF9C3":"#FEE2E2",
                        color:p.status==="paid"?"#16A34A":p.status==="pending"?"#CA8A04":"#DC2626"
                      }}>{p.status==="paid"?"✅ Ödənilib":p.status==="pending"?"⏳ Gözlənilir":"❌ Uğursuz"}</span>
                    </td>
                    <td style={{padding:".7rem .9rem",color:"#64748B",fontSize:".75rem"}}>
                      {p.period_start?new Date(p.period_start).toLocaleDateString("az-AZ"):"—"} → {p.period_end?new Date(p.period_end).toLocaleDateString("az-AZ"):"—"}
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
}

// 🚀 MÜRACİƏTLƏR SƏHİFƏSİ
// /onboard formu göndərənlər burada görünür
// ════════════════════════════════════════════════════════════
function OnboardingRequestsPage(){
  const [reqs,      setReqs]      = useState([]);
  const [loading,   setLoading]   = useState(true);
  const [filter,    setFilter]    = useState("new");
  const [saving,    setSaving]    = useState(null);
  const [sel,       setSel]       = useState(null);
  const [msg,       setMsg]       = useState(null);
  const [approving, setApproving] = useState(false);
  const [approved,  setApproved]  = useState(null); // {username, password, restName}

  const show = (text,ok=true)=>{ setMsg({text,ok}); setTimeout(()=>setMsg(null),3000); };

  const load = async()=>{
    setLoading(true);
    const {data,error} = await sb.from("onboarding_requests")
      .select("*").order("created_at",{ascending:false});
    if(error){ show("Cədvəl tapılmadı. ONBOARDING_FIX.sql run edin.",false); }
    setReqs(data||[]);
    setLoading(false);
  };

  useEffect(()=>{ load(); },[]);

  const setStatus = async(id, status)=>{
    setSaving(id);
    await sb.from("onboarding_requests").update({status}).eq("id",id);
    setReqs(p=>p.map(r=>r.id===id?{...r,status}:r));
    if(sel?.id===id) setSel(p=>({...p,status}));
    setSaving(null);
    show(status==="contacted"?"📞 Əlaqə saxlandı kimi işarələndi":"✅ Tamamlandı");
  };

  const deleteReq = async(id)=>{
    if(!confirm("Bu müraciəti silmək istəyirsiniz?")) return;
    await sb.from("onboarding_requests").delete().eq("id",id);
    setReqs(p=>p.filter(r=>r.id!==id));
    if(sel?.id===id) setSel(null);
    show("Silindi");
  };

  // ── TƏSDİQ ET: Admin hesabı yarat + Trial aktivləşdir ──────
  const approve = async(req) => {
    if(!confirm(`"${req.business_name}" üçün admin hesabı yaradılsın?`)) return;
    setApproving(true);

    // 1. Restoran yarat (əgər yoxdursa)
    let restaurantId = null;
    const {data: existRest} = await sb.from("restaurants")
      .select("id").ilike("name", req.business_name).maybeSingle();

    if(existRest){
      restaurantId = existRest.id;
    } else {
      const {data: newRest, error: restErr} = await sb.from("restaurants").insert({
        name: req.business_name,
        cuisine: req.cuisine || null,
        address: req.location || null,
        phone: req.phone || null,
        venue_type: req.venue_type || "restoran",
      }).select().maybeSingle();
      if(restErr){ show("Restoran yaradılarkən xəta: "+restErr.message, false); setApproving(false); return; }
      restaurantId = newRest.id;
    }

    // 2. Admin hesabı yarat
    const baseUser = req.business_name.toLowerCase()
      .replace(/\s+/g,"").replace(/[^a-z0-9]/g,"").slice(0,12) || "restoran";
    const username = baseUser + Math.floor(Math.random()*100);
    const password = Math.random().toString(36).slice(2,8).toUpperCase() +
                     Math.floor(Math.random()*100);

    const {error: userErr} = await sb.from("admin_users").insert({
      username,
      password_hash: await (async()=>{const buf=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(password));return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");})(),
      display_name: req.business_name,
      restaurant_id: restaurantId,
      is_super: false,
      is_active: true,
    });
    if(userErr){ show("Admin hesabı yaradılarkən xəta: "+userErr.message, false); setApproving(false); return; }

    // 3. 1 aylıq trial yarat
    const trialEnd = new Date();
    trialEnd.setMonth(trialEnd.getMonth() + 1);
    await sb.from("subscriptions").upsert({
      restaurant_id: restaurantId,
      status: "trial",
      trial_ends_at: trialEnd.toISOString(),
      notes: `Onboarding təsdiqi — ${new Date().toLocaleDateString("az-AZ")}`,
      updated_at: new Date().toISOString(),
    },{onConflict:"restaurant_id"});

    // 4. Müraciəti "done" et
    await sb.from("onboarding_requests").update({status:"done"}).eq("id",req.id);
    setReqs(p=>p.map(r=>r.id===req.id?{...r,status:"done"}:r));
    if(sel?.id===req.id) setSel(p=>({...p,status:"done"}));

    setApproving(false);
    setApproved({username, password, restName: req.business_name, phone: req.phone});
    show("✅ Hesab yaradıldı!");
  };

  const filtered = reqs.filter(r=> filter==="hamısı" ? true : r.status===filter);

  const counts = {
    new:       reqs.filter(r=>r.status==="new").length,
    contacted: reqs.filter(r=>r.status==="contacted").length,
    done:      reqs.filter(r=>r.status==="done").length,
  };

  const statusStyle = s => s==="new"
    ? {bg:"#FEF9C3",c:"#CA8A04",bd:"#FDE047",t:"🆕 Yeni"}
    : s==="contacted"
    ? {bg:"#d0e8f5",c:"#1a5c8a",bd:"#90bfda",t:"📞 Əlaqə saxlandı"}
    : {bg:"#DCFCE7",c:"#16A34A",bd:"#86EFAC",t:"✅ Tamamlandı"};

  if(loading) return <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"60vh"}}><Spin s={36}/></div>;

  // ── TƏSDİQ MODAL ──────────────────────────────────────────
  if(approved) return(
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"60vh"}}>
      <div style={{background:"#fff",borderRadius:"20px",border:"1px solid #E2E8F0",padding:"2.5rem",maxWidth:"420px",width:"100%",textAlign:"center",boxShadow:"0 8px 40px rgba(0,0,0,.08)"}}>
        <div style={{fontSize:"3rem",marginBottom:"1rem"}}>🎉</div>
        <div style={{fontWeight:800,fontSize:"1.2rem",marginBottom:".5rem"}}>Hesab yaradıldı!</div>
        <div style={{fontSize:".85rem",color:"#64748B",marginBottom:"1.5rem"}}>
          <b>{approved.restName}</b> üçün admin hesabı hazırdır.<br/>Aşağıdakı məlumatları restoran sahibinə göndərin.
        </div>

        {/* Giriş məlumatları */}
        <div style={{background:"#F8FAFC",borderRadius:"12px",border:"1px solid #E2E8F0",padding:"1.2rem",marginBottom:"1.2rem",textAlign:"left"}}>
          <div style={{fontSize:".65rem",fontWeight:700,color:"#94A3B8",textTransform:"uppercase",letterSpacing:".1em",marginBottom:".8rem"}}>Giriş məlumatları</div>
          {[["🌐 Panel URL","https://monster-0548.vercel.app/admin.html"],["👤 İstifadəçi adı",approved.username],["🔑 Şifrə",approved.password]].map(([k,v])=>(
            <div key={k} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:".5rem 0",borderBottom:"1px solid #F1F5F9",gap:".5rem"}}>
              <span style={{fontSize:".75rem",color:"#94A3B8",flexShrink:0}}>{k}</span>
              <div style={{display:"flex",alignItems:"center",gap:".4rem"}}>
                <span style={{fontSize:".85rem",fontWeight:700,fontFamily:"monospace"}}>{v}</span>
                <button onClick={()=>navigator.clipboard.writeText(v)}
                  style={{background:"#e8f2fb",border:"1px solid #a8cce0",borderRadius:"5px",padding:".1rem .4rem",fontSize:".65rem",color:"#1a5c8a",cursor:"pointer",fontFamily:"inherit"}}>
                  Kopyala
                </button>
              </div>
            </div>
          ))}
        </div>

        {/* WhatsApp göndər */}
        {approved.phone&&(
          <a href={`https://wa.me/${approved.phone.replace(/[^0-9]/g,"")}?text=${encodeURIComponent(
            `Salam! MasaAz admin panelinizə giriş məlumatlarınız:

🌐 Link: https://monster-0548.vercel.app/admin.html
👤 İstifadəçi adı: ${approved.username}
🔑 Şifrə: ${approved.password}

1 ay pulsuz sınaq müddətiniz başladı. ✅`
          )}`} target="_blank"
            style={{display:"block",background:"#22C55E",color:"#fff",borderRadius:"10px",padding:".8rem",fontSize:".9rem",fontWeight:700,textDecoration:"none",marginBottom:".8rem"}}>
            💬 WhatsApp ilə göndər
          </a>
        )}

        <button onClick={()=>setApproved(null)}
          style={{width:"100%",background:"#0a1f35",color:"#fff",border:"none",borderRadius:"10px",padding:".75rem",fontSize:".9rem",fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>
          ✓ Tamam
        </button>
      </div>
    </div>
  );

  return(
    <div>
      {/* Başlıq */}
      <div style={{marginBottom:"1.5rem",display:"flex",justifyContent:"space-between",alignItems:"flex-end",flexWrap:"wrap",gap:"1rem"}}>
        <div>
          <div style={{fontSize:"1.4rem",fontWeight:800,letterSpacing:"-.02em",marginBottom:".2rem"}}>🚀 Müraciətlər</div>
          <div style={{fontSize:".8rem",color:"#94A3B8"}}>/onboard formu vasitəsilə gələn qeydiyyat müraciətləri</div>
        </div>
        <button onClick={load} style={{background:"#F1F5F9",border:"1px solid #E2E8F0",borderRadius:"8px",padding:".5rem 1rem",fontSize:".8rem",cursor:"pointer",fontFamily:"inherit",color:"#64748B"}}>🔄 Yenilə</button>
      </div>

      {msg&&<div style={{background:msg.ok?"#F0FDF4":"#FEF2F2",border:`1px solid ${msg.ok?"#86EFAC":"#FECACA"}`,borderRadius:"10px",padding:".75rem 1.2rem",marginBottom:"1rem",color:msg.ok?"#16A34A":"#DC2626",fontSize:".85rem",fontWeight:600}}>{msg.text}</div>}

      {/* Statistika */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:"1rem",marginBottom:"1.5rem"}}>
        {[
          {icon:"🆕",l:"Yeni",v:counts.new,c:"#CA8A04",bg:"#FFFBEB"},
          {icon:"📞",l:"Əlaqə saxlandı",v:counts.contacted,c:"#1a5c8a",bg:"#e8f2fb"},
          {icon:"✅",l:"Tamamlandı",v:counts.done,c:"#16A34A",bg:"#F0FDF4"},
        ].map(s=>(
          <div key={s.l} onClick={()=>setFilter(s.l==="Yeni"?"new":s.l==="Əlaqə saxlandı"?"contacted":"done")}
            style={{background:s.bg,borderRadius:"12px",padding:"1rem 1.2rem",cursor:"pointer",border:`2px solid ${filter===(s.l==="Yeni"?"new":s.l==="Əlaqə saxlandı"?"contacted":"done")?s.c:"transparent"}`,transition:"border .15s"}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:".5rem"}}><span style={{fontSize:".68rem",fontWeight:600,color:s.c,textTransform:"uppercase",letterSpacing:".06em"}}>{s.l}</span><span style={{fontSize:"1.3rem"}}>{s.icon}</span></div>
            <div style={{fontSize:"1.8rem",fontWeight:800,color:s.c}}>{s.v}</div>
          </div>
        ))}
      </div>

      {/* Filter düymələri */}
      <div style={{display:"flex",gap:".5rem",marginBottom:"1rem",flexWrap:"wrap"}}>
        {[["hamısı","Hamısı 📋"],["new","🆕 Yeni"],["contacted","📞 Əlaqə"],["done","✅ Tamamlandı"]].map(([v,l])=>(
          <button key={v} onClick={()=>setFilter(v)}
            style={{padding:".4rem .9rem",borderRadius:"20px",border:`1.5px solid ${filter===v?"#0a1f35":"#E2E8F0"}`,background:filter===v?"#0a1f35":"#fff",color:filter===v?"#fff":"#64748B",fontSize:".78rem",fontWeight:filter===v?700:500,cursor:"pointer",fontFamily:"inherit"}}>
            {l} {v!=="hamısı"&&`(${counts[v]||0})`}
          </button>
        ))}
      </div>

      <div style={{display:"flex",gap:"1.5rem",alignItems:"flex-start"}}>
        {/* Siyahı */}
        <div style={{flex:1,background:"#fff",borderRadius:"14px",border:"1px solid #E2E8F0",overflow:"hidden"}}>
          {filtered.length===0
            ? <div style={{padding:"3rem",textAlign:"center",color:"#94A3B8"}}>
                <div style={{fontSize:"2rem",marginBottom:".5rem"}}>📭</div>
                <div style={{fontWeight:600}}>Müraciət tapılmadı</div>
              </div>
            : filtered.map(r=>{
                const ss = statusStyle(r.status);
                return(
                  <div key={r.id} onClick={()=>setSel(r)}
                    style={{padding:"1rem 1.2rem",borderBottom:"1px solid #F8FAFC",cursor:"pointer",background:sel?.id===r.id?"#F8FAFC":"#fff",display:"flex",justifyContent:"space-between",alignItems:"center",gap:"1rem"}}>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{display:"flex",alignItems:"center",gap:".6rem",marginBottom:".25rem"}}>
                        <span style={{fontWeight:700,fontSize:".9rem"}}>{r.business_name}</span>
                        <span style={{padding:".15rem .55rem",borderRadius:"20px",fontSize:".68rem",fontWeight:700,background:ss.bg,color:ss.c,border:`1px solid ${ss.bd}`,whiteSpace:"nowrap"}}>{ss.t}</span>
                        {r.venue_type&&r.venue_type!=="restoran"&&(
                          <span style={{padding:".12rem .5rem",borderRadius:"100px",fontSize:".65rem",fontWeight:700,
                            background:r.venue_type==="lounge"?"#f0e8ff":"#fff3e0",
                            color:r.venue_type==="lounge"?"#7c3aed":"#c2570a",
                            border:`1px solid ${r.venue_type==="lounge"?"#c4b5fd":"#fed7aa"}`,
                            whiteSpace:"nowrap"}}>
                            {{"lounge":"🛋️ Lounge","pub":"🍺 Pub"}[r.venue_type]}
                          </span>
                        )}
                      </div>
                      <div style={{fontSize:".75rem",color:"#64748B"}}>{r.contact_name} · {r.phone}</div>
                      <div style={{fontSize:".7rem",color:"#94A3B8",marginTop:".2rem"}}>{new Date(r.created_at).toLocaleDateString("az-AZ",{day:"numeric",month:"long",hour:"2-digit",minute:"2-digit"})}</div>
                    </div>
                    <div style={{fontSize:".75rem",color:"#94A3B8",whiteSpace:"nowrap"}}>{r.cuisine||""}</div>
                  </div>
                );
              })
          }
        </div>

        {/* Detal panel */}
        {sel&&(
          <div style={{width:"320px",flexShrink:0,background:"#fff",borderRadius:"14px",border:"1px solid #E2E8F0",overflow:"hidden",position:"sticky",top:"1.5rem"}}>
            <div style={{padding:"1rem 1.2rem",borderBottom:"1px solid #F1F5F9",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div style={{fontWeight:700,fontSize:".9rem"}}>Detal</div>
              <button onClick={()=>setSel(null)} style={{background:"none",border:"none",cursor:"pointer",color:"#94A3B8",fontSize:"1.1rem"}}>✕</button>
            </div>
            <div style={{padding:"1.2rem"}}>
              {/* Status badge */}
              {(()=>{const ss=statusStyle(sel.status);return(
                <span style={{display:"inline-block",padding:".25rem .7rem",borderRadius:"20px",fontSize:".78rem",fontWeight:700,background:ss.bg,color:ss.c,border:`1px solid ${ss.bd}`,marginBottom:"1rem"}}>{ss.t}</span>
              )})()}

              {/* Məlumatlar */}
              {[
                ["🏛️ Restoran", sel.business_name],
                ["👤 Əlaqə", sel.contact_name],
                ["📱 Telefon", sel.phone],
                ["📧 Email", sel.email||"—"],
                ["🏷️ Kateqoriya", {restoran:"🍽️ Restoran",lounge:"🛋️ Lounge",pub:"🍺 Pub"}[sel.venue_type]||"🍽️ Restoran"],
                ["🍽️ Mətbəx", sel.cuisine||"—"],
                ["📍 Ünvan", sel.location||"—"],
                ["🪑 Masa sayı", sel.table_count||"—"],
                ["📅 Tarix", new Date(sel.created_at).toLocaleDateString("az-AZ",{day:"numeric",month:"long",year:"numeric",hour:"2-digit",minute:"2-digit"})],
              ].map(([k,v])=>(
                <div key={k} style={{display:"flex",justifyContent:"space-between",padding:".55rem 0",borderBottom:"1px solid #F8FAFC",gap:".5rem"}}>
                  <span style={{fontSize:".75rem",color:"#94A3B8",flexShrink:0}}>{k}</span>
                  <span style={{fontSize:".8rem",fontWeight:600,textAlign:"right"}}>{v}</span>
                </div>
              ))}

              {/* Qeyd */}
              {sel.message&&(
                <div style={{marginTop:".8rem",background:"#F8FAFC",borderRadius:"8px",padding:".75rem",border:"1px solid #E2E8F0"}}>
                  <div style={{fontSize:".65rem",fontWeight:700,color:"#94A3B8",textTransform:"uppercase",letterSpacing:".08em",marginBottom:".4rem"}}>Qeyd</div>
                  <div style={{fontSize:".8rem",color:"#475569",lineHeight:1.5}}>{sel.message}</div>
                </div>
              )}

              {/* Sürətli əlaqə düymələri */}
              <div style={{marginTop:"1rem",display:"flex",gap:".5rem"}}>
                {sel.phone&&<a href={`tel:${sel.phone}`} style={{flex:1,background:"#0a1f35",color:"#fff",borderRadius:"8px",padding:".6rem",fontSize:".78rem",fontWeight:700,textAlign:"center",textDecoration:"none",display:"block"}}>📞 Zəng et</a>}
                {sel.phone&&<a href={`https://wa.me/${sel.phone.replace(/[^0-9]/g,"")}`} target="_blank" style={{flex:1,background:"#22C55E",color:"#fff",borderRadius:"8px",padding:".6rem",fontSize:".78rem",fontWeight:700,textAlign:"center",textDecoration:"none",display:"block"}}>💬 WhatsApp</a>}
              </div>

              {/* Təsdiq et düyməsi */}
              {sel.status!=="done"&&(
                <button onClick={()=>approve(sel)} disabled={approving}
                  style={{width:"100%",marginTop:"1rem",background:approving?"#94A3B8":"linear-gradient(135deg,#16A34A,#15803D)",color:"#fff",border:"none",borderRadius:"10px",padding:".85rem",fontSize:".9rem",fontWeight:800,cursor:approving?"not-allowed":"pointer",fontFamily:"inherit",boxShadow:"0 4px 16px rgba(22,163,74,.3)"}}>
                  {approving?"⏳ Yaradılır...":"✅ Təsdiq et — Hesab yarat"}
                </button>
              )}
              <div style={{fontSize:".68rem",color:"#94A3B8",textAlign:"center",margin:".5rem 0 0"}}>
                {sel.status!=="done"?"Restoran yaradılır + admin hesabı + 1 ay trial":"Bu müraciət artıq tamamlanıb ✅"}
              </div>

              {/* Status dəyiş */}
              <div style={{marginTop:"1rem"}}>
                <div style={{fontSize:".65rem",fontWeight:700,color:"#94A3B8",textTransform:"uppercase",letterSpacing:".08em",marginBottom:".5rem"}}>Status dəyiş</div>
                <div style={{display:"flex",flexDirection:"column",gap:".4rem"}}>
                  {sel.status!=="new"&&<button onClick={()=>setStatus(sel.id,"new")} disabled={saving===sel.id}
                    style={{padding:".5rem",background:"#FEF9C3",border:"1px solid #FDE047",color:"#CA8A04",borderRadius:"8px",fontSize:".78rem",fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>
                    🆕 Yeni kimi işarələ
                  </button>}
                  {sel.status!=="contacted"&&<button onClick={()=>setStatus(sel.id,"contacted")} disabled={saving===sel.id}
                    style={{padding:".5rem",background:"#d0e8f5",border:"1px solid #90bfda",color:"#1a5c8a",borderRadius:"8px",fontSize:".78rem",fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>
                    📞 Əlaqə saxlandı
                  </button>}
                  {sel.status!=="done"&&<button onClick={()=>setStatus(sel.id,"done")} disabled={saving===sel.id}
                    style={{padding:".5rem",background:"#DCFCE7",border:"1px solid #86EFAC",color:"#16A34A",borderRadius:"8px",fontSize:".78rem",fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>
                    ✅ Tamamlandı
                  </button>}
                  <button onClick={()=>deleteReq(sel.id)} disabled={saving===sel.id}
                    style={{padding:".5rem",background:"#FEF2F2",border:"1px solid #FECACA",color:"#DC2626",borderRadius:"8px",fontSize:".78rem",fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>
                    🗑️ Sil
                  </button>
                </div>
              </div>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
