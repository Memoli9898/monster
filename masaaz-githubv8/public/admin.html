const Badge = ({status}) => {
  const c = SC[status]||{bg:"#F1F5F9",text:"#64748B",border:"#CBD5E1"};
  return <span style={{fontSize:".72rem",padding:".2rem .6rem",background:c.bg,color:c.text,border:`1px solid ${c.border}`,borderRadius:"20px",fontWeight:600,whiteSpace:"nowrap"}}>{status}</span>;

// Global AudioContext — ilk user click-dən sonra yaradılır
let _audioCtx=null;
function getAudioCtx(){
  if(!_audioCtx){
    try{ _audioCtx=new(window.AudioContext||window.webkitAudioContext)(); }catch(e){}
  }
  if(_audioCtx&&_audioCtx.state==="suspended") _audioCtx.resume();
  return _audioCtx;
}
// İlk klik ilə AudioContext-i unlock et
document.addEventListener("click",()=>getAudioCtx(),{once:true});

function playSound(){
  try{
    const ctx=getAudioCtx();
    if(!ctx)return;
    // 3 pilləli zəng: Do-Mi-Sol
    [[523,0,.18],[659,.2,.18],[784,.4,.3]].forEach(([f,w,d])=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.type="triangle";o.frequency.value=f;
      g.gain.setValueAtTime(0,ctx.currentTime+w);
      g.gain.linearRampToValueAtTime(.55,ctx.currentTime+w+.04);
      g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+w+d);
      o.start(ctx.currentTime+w);o.stop(ctx.currentTime+w+d+.05);
    });
  }catch(e){}
}

async function uploadImg(file){
  const ext=file.name.split(".").pop();
  const name=`${Date.now()}.${ext}`;
  const {error}=await sb.storage.from("table-images").upload(name,file,{upsert:true});
  if(error)return{url:null,error};
  const {data}=sb.storage.from("table-images").getPublicUrl(name);
  return{url:data.publicUrl,error:null};
}

// ── MASA KANVASİ (drag & drop mövqeyi dəyişdirmə) ──────────
function TableCanvas({tables, onPositionSave}){
  const canvasRef=useRef();
  const dragging=useRef(null);
  const [positions,setPositions]=useState(()=>{
    const m={};tables.forEach(t=>{m[t.id]={x:t.x||10,y:t.y||10};});return m;
  });
  const [dirty,setDirty]=useState({});

  useEffect(()=>{
    const m={};tables.forEach(t=>{m[t.id]={x:t.x||10,y:t.y||10};});
    setPositions(m);setDirty({});
  },[tables]);

  const onMouseDown=(e,id)=>{
    e.preventDefault();
    const canvas=canvasRef.current.getBoundingClientRect();
    dragging.current={id,startX:e.clientX,startY:e.clientY,
      origX:positions[id]?.x||10,origY:positions[id]?.y||10,canvas};
    document.getElementById(`tbl-${id}`)?.classList.add("dragging");
  };

  useEffect(()=>{
    const mv=e=>{
      if(!dragging.current)return;
      const {id,startX,startY,origX,origY,canvas}=dragging.current;
      const dx=(e.clientX-startX)/canvas.width*100;
      const dy=(e.clientY-startY)/canvas.height*100;
      const nx=Math.max(0,Math.min(88,origX+dx));
      const ny=Math.max(0,Math.min(82,origY+dy));
      setPositions(p=>({...p,[id]:{x:nx,y:ny}}));
    };
    const up=async()=>{
      if(!dragging.current)return;
      const{id,origX,origY}=dragging.current;
      const pos=positions;
      document.getElementById(`tbl-${id}`)?.classList.remove("dragging");
      // Dəyişibsə saxla
      const cur=pos[id]||{x:origX,y:origY};
      if(Math.abs(cur.x-origX)>0.5||Math.abs(cur.y-origY)>0.5){
        setDirty(p=>({...p,[id]:true}));
        await sb.from("tables").update({x:Math.round(cur.x*10)/10,y:Math.round(cur.y*10)/10}).eq("id",id);
        setDirty(p=>{const n={...p};delete n[id];return n;});
        onPositionSave&&onPositionSave();
      }
      dragging.current=null;
    };
    window.addEventListener("mousemove",mv);
    window.addEventListener("mouseup",up);
    return()=>{window.removeEventListener("mousemove",mv);window.removeEventListener("mouseup",up);};
  },[positions]);

  const shapes={
    round: <svg width="60" height="68" viewBox="0 0 68 76"><rect x="16" y="1" width="36" height="14" rx="7" fill="#E2E8F0" stroke="#CBD5E1" strokeWidth="1.2"/><rect x="16" y="61" width="36" height="14" rx="7" fill="#E2E8F0" stroke="#CBD5E1" strokeWidth="1.2"/><circle cx="34" cy="38" r="22" fill="#F1F5F9" stroke="#CBD5E1" strokeWidth="1.5"/></svg>,
    rect:  <svg width="86" height="72" viewBox="0 0 96 82"><rect x="5" y="1" width="24" height="13" rx="6.5" fill="#E2E8F0" stroke="#CBD5E1" strokeWidth="1.2"/><rect x="67" y="1" width="24" height="13" rx="6.5" fill="#E2E8F0" stroke="#CBD5E1" strokeWidth="1.2"/><rect x="5" y="68" width="24" height="13" rx="6.5" fill="#E2E8F0" stroke="#CBD5E1" strokeWidth="1.2"/><rect x="67" y="68" width="24" height="13" rx="6.5" fill="#E2E8F0" stroke="#CBD5E1" strokeWidth="1.2"/><rect x="3" y="16" width="90" height="50" rx="8" fill="#F1F5F9" stroke="#CBD5E1" strokeWidth="1.5"/></svg>,
    rect6: <svg width="104" height="72" viewBox="0 0 114 82">{[4,45,86].map((x,i)=><rect key={i} x={x} y="1" width="24" height="13" rx="6.5" fill="#E2E8F0" stroke="#CBD5E1" strokeWidth="1.2"/>)}{[4,45,86].map((x,i)=><rect key={i} x={x} y="68" width="24" height="13" rx="6.5" fill="#E2E8F0" stroke="#CBD5E1" strokeWidth="1.2"/>)}<rect x="3" y="16" width="108" height="50" rx="8" fill="#F1F5F9" stroke="#CBD5E1" strokeWidth="1.5"/></svg>,
    vip:   <svg width="130" height="78" viewBox="0 0 150 88">{[4,43,82,121].map((x,i)=><rect key={i} x={x} y="1" width="24" height="13" rx="6.5" fill="#FEF3C7" stroke="#FDE68A" strokeWidth="1.2"/>)}{[4,43,82,121].map((x,i)=><rect key={i} x={x} y="74" width="24" height="13" rx="6.5" fill="#FEF3C7" stroke="#FDE68A" strokeWidth="1.2"/>)}<rect x="3" y="16" width="144" height="56" rx="10" fill="#FFFDF5" stroke="#FDE68A" strokeWidth="1.5"/></svg>,
  };

  return(
    <div style={{position:"relative"}}>
      <div ref={canvasRef}
        style={{position:"relative",width:"100%",height:"400px",background:"linear-gradient(135deg,#F8FAFC,#F1F5F9)",borderRadius:"10px",border:"1px solid #E2E8F0",overflow:"hidden"}}>
        {/* Grid lines */}
        <svg style={{position:"absolute",inset:0,width:"100%",height:"100%",pointerEvents:"none",opacity:.3}}>
          {[10,20,30,40,50,60,70,80,90].map(p=><line key={`v${p}`} x1={`${p}%`} y1="0" x2={`${p}%`} y2="100%" stroke="#CBD5E1" strokeWidth=".5" strokeDasharray="4,4"/>)}
          {[10,20,30,40,50,60,70,80,90].map(p=><line key={`h${p}`} x1="0" y1={`${p}%`} x2="100%" y2={`${p}%`} stroke="#CBD5E1" strokeWidth=".5" strokeDasharray="4,4"/>)}
        </svg>
        {tables.length===0&&(
          <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",color:"#94A3B8",fontSize:".85rem",flexDirection:"column",gap:".5rem"}}>
            <div style={{fontSize:"2rem"}}>🪑</div>
            <div>Masa yoxdur. Aşağıdan əlavə edin.</div>
          </div>
        )}
        {tables.map(t=>{
          const pos=positions[t.id]||{x:t.x||10,y:t.y||10};
          const saving=dirty[t.id];
          return(
            <div key={t.id} id={`tbl-${t.id}`} className="tbl-canvas-item"
              style={{left:`${pos.x}%`,top:`${pos.y}%`}}
              onMouseDown={e=>onMouseDown(e,t.id)}>
              <div style={{position:"relative"}}>
                {shapes[t.shape]||shapes.rect}
                {/* Label overlay */}
                <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",pointerEvents:"none"}}>
                  <div style={{fontWeight:700,fontSize:".75rem",color:"#475569"}}>{t.label}</div>
                  <div style={{fontSize:".58rem",color:"#94A3B8"}}>{t.seats}nf</div>
                </div>
                {/* Saving spinner */}
                {saving&&<div style={{position:"absolute",top:"-8px",right:"-8px"}}><Spin s={12}/></div>}
                {/* Şəkil thumbnail */}
                {t.img_url&&<img src={t.img_url} alt="" style={{position:"absolute",bottom:"-24px",left:"50%",transform:"translateX(-50%)",width:"36px",height:"26px",borderRadius:"4px",objectFit:"cover",border:"1.5px solid #fff",boxShadow:"0 2px 6px rgba(0,0,0,.15)"}}/>}
              </div>
            </div>
          );
        })}
      </div>
      <div style={{fontSize:".68rem",color:"#94A3B8",marginTop:".5rem",textAlign:"center"}}>
        💡 Masaları sürükləyərək yerlərini dəyişin — avtomatik saxlanır
      </div>
    </div>
  );
}

  const [sidebar,setSidebar]   = useState(true);
  const [updId,setUpdId]       = useState(null);
  const [fDate,setFDate]       = useState("");
  const [fStatus,setFStatus]   = useState("hamısı");
  const [fRest,setFRest]       = useState("hamısı");
  const [search,setSearch]     = useState("");
  const [restaurants,setRests] = useState([]);

  const loadRests =async()=>{const{data}=await sb.from("restaurants").select("*").order("name");setRests(data||[]);};
  const loadTbls  =async()=>{const{data}=await sb.from("tables").select("*").order("label");setAllTbls(data||[]);};

  useEffect(()=>{
    Promise.all([
      sb.from("reservations").select("*").order("created_at",{ascending:false}).then(({data})=>setRows(data||[])),
      loadRests(), loadTbls(),
    ]).then(()=>setLoading(false));

    const ch=sb.channel("admin_rt")
      .on("postgres_changes",{event:"INSERT",schema:"public",table:"reservations"},({new:r})=>{
        setRows(p=>[r,...p]);
        setNewIds(p=>{const s=new Set(p);s.add(r.id);setTimeout(()=>setNewIds(q=>{const n=new Set(q);n.delete(r.id);return n;}),5000);return s;});
        playSound();
        const nid=Date.now();
        setNotifs(p=>[...p,{id:nid,...r}]);
        setBellRing(true);setTimeout(()=>setBellRing(false),700);
        setUnread(p=>p+1);
      })
      .on("postgres_changes",{event:"UPDATE",schema:"public",table:"reservations"},({new:r})=>{
        setRows(p=>p.map(x=>x.id===r.id?r:x));
        setSel(p=>p?.id===r.id?r:p);
      })
      .subscribe();
    return()=>sb.removeChannel(ch);
  },[]);

  const updStatus=async(id,s)=>{

    setRows(p=>p.map(r=>r.id===id?{...r,status:s}:r));

    setUpdId(null);
  };

  const todayGuests = todayRows.filter(r=>r.status!=="ləğv edildi").reduce((s,r)=>s+r.guests,0);
  const todayRev    = todayRows.reduce((s,r)=>s+(r.pre_order_total||0),0);
  const waiting     = rows.filter(r=>r.status==="gözlənilir").length;
  const restNames   = restaurants.map(r=>r.name);

  const filtered=useMemo(()=>rows.filter(r=>{
    if(fDate&&r.date!==fDate)return false;
    if(fStatus!=="hamısı"&&r.status!==fStatus)return false;
    if(fRest!=="hamısı"&&r.restaurant_name!==fRest)return false;

  const nav=[
    {id:"dashboard",icon:"📊",label:"Dashboard"},

        <nav style={{padding:".8rem .5rem",flex:1}}>
          {nav.map(item=>(
            <div key={item.id} className="si" onClick={()=>setPage(item.id)}
              style={{display:"flex",alignItems:"center",gap:".7rem",padding:".65rem .7rem",borderRadius:"8px",marginBottom:".2rem",cursor:"pointer",background:page===item.id?"rgba(59,130,246,.2)":"transparent",borderLeft:page===item.id?"3px solid #3B82F6":"3px solid transparent",position:"relative"}}>
              <span style={{fontSize:"1.1rem",flexShrink:0}}>{item.icon}</span>
              {sidebar&&<span style={{fontSize:".85rem",fontWeight:page===item.id?700:500,color:page===item.id?"#60A5FA":"#94A3B8",whiteSpace:"nowrap"}}>{item.label}</span>}
              {item.id==="reservations"&&waiting>0&&<span style={{position:"absolute",right:"8px",top:"50%",transform:"translateY(-50%)",background:"#EF4444",color:"#fff",borderRadius:"20px",fontSize:".6rem",fontWeight:700,padding:".1rem .4rem"}}>{waiting}</span>}
            </div>
          ))}
        </nav>
        <div onClick={()=>setSidebar(p=>!p)} style={{padding:"1rem",borderTop:"1px solid rgba(255,255,255,.06)",display:"flex",justifyContent:sidebar?"flex-end":"center",cursor:"pointer"}}>
          <span style={{color:"#475569"}}>{sidebar?"◀":"▶"}</span>
        </div>
      </aside>

      {/* MAIN */}
      <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
        <header style={{background:"#fff",borderBottom:"1px solid #E2E8F0",height:"64px",display:"flex",alignItems:"center",justifyContent:"space-between",padding:"0 1.5rem",flexShrink:0}}>
          <div style={{fontWeight:700,fontSize:"1rem"}}>
            {{dashboard:"Dashboard",reservations:"Rezervasiyalar",tables:"Masalar",manage:"İdarəetmə"}[page]}
          </div>
          <div style={{display:"flex",alignItems:"center",gap:"1rem"}}>
            {waiting>0&&(
              <div onClick={()=>{setFStatus("gözlənilir");setPage("reservations");}} style={{background:"#FEF9C3",border:"1px solid #FDE047",borderRadius:"20px",padding:".35rem .9rem",fontSize:".78rem",fontWeight:700,color:"#92400E",cursor:"pointer"}}>
                ⚠️ {waiting} cavab verilməyən
              </div>
            )}
            <div style={{fontSize:".75rem",color:"#94A3B8"}}>{new Date().toLocaleDateString("az-AZ",{weekday:"long",day:"numeric",month:"long"})}</div>
          </div>
        </header>

        <main style={{flex:1,overflow:"auto",padding:"1.5rem"}}>
          {loading&&(
            <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"60vh",flexDirection:"column",gap:"1rem"}}>
              <Spin s={36}/><div style={{color:"#94A3B8",fontSize:".85rem"}}>Yüklənir...</div>
            </div>
          )}

          {!loading&&page==="dashboard"&&<DashPage todayRows={todayRows} todayGuests={todayGuests} todayRev={todayRev} waiting={waiting} rows={rows} newIds={newIds} setSel={setSel} setPage={setPage} restaurants={restaurants} allTables={allTables}/>}
          {!loading&&page==="reservations"&&<ResPage filtered={filtered} sel={sel} setSel={setSel} newIds={newIds} updId={updId} updStatus={updStatus} fDate={fDate} setFDate={setFDate} fStatus={fStatus} setFStatus={setFStatus} fRest={fRest} setFRest={setFRest} search={search} setSearch={setSearch} restNames={restNames} todayRows={todayRows}/>}
          {!loading&&page==="tables"&&<TblsPage restaurants={restaurants} allTables={allTables} todayRows={todayRows} updStatus={updStatus} updId={updId} reloadTbls={loadTbls}/>}
          {!loading&&page==="manage"&&<ManagePage restaurants={restaurants} allTables={allTables} reload={()=>{loadRests();loadTbls();}}/>}
        </main>
      </div>
    </div>
  );
}

// ════════════════════════════════════════════════════════════
// DASHBOARD
// ════════════════════════════════════════════════════════════
function DashPage({todayRows,todayGuests,todayRev,waiting,rows,newIds,setSel,setPage,restaurants,allTables}){
  const today=new Date().toISOString().split("T")[0];
  const [selRest,setSelRest]=useState("hamısı");
  const restNames=restaurants.map(r=>r.name);
  const tbls=useMemo(()=>{
    if(selRest==="hamısı")return[];
    const rid=restaurants.find(r=>r.name===selRest)?.id;
    return allTables.filter(t=>t.restaurant_id===rid).map(t=>{
      const bk=todayRows.filter(r=>r.restaurant_name===selRest&&r.table_label===t.label&&r.status!=="ləğv edildi");
      return{...t,busy:bk.length>0,booking:bk[0]};
    });
  },[selRest,restaurants,allTables,todayRows]);

  return(
    <div>
      <div style={{marginBottom:"1.5rem"}}>
        <div style={{fontSize:"1.4rem",fontWeight:800,letterSpacing:"-.02em",marginBottom:".2rem"}}>Dashboard</div>
        <div style={{fontSize:".8rem",color:"#94A3B8"}}>Canlı məlumatlar · real-time</div>
      </div>
      <div style={{display:"flex",gap:"1rem",flexWrap:"wrap",marginBottom:"1.5rem"}}>
        {[{icon:"📅",l:"Bu gün rezerv",v:todayRows.length,s:`${waiting} gözləyir`},
          {icon:"👥",l:"Bu gün qonaq",v:todayGuests,s:"nəfər",c:"#2563EB"},
          {icon:"⏳",l:"Cavab gözləyən",v:waiting,s:"tezliklə cavabla",c:"#CA8A04"},
          {icon:"💰",l:"Ön sifarişlər",v:`${todayRev}₼`,s:"bu gün",c:"#16A34A"},
          {icon:"📊",l:"Cəmi rezerv",v:rows.length,s:"bütün vaxtlar",c:"#7C3AED"},
        ].map(s=>(
          <div key={s.l} style={{background:"#fff",borderRadius:"12px",padding:"1.2rem 1.4rem",border:"1px solid #E2E8F0",flex:1,minWidth:"130px"}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:".8rem"}}>
              <div style={{fontSize:".68rem",fontWeight:600,letterSpacing:".08em",textTransform:"uppercase",color:"#94A3B8"}}>{s.l}</div>
              <div style={{fontSize:"1.3rem"}}>{s.icon}</div>
            </div>
            <div style={{fontSize:"2rem",fontWeight:800,letterSpacing:"-.03em",color:s.c||"#0F172A",marginBottom:".2rem"}}>{s.v}</div>
            <div style={{fontSize:".72rem",color:"#94A3B8"}}>{s.s}</div>
          </div>
        ))}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"1.5rem"}}>
        <div style={{background:"#fff",borderRadius:"14px",border:"1px solid #E2E8F0",overflow:"hidden"}}>
          <div style={{padding:"1rem 1.2rem",borderBottom:"1px solid #F1F5F9",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div style={{fontWeight:700,fontSize:".9rem"}}>Bu günün rezervasiyaları</div>
            <span style={{fontSize:".7rem",background:"#EFF6FF",color:"#2563EB",padding:".2rem .6rem",borderRadius:"20px",fontWeight:600}}>{todayRows.length}</span>
          </div>
          <div style={{maxHeight:"360px",overflowY:"auto"}}>
            {todayRows.length===0
              ?<div style={{padding:"2rem",textAlign:"center",color:"#94A3B8",fontSize:".85rem"}}>Bu gün üçün rezervasiya yoxdur</div>
              :todayRows.map(r=>(
                <div key={r.id} className={`rh ${newIds.has(r.id)?"new-row":""}`}
                  onClick={()=>{setSel(r);setPage("reservations");}}
                  style={{padding:".85rem 1.2rem",borderBottom:"1px solid #F8FAFC",display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer"}}>
                  <div>
                    <div style={{fontWeight:600,fontSize:".88rem",marginBottom:".15rem"}}>{r.name}</div>
                    <div style={{fontSize:".72rem",color:"#64748B"}}>⏰ {r.time} · {r.restaurant_name} · Masa {r.table_label} · {r.guests} nf</div>
                  </div>
                  <Badge status={r.status}/>
                </div>
              ))
            }
          </div>
        </div>
        <div style={{background:"#fff",borderRadius:"14px",border:"1px solid #E2E8F0",overflow:"hidden"}}>
          <div style={{padding:"1rem 1.2rem",borderBottom:"1px solid #F1F5F9",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div style={{fontWeight:700,fontSize:".9rem"}}>Masa vəziyyəti</div>
            <select value={selRest} onChange={e=>setSelRest(e.target.value)} style={{border:"1px solid #E2E8F0",borderRadius:"6px",padding:".2rem .5rem",fontSize:".72rem",outline:"none",background:"#fff"}}>
              <option value="hamısı">Restoran seç...</option>
              {restNames.map(n=><option key={n} value={n}>{n}</option>)}
            </select>
          </div>
          <div style={{padding:"1rem",display:"grid",gridTemplateColumns:"1fr 1fr",gap:".6rem",maxHeight:"320px",overflowY:"auto"}}>
            {selRest==="hamısı"
              ?<div style={{gridColumn:"1/-1",textAlign:"center",color:"#94A3B8",fontSize:".8rem",padding:"1rem"}}>Restoran seçin</div>
              :tbls.length===0
                ?<div style={{gridColumn:"1/-1",textAlign:"center",color:"#94A3B8",fontSize:".8rem",padding:"1rem"}}>Masa tapılmadı</div>
                :tbls.map(t=>(
                  <div key={t.id} style={{padding:".7rem .9rem",borderRadius:"10px",background:t.busy?"#FEF2F2":"#F0FDF4",border:`1px solid ${t.busy?"#FECACA":"#86EFAC"}`}}>
                    <div style={{display:"flex",justifyContent:"space-between"}}>
                      <span style={{fontWeight:700,fontSize:".88rem",color:t.busy?"#DC2626":"#16A34A"}}>Masa {t.label}</span>
                      <span style={{fontSize:".65rem",color:t.busy?"#DC2626":"#16A34A",fontWeight:600}}>{t.busy?"Dolu":"Boş"}</span>
                    </div>
                    <div style={{fontSize:".68rem",color:"#64748B"}}>{t.zone} · {t.seats} nf</div>
                    {t.busy&&t.booking&&<div style={{fontSize:".65rem",color:"#EF4444",marginTop:".2rem"}}>{t.booking.time} — {t.booking.name}</div>}
                  </div>
                ))
            }
          </div>
        </div>
      </div>
    </div>
  );
}

// ════════════════════════════════════════════════════════════
// RƏZERVASİYALAR
// ════════════════════════════════════════════════════════════
function ResPage({filtered,sel,setSel,newIds,updId,updStatus,fDate,setFDate,fStatus,setFStatus,fRest,setFRest,search,setSearch,restNames}){
  return(
    <div style={{display:"flex",gap:"1.5rem",height:"calc(100vh - 130px)"}}>
      <div style={{flex:1,display:"flex",flexDirection:"column",background:"#fff",borderRadius:"14px",border:"1px solid #E2E8F0",overflow:"hidden"}}>
        <div style={{padding:"1rem",borderBottom:"1px solid #F1F5F9",display:"flex",gap:".6rem",flexWrap:"wrap",alignItems:"center"}}>
          <input placeholder="🔍 Ad, telefon..." value={search} onChange={e=>setSearch(e.target.value)} style={{border:"1px solid #E2E8F0",borderRadius:"8px",padding:".45rem .8rem",fontSize:".8rem",outline:"none",flex:1,minWidth:"120px"}}/>
          <input type="date" value={fDate} onChange={e=>setFDate(e.target.value)} style={{border:"1px solid #E2E8F0",borderRadius:"8px",padding:".45rem .8rem",fontSize:".8rem",outline:"none",color:"#0F172A"}}/>
          <select value={fRest} onChange={e=>setFRest(e.target.value)} style={{border:"1px solid #E2E8F0",borderRadius:"8px",padding:".45rem .8rem",fontSize:".8rem",outline:"none",background:"#fff"}}>
            <option value="hamısı">Bütün restoranlar</option>
            {restNames.map(n=><option key={n} value={n}>{n}</option>)}
          </select>
          <select value={fStatus} onChange={e=>setFStatus(e.target.value)} style={{border:"1px solid #E2E8F0",borderRadius:"8px",padding:".45rem .8rem",fontSize:".8rem",outline:"none",background:"#fff"}}>
            {["hamısı","gözlənilir","təsdiqləndi","gəldi","ləğv edildi"].map(s=><option key={s} value={s}>{s}</option>)}
          </select>
          {(fDate||fStatus!=="hamısı"||fRest!=="hamısı"||search)&&(
            <button className="btn" onClick={()=>{setFDate("");setFStatus("hamısı");setFRest("hamısı");setSearch("");}} style={{border:"1px solid #FECACA",background:"#FEF2F2",color:"#DC2626",borderRadius:"8px",padding:".45rem .8rem",fontSize:".75rem",fontWeight:600}}>Sıfırla ✕</button>
          )}
        </div>
        <div style={{padding:".4rem 1rem",background:"#F8FAFC",borderBottom:"1px solid #F1F5F9",fontSize:".72rem",color:"#94A3B8"}}>{filtered.length} nəticə</div>
        <div style={{overflowY:"auto",flex:1}}>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:".82rem"}}>
            <thead>
              <tr style={{background:"#F8FAFC"}}>
                {["Ad","Restoran","Tarix/Saat","Masa","Qonaq","Status","Ön sifariş"].map(h=>(
                  <th key={h} style={{padding:".7rem .8rem",textAlign:"left",fontWeight:600,fontSize:".68rem",letterSpacing:".05em",textTransform:"uppercase",color:"#94A3B8",borderBottom:"1px solid #E2E8F0",whiteSpace:"nowrap"}}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {filtered.map(r=>(
                <tr key={r.id} className={`rh ${newIds.has(r.id)?"new-row":""}`} onClick={()=>setSel(r)}
                  style={{borderBottom:"1px solid #F8FAFC",cursor:"pointer",background:sel?.id===r.id?"#EFF6FF":""}}>
                  <td style={{padding:".75rem .8rem"}}><div style={{fontWeight:600,fontSize:".85rem"}}>{r.name}</div><div style={{fontSize:".68rem",color:"#94A3B8"}}>{r.phone}</div></td>
                  <td style={{padding:".75rem .8rem",fontSize:".75rem",color:"#64748B"}}>{r.restaurant_name}</td>
                  <td style={{padding:".75rem .8rem",color:"#64748B"}}><div style={{fontWeight:500}}>{r.date}</div><div style={{fontSize:".72rem"}}>{r.time}</div></td>
                  <td style={{padding:".75rem .8rem"}}><span style={{background:"#F1F5F9",padding:".18rem .5rem",borderRadius:"6px",fontWeight:600,fontSize:".75rem"}}>{r.table_label}</span></td>
                  <td style={{padding:".75rem .8rem",color:"#64748B",textAlign:"center"}}>{r.guests}</td>
                  <td style={{padding:".75rem .8rem"}}><div style={{display:"flex",alignItems:"center",gap:".4rem"}}><Badge status={r.status}/>{updId===r.id&&<Spin/>}</div></td>
                  <td style={{padding:".75rem .8rem",color:r.pre_order_total?"#16A34A":"#CBD5E1",fontWeight:r.pre_order_total?700:400}}>{r.pre_order_total?`${r.pre_order_total}₼`:"—"}</td>
                </tr>
              ))}
            </tbody>
          </table>
          {filtered.length===0&&<div style={{padding:"3rem",textAlign:"center",color:"#94A3B8"}}><div style={{fontSize:"2rem",marginBottom:".5rem"}}>🔍</div><div style={{fontWeight:600}}>Nəticə tapılmadı</div></div>}
        </div>
      </div>
      {sel&&(
        <div style={{width:"300px",background:"#fff",borderRadius:"14px",border:"1px solid #E2E8F0",flexShrink:0,overflow:"hidden",display:"flex",flexDirection:"column"}}>
          <div style={{padding:"1rem 1.2rem",borderBottom:"1px solid #F1F5F9",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div style={{fontWeight:700,fontSize:".9rem"}}>Detallar</div>
            <button onClick={()=>setSel(null)} style={{background:"none",border:"none",cursor:"pointer",fontSize:"1.1rem",color:"#94A3B8"}}>✕</button>
          </div>
          <div style={{padding:"1.2rem",flex:1,overflowY:"auto"}}>
            <div style={{fontWeight:800,fontSize:"1.1rem",marginBottom:".15rem"}}>{sel.name}</div>
            <div style={{fontSize:".72rem",color:"#64748B",marginBottom:".15rem"}}>{sel.phone}</div>
            <div style={{fontSize:".72rem",color:"#94A3B8",marginBottom:".5rem"}}>{sel.restaurant_name}</div>
            <div style={{display:"flex",alignItems:"center",gap:".5rem",marginBottom:"1rem"}}><Badge status={sel.status}/>{updId===sel.id&&<Spin/>}</div>
            {[["📅 Tarix",sel.date],["⏰ Saat",sel.time],["🪑 Masa",`Masa ${sel.table_label}`],["👥 Qonaq",`${sel.guests} nəfər`],["💰 Ön sifariş",sel.pre_order_total?`${sel.pre_order_total}₼`:"Yoxdur"]].map(([k,v])=>(
              <div key={k} style={{padding:".65rem 0",borderBottom:"1px solid #F8FAFC",display:"flex",justifyContent:"space-between"}}>
                <span style={{fontSize:".75rem",color:"#94A3B8"}}>{k}</span>
                <span style={{fontSize:".8rem",fontWeight:600}}>{v}</span>
              </div>
            ))}
            {sel.pre_order_items?.length>0&&(
              <div style={{marginTop:".8rem",background:"#F8FAFC",borderRadius:"8px",padding:".75rem"}}>
                <div style={{fontSize:".62rem",fontWeight:700,color:"#94A3B8",textTransform:"uppercase",letterSpacing:".08em",marginBottom:".5rem"}}>Ön sifarişlər</div>
                {sel.pre_order_items.map((item,i)=>(
                  <div key={i} style={{display:"flex",justifyContent:"space-between",fontSize:".78rem",marginBottom:".2rem"}}>
                    <span>{item.name} x{item.qty}</span><span style={{fontWeight:600}}>{item.price*item.qty}₼</span>
                  </div>
                ))}
              </div>
            )}
            <div style={{marginTop:"1.2rem"}}>
              <div style={{fontSize:".65rem",fontWeight:700,color:"#94A3B8",textTransform:"uppercase",letterSpacing:".08em",marginBottom:".6rem"}}>Status dəyiş</div>
              <div style={{display:"flex",flexDirection:"column",gap:".4rem"}}>
                {["gözlənilir","təsdiqləndi","gəldi","ləğv edildi"].map(s=>{
                  const c=SC[s];const active=sel.status===s;
                  return(
                    <button key={s} className="btn" disabled={updId===sel.id} onClick={()=>!active&&updStatus(sel.id,s)}
                      style={{padding:".55rem .8rem",borderRadius:"8px",border:`1px solid ${active?c.border:"#E2E8F0"}`,background:active?c.bg:"#fff",color:active?c.text:"#64748B",fontFamily:"inherit",fontSize:".78rem",fontWeight:active?700:500,textAlign:"left",cursor:active?"default":"pointer"}}>
                      {active?"✓ ":""}{s}
                    </button>
                  );
                })}
              </div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ════════════════════════════════════════════════════════════
// MASALAR PAGİNİ — Drag & Drop kanvas + kart siyahısı
// ════════════════════════════════════════════════════════════
function TblsPage({restaurants,allTables,todayRows,updStatus,updId,reloadTbls}){
  const [selRest,setSelRest]=useState("hamısı");
  const restNames=restaurants.map(r=>r.name);
  const restTbls=useMemo(()=>{
    if(selRest==="hamısı")return[];
    const rid=restaurants.find(r=>r.name===selRest)?.id;
    return allTables.filter(t=>t.restaurant_id===rid);
  },[selRest,restaurants,allTables]);

  const tblStatus=restTbls.map(t=>{
    const bk=todayRows.filter(r=>r.restaurant_name===selRest&&r.table_label===t.label&&r.status!=="ləğv edildi");
    return{...t,bookings:bk,busy:bk.length>0};
  });

  return(
    <div>
      <div style={{marginBottom:"1.5rem",display:"flex",justifyContent:"space-between",alignItems:"flex-end"}}>
        <div>
          <div style={{fontSize:"1.4rem",fontWeight:800,letterSpacing:"-.02em",marginBottom:".2rem"}}>Masalar</div>
          <div style={{fontSize:".8rem",color:"#94A3B8"}}>Masa planı + bugünkü vəziyyət</div>
        </div>
        <select value={selRest} onChange={e=>setSelRest(e.target.value)} style={{border:"1px solid #E2E8F0",borderRadius:"8px",padding:".5rem .8rem",fontSize:".82rem",outline:"none",background:"#fff"}}>
          <option value="hamısı">Restoran seç...</option>
          {restNames.map(n=><option key={n} value={n}>{n}</option>)}
        </select>
      </div>

      {selRest==="hamısı"
        ?<div style={{background:"#fff",borderRadius:"14px",border:"1px solid #E2E8F0",padding:"3rem",textAlign:"center",color:"#94A3B8"}}>Yuxarıdan restoran seçin</div>
        :<div>
          {/* DRAG & DROP KANVAS */}
          <div style={{background:"#fff",borderRadius:"14px",border:"1px solid #E2E8F0",padding:"1.2rem",marginBottom:"1.5rem"}}>
            <div style={{fontWeight:700,fontSize:".9rem",marginBottom:"1rem"}}>Restoran planı — sürükləyib mövqe dəyişin</div>
            <TableCanvas tables={restTbls} onPositionSave={reloadTbls}/>
          </div>

          {/* KART SİYAHISI */}
          {tblStatus.length===0
            ?<div style={{background:"#fff",borderRadius:"14px",border:"1px solid #E2E8F0",padding:"3rem",textAlign:"center",color:"#94A3B8"}}>Bu restoran üçün masa tapılmadı. "İdarəetmə" bölməsindən əlavə edin.</div>
            :<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(240px,1fr))",gap:"1rem"}}>
              {tblStatus.map(t=>(
                <div key={t.id} style={{background:"#fff",borderRadius:"14px",border:`2px solid ${t.busy?"#FECACA":"#86EFAC"}`,overflow:"hidden"}}>
                  {t.img_url&&<img src={t.img_url} alt={t.label} style={{width:"100%",height:"120px",objectFit:"cover"}}/>}
                  <div style={{padding:"1rem 1.2rem",background:t.busy?"#FEF2F2":"#F0FDF4",borderBottom:`1px solid ${t.busy?"#FECACA":"#86EFAC"}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <div>
                      <div style={{fontWeight:800,fontSize:"1.1rem",color:t.busy?"#DC2626":"#16A34A"}}>Masa {t.label}</div>
                      <div style={{fontSize:".72rem",color:"#64748B"}}>{t.zone} · {t.seats} nəfərlik · {t.shape}</div>
                    </div>
                    <div style={{fontSize:"1.6rem"}}>{t.busy?"🔴":"🟢"}</div>
                  </div>
                  <div style={{padding:"1rem 1.2rem"}}>
                    {t.bookings.length===0
                      ?<div style={{color:"#94A3B8",fontSize:".8rem",textAlign:"center",padding:".5rem 0"}}>Bu gün boşdur</div>
                      :t.bookings.map(r=>(
                        <div key={r.id} style={{marginBottom:".6rem",padding:".65rem",background:"#F8FAFC",borderRadius:"8px",border:"1px solid #E2E8F0"}}>
                          <div style={{display:"flex",justifyContent:"space-between",marginBottom:".2rem"}}>
                            <span style={{fontWeight:600,fontSize:".82rem"}}>{r.name}</span>
                            <span style={{fontSize:".72rem",color:"#64748B"}}>⏰ {r.time}</span>
                          </div>
                          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:".35rem"}}>
                            <span style={{fontSize:".72rem",color:"#64748B"}}>{r.guests} nəfər</span>
                            <Badge status={r.status}/>
                          </div>
                          {r.status==="gözlənilir"&&(
                            <div style={{display:"flex",gap:".4rem"}}>
                              <button className="btn" onClick={()=>updStatus(r.id,"təsdiqləndi")} disabled={updId===r.id} style={{flex:1,padding:".3rem",background:"#DCFCE7",border:"1px solid #86EFAC",color:"#16A34A",borderRadius:"6px",fontSize:".68rem",fontWeight:600,cursor:"pointer"}}>Təsdiqlə</button>
                              <button className="btn" onClick={()=>updStatus(r.id,"ləğv edildi")} disabled={updId===r.id} style={{flex:1,padding:".3rem",background:"#FEE2E2",border:"1px solid #FCA5A5",color:"#DC2626",borderRadius:"6px",fontSize:".68rem",fontWeight:600,cursor:"pointer"}}>Ləğv et</button>
                            </div>
                          )}
                          {r.status==="təsdiqləndi"&&(
                            <button className="btn" onClick={()=>updStatus(r.id,"gəldi")} disabled={updId===r.id} style={{width:"100%",padding:".3rem",background:"#DBEAFE",border:"1px solid #93C5FD",color:"#2563EB",borderRadius:"6px",fontSize:".68rem",fontWeight:600,cursor:"pointer"}}>Gəldi ✓</button>
                          )}
                        </div>
                      ))
                    }
                  </div>
                </div>
              ))}
            </div>
          }
        </div>
      }
    </div>
  );
}

// ════════════════════════════════════════════════════════════
// İDARƏETMƏ — Restoran + Masa + Menyu
// ════════════════════════════════════════════════════════════
function ManagePage({restaurants,allTables,reload}){
  const [tab,setTab]=useState("restaurants");
  const [saving,setSaving]=useState(false);
  const [msg,setMsg]=useState(null);
  const showMsg=(text,ok=true)=>{setMsg({text,ok});setTimeout(()=>setMsg(null),3500);};

  // ── Restoran form ──
  const [editR,setEditR]=useState(null);
  const [rName,setRName]=useState("");const [rCuisine,setRC]=useState("");const [rLoc,setRL]=useState("");
  const [rEmoji,setRE]=useState("🍽️");const [rAccent,setRA]=useState("#E63946");const [rTags,setRT]=useState("");
  const [rRating,setRRat]=useState("4.5");const [rPrice,setRP]=useState("₼₼");const [rAvail,setRAvl]=useState(true);

  const fillR=r=>{setEditR(r);setRName(r.name);setRC(r.cuisine||"");setRL(r.location||"");setRE(r.emoji||"🍽️");setRA(r.accent||"#E63946");setRT((r.tags||[]).join(", "));setRRat(String(r.rating||4.5));setRP(r.price_range||"₼₼");setRAvl(r.available!==false);};
  const clearR=()=>{setEditR(null);setRName("");setRC("");setRL("");setRE("🍽️");setRA("#E63946");setRT("");setRRat("4.5");setRP("₼₼");setRAvl(true);};
  const saveR=async()=>{
    if(!rName.trim()){showMsg("Ad mütləqdir",false);return;}
    setSaving(true);
    try{
      const payload={name:rName.trim(),cuisine:rCuisine,location:rLoc,emoji:rEmoji,accent:rAccent,tags:rTags.split(",").map(t=>t.trim()).filter(Boolean),rating:parseFloat(rRating)||4.5,price_range:rPrice,available:rAvail};
      if(editR){
        const{error}=await sb.from("restaurants").update(payload).eq("id",editR.id);
        if(error)throw error;
        setSaving(false);clearR();reload();showMsg("Yeniləndi ✓");
      } else {
        const{data,error}=await sb.from("restaurants").insert(payload).select().single();
        if(error)throw error;
        setSaving(false);clearR();reload();
        showMsg("Restoran əlavə edildi ✓ — İndi masa əlavə edin!");
        // Yeni restoranı seç, Masalar tabına keç
        if(data){setLastNewRestId(String(data.id));setTRId(String(data.id));}
        setTab("tables");
      }
    }catch(e){
      setSaving(false);
      showMsg("Xəta: "+(e.message||"bilinmir"),false);
    }
  };
  const delR=async id=>{
    if(!confirm("Bu restoranı silmək istəyirsiniz?"))return;
    await sb.from("tables").delete().eq("restaurant_id",id);
    await sb.from("restaurants").delete().eq("id",id);
    reload();showMsg("Silindi ✓");
  };

  // ── Masa form ──
  const [editT,setEditT]=useState(null);
  const [tRestId,setTRId]=useState("");const [tLabel,setTLbl]=useState("");const [tSeats,setTSeat]=useState("4");
  const [tZone,setTZ]=useState("");const [tShape,setTSh]=useState("rect");
  const [tX,setTX]=useState("20");const [tY,setTY]=useState("20");
  const [tImg,setTImg]=useState("");

  const fillT=t=>{setEditT(t);setTRId(String(t.restaurant_id));setTLbl(t.label);setTSeat(String(t.seats));setTZ(t.zone||"");setTSh(t.shape||"rect");setTX(String(t.x||20));setTY(String(t.y||20));setTImg(t.img_url||"");};
  const clearT=()=>{setEditT(null);setTRId("");setTLbl("");setTSeat("4");setTZ("");setTSh("rect");setTX("20");setTY("20");setTImg("");};
  const saveT=async()=>{
    if(!tRestId||!tLabel.trim()){showMsg("Restoran və label mütləqdir",false);return;}
    setSaving(true);
    try{
      const payload={restaurant_id:parseInt(tRestId),label:tLabel.trim(),seats:parseInt(tSeats)||4,zone:tZone,shape:tSh,x:parseFloat(tX)||20,y:parseFloat(tY)||20,img_url:tImg||null};
      if(editT){
        const{error}=await sb.from("tables").update(payload).eq("id",editT.id);
        if(error)throw error;
        setSaving(false);clearT();reload();showMsg("Yeniləndi ✓");
      } else {
        const{error}=await sb.from("tables").insert(payload);
        if(error)throw error;
        setSaving(false);
        // restoran ID-ni saxla, menu tabına keç
        const savedRestId=tRestId;
        clearT();reload();
        showMsg("Masa əlavə edildi ✓ — İndi menyu əlavə edin!");
        setMenuRest(savedRestId);
        setTab("menu");
      }
    }catch(e){
      setSaving(false);
      showMsg("Xəta: "+(e.message||"Masa əlavə edilmədi. Supabase SQL-i işlətdinizmi?"),false);
    }
  };
  const delT=async id=>{
    if(!confirm("Bu masanı silmək istəyirsiniz?"))return;
    await sb.from("tables").delete().eq("id",id);
    reload();showMsg("Silindi ✓");
  };

  // ── Menyu ──
  const [menuRest,setMenuRest]=useState("");
  const [menuItems,setMenuItems]=useState([]);
  const [mName,setMN]=useState("");const [mDesc,setMD]=useState("");const [mPrice,setMP]=useState("");
  const [mCat,setMC]=useState("");const [mEmoji,setME]=useState("🍽️");
  const [menuSaving,setMenuSaving]=useState(false);

  useEffect(()=>{
    if(!menuRest)return;
    const r=restaurants.find(x=>String(x.id)===menuRest);
    setMenuItems(Array.isArray(r?.menu_items)?r.menu_items:[]);
  },[menuRest,restaurants]);

  const addMenuItem=async()=>{
    if(!menuRest||!mName.trim()||!mPrice){showMsg("Ad və qiymət mütləqdir",false);return;}
    setMenuSaving(true);
    const newItem={id:Date.now(),name:mName.trim(),desc:mDesc,price:parseFloat(mPrice)||0,cat:mCat||"Digər",emoji:mEmoji};
    const updated=[...menuItems,newItem];
    await sb.from("restaurants").update({menu_items:updated}).eq("id",parseInt(menuRest));
    setMenuItems(updated);
    reload();
    setMN("");setMD("");setMP("");setMC("");setME("🍽️");
    setMenuSaving(false);showMsg("Menyu əlavə edildi ✓");
  };
  const delMenuItem=async item=>{
    const updated=menuItems.filter(m=>m.id!==item.id);
    await sb.from("restaurants").update({menu_items:updated}).eq("id",parseInt(menuRest));
    setMenuItems(updated);reload();showMsg("Silindi ✓");
  };

  const inp={border:"1px solid #E2E8F0",borderRadius:"8px",padding:".55rem .8rem",fontSize:".88rem",outline:"none",width:"100%",color:"#0F172A"};
  const lbl={fontSize:".68rem",fontWeight:700,letterSpacing:".08em",textTransform:"uppercase",color:"#94A3B8",marginBottom:".3rem",display:"block"};

  return(
    <div>
      <div style={{marginBottom:"1.5rem"}}>
        <div style={{fontSize:"1.4rem",fontWeight:800,letterSpacing:"-.02em",marginBottom:".2rem"}}>İdarəetmə</div>
        <div style={{fontSize:".8rem",color:"#94A3B8"}}>Restoran, masa və menyu idarəsi</div>
      </div>
      {msg&&<div style={{padding:".75rem 1rem",borderRadius:"10px",marginBottom:"1rem",background:msg.ok?"#F0FDF4":"#FEF2F2",color:msg.ok?"#16A34A":"#DC2626",border:`1px solid ${msg.ok?"#86EFAC":"#FECACA"}`,fontWeight:600,fontSize:".85rem"}}>{msg.text}</div>}

      {/* Tabs */}
      <div style={{display:"flex",gap:".5rem",marginBottom:"1.5rem",flexWrap:"wrap",alignItems:"center"}}>
        {[{id:"restaurants",l:"🏛️ Restoranlar"},{id:"tables",l:"🪑 Masalar"},{id:"menu",l:"🍽️ Menyu"}].map((t,i)=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{padding:".6rem 1.2rem",borderRadius:"8px",border:"1px solid "+(tab===t.id?"#3B82F6":"#E2E8F0"),background:tab===t.id?"#EFF6FF":"#fff",color:tab===t.id?"#2563EB":"#64748B",fontFamily:"inherit",fontSize:".85rem",fontWeight:tab===t.id?700:500,cursor:"pointer"}}>
            {t.l}{i<2?" →":""}
          </button>
        ))}
      </div>

      {/* ── RESTORANLAR ── */}
      {tab==="restaurants"&&(
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"1.5rem"}}>
          <div style={{background:"#fff",borderRadius:"14px",border:"1px solid #E2E8F0",padding:"1.4rem"}}>
            <div style={{fontWeight:700,fontSize:".95rem",marginBottom:"1.2rem"}}>{editR?"Restoranı düzəlt":"Yeni restoran"}</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:".8rem",marginBottom:".8rem"}}>
              <div style={{gridColumn:"1/-1"}}><label style={lbl}>Ad *</label><input style={inp} value={rName} onChange={e=>setRName(e.target.value)} placeholder="Nargiz"/></div>
              <div><label style={lbl}>Mətbəx</label><input style={inp} value={rCuisine} onChange={e=>setRC(e.target.value)} placeholder="Azərbaycan"/></div>
              <div><label style={lbl}>Emoji</label><input style={inp} value={rEmoji} onChange={e=>setRE(e.target.value)} placeholder="🏛️"/></div>
              <div style={{gridColumn:"1/-1"}}><label style={lbl}>Ünvan</label><input style={inp} value={rLoc} onChange={e=>setRL(e.target.value)} placeholder="Nizami küçəsi, Bakı"/></div>
              <div><label style={lbl}>Rəng</label>
                <div style={{display:"flex",gap:".5rem",alignItems:"center"}}>
                  <input type="color" value={rAccent} onChange={e=>setRA(e.target.value)} style={{width:"40px",height:"38px",border:"1px solid #E2E8F0",borderRadius:"8px",cursor:"pointer",padding:"2px"}}/>
                  <input style={{...inp,flex:1}} value={rAccent} onChange={e=>setRA(e.target.value)}/>
                </div>
              </div>
              <div><label style={lbl}>Qiymət</label>
                <select style={inp} value={rPrice} onChange={e=>setRP(e.target.value)}>{["₼","₼₼","₼₼₼","₼₼₼₼"].map(p=><option key={p} value={p}>{p}</option>)}</select>
              </div>
              <div><label style={lbl}>Reytinq</label><input style={inp} type="number" min="1" max="5" step="0.1" value={rRating} onChange={e=>setRRat(e.target.value)}/></div>
              <div style={{display:"flex",alignItems:"center",gap:".5rem",paddingTop:"1.2rem"}}>
                <input type="checkbox" checked={rAvail} onChange={e=>setRAvl(e.target.checked)} style={{width:"16px",height:"16px"}}/>
                <span style={{fontSize:".85rem"}}>Aktiv</span>
              </div>
              <div style={{gridColumn:"1/-1"}}><label style={lbl}>Teqlər (vergüllə)</label><input style={inp} value={rTags} onChange={e=>setRT(e.target.value)} placeholder="VIP, Terrace, Musiqi"/></div>
            </div>
            <div style={{display:"flex",gap:".6rem",flexDirection:"column"}}>
              <div style={{display:"flex",gap:".6rem"}}>
                <button className="btn" onClick={saveR} disabled={saving} style={{background:"#0F172A",color:"#fff",border:"none",borderRadius:"8px",padding:".65rem 1.2rem",fontSize:".85rem",fontWeight:700,cursor:"pointer",flex:1}}>
                  {saving?<span style={{display:"flex",alignItems:"center",gap:".5rem",justifyContent:"center"}}><Spin s={14}/> Yadda saxlanır...</span>:editR?"Yadda saxla":"Əlavə et + Masaya keç →"}
                </button>
                {editR&&<button className="btn" onClick={clearR} style={{background:"#F1F5F9",color:"#64748B",border:"1px solid #E2E8F0",borderRadius:"8px",padding:".65rem 1rem",fontSize:".85rem",fontWeight:600,cursor:"pointer"}}>Ləğv et</button>}
              </div>
              {restaurants.length>0&&!editR&&(
                <button className="btn" onClick={()=>setTab("tables")} style={{background:"#EFF6FF",color:"#2563EB",border:"1px solid #BFDBFE",borderRadius:"8px",padding:".55rem 1rem",fontSize:".8rem",fontWeight:600,cursor:"pointer",textAlign:"center"}}>
                  🪑 Mövcud restorana masa əlavə et →
                </button>
              )}
            </div>
          </div>
          <div style={{background:"#fff",borderRadius:"14px",border:"1px solid #E2E8F0",overflow:"hidden"}}>
            <div style={{padding:"1rem 1.2rem",borderBottom:"1px solid #F1F5F9",fontWeight:700,fontSize:".95rem"}}>Mövcud restoranlar ({restaurants.length})</div>
            <div style={{maxHeight:"500px",overflowY:"auto"}}>
              {restaurants.length===0&&<div style={{padding:"2rem",textAlign:"center",color:"#94A3B8"}}>Hələ restoran yoxdur</div>}
              {restaurants.map(r=>(
                <div key={r.id} style={{padding:".9rem 1.2rem",borderBottom:"1px solid #F8FAFC",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div style={{display:"flex",alignItems:"center",gap:".7rem"}}>
                    <div style={{width:"36px",height:"36px",borderRadius:"8px",background:`${r.accent||"#3B82F6"}15`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"1.1rem"}}>{r.emoji||"🍽️"}</div>
                    <div><div style={{fontWeight:600,fontSize:".88rem"}}>{r.name}</div><div style={{fontSize:".7rem",color:"#94A3B8"}}>{r.cuisine} · {r.price_range} · {r.available?"Aktiv":"Deaktiv"}</div></div>
                  </div>
                  <div style={{display:"flex",gap:".4rem"}}>
                    <button className="btn" onClick={()=>fillR(r)} style={{background:"#EFF6FF",color:"#2563EB",border:"1px solid #BFDBFE",borderRadius:"6px",padding:".3rem .6rem",fontSize:".72rem",fontWeight:600,cursor:"pointer"}}>Düzəlt</button>
                    <button className="btn" onClick={()=>delR(r.id)} style={{background:"#FEF2F2",color:"#DC2626",border:"1px solid #FECACA",borderRadius:"6px",padding:".3rem .6rem",fontSize:".72rem",fontWeight:600,cursor:"pointer"}}>Sil</button>
                  </div>
                </div>
              ))}
            </div>
          </div>
        </div>
      )}

      {/* ── MASALAR ── */}
      {tab==="tables"&&(
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"1.5rem"}}>
          <div style={{background:"#fff",borderRadius:"14px",border:"1px solid #E2E8F0",padding:"1.4rem"}}>
            <div style={{fontWeight:700,fontSize:".95rem",marginBottom:"1.2rem"}}>{editT?"Masanı düzəlt":"Yeni masa"}</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:".8rem",marginBottom:".8rem"}}>
              <div style={{gridColumn:"1/-1"}}>
                <label style={lbl}>Restoran *</label>
                <select style={inp} value={tRestId} onChange={e=>setTRId(e.target.value)}>
                  <option value="">Restoran seç...</option>
                  {restaurants.map(r=><option key={r.id} value={r.id}>{r.name}</option>)}
                </select>
              </div>
              <div>
                <label style={lbl}>Label * (A1, B2...)</label>
                <input style={inp} value={tLabel} onChange={e=>setTLbl(e.target.value)} placeholder="A1"/>
              </div>
              <div>
                <label style={lbl}>Oturacaq sayı</label>
                <select style={inp} value={tSeats} onChange={e=>setTSeat(e.target.value)}>
                  {[2,4,6,8,10,12].map(n=><option key={n} value={n}>{n} nəfər</option>)}
                </select>
              </div>
              <div>
                <label style={lbl}>Zona (Terras, VIP...)</label>
                <input style={inp} value={tZone} onChange={e=>setTZ(e.target.value)} placeholder="Terras"/>
              </div>
              <div>
                <label style={lbl}>Masa forması</label>
                <select style={inp} value={tSh} onChange={e=>setTSh(e.target.value)}>
                  <option value="round">🔵 Yuvarlaq (2nf)</option>
                  <option value="rect">⬜ Düzbucaqlı (4nf)</option>
                  <option value="rect6">➖ Uzun (6nf)</option>
                  <option value="vip">👑 VIP (8nf)</option>
                </select>
              </div>
              <div>
                <label style={lbl}>Plan mövqeyi X% (0-88)</label>
                <input style={inp} type="number" min="0" max="88" value={tX} onChange={e=>setTX(e.target.value)}/>
              </div>
              <div style={{gridColumn:"1/-1"}}>
                <label style={lbl}>Şəkil URL (istəyə görə)</label>
                <input style={inp} value={tImg} onChange={e=>setTImg(e.target.value)} placeholder="https://images.unsplash.com/..."/>
                {tImg
                  ? <div style={{marginTop:".5rem",display:"flex",alignItems:"center",gap:".7rem"}}>
                      <img src={tImg} alt="" style={{width:"80px",height:"56px",borderRadius:"8px",objectFit:"cover",border:"1px solid #E2E8F0"}} onError={e=>{e.target.style.display="none";}}/>
                      <div>
                        <div style={{fontSize:".75rem",color:"#16A34A",fontWeight:600}}>✓ Şəkil göründü</div>
                        <button onClick={()=>setTImg("")} style={{background:"none",border:"none",color:"#EF4444",fontSize:".72rem",cursor:"pointer",padding:0,fontFamily:"inherit"}}>× Sil</button>
                      </div>
                    </div>
                  : <div style={{marginTop:".4rem",fontSize:".7rem",color:"#94A3B8"}}>💡 Unsplash.com-dan pulsuz şəkil URL-i al</div>
                }
              </div>
            </div>
            <div style={{display:"flex",gap:".6rem"}}>
              <button className="btn" onClick={saveT} disabled={saving} style={{background:"#0F172A",color:"#fff",border:"none",borderRadius:"8px",padding:".65rem 1.2rem",fontSize:".85rem",fontWeight:700,cursor:"pointer",flex:1}}>
                {saving?"Saxlanır...":editT?"Yadda saxla":"✅ Masa əlavə et → Menyuya keç"}
              </button>
              {editT&&<button className="btn" onClick={clearT} style={{background:"#F1F5F9",color:"#64748B",border:"1px solid #E2E8F0",borderRadius:"8px",padding:".65rem 1rem",fontSize:".85rem",fontWeight:600,cursor:"pointer"}}>Ləğv et</button>}
            </div>
          </div>
          <div style={{background:"#fff",borderRadius:"14px",border:"1px solid #E2E8F0",overflow:"hidden"}}>
            <div style={{padding:"1rem 1.2rem",borderBottom:"1px solid #F1F5F9",fontWeight:700,fontSize:".95rem"}}>Mövcud masalar ({allTables.length})</div>
            <div style={{maxHeight:"580px",overflowY:"auto"}}>
              {allTables.length===0&&<div style={{padding:"2rem",textAlign:"center",color:"#94A3B8"}}>Hələ masa yoxdur</div>}
              {restaurants.map(rest=>{
                const rT=allTables.filter(t=>t.restaurant_id===rest.id);
                if(!rT.length)return null;
                return(
                  <div key={rest.id}>
                    <div style={{padding:".5rem 1.2rem",background:"#F8FAFC",fontSize:".65rem",fontWeight:700,letterSpacing:".08em",textTransform:"uppercase",color:"#94A3B8"}}>{rest.name}</div>
                    {rT.map(t=>(
                      <div key={t.id} style={{padding:".75rem 1.2rem",borderBottom:"1px solid #F8FAFC",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                        <div style={{display:"flex",alignItems:"center",gap:".7rem"}}>
                          {t.img_url
                            ?<img src={t.img_url} alt="" style={{width:"50px",height:"36px",borderRadius:"6px",objectFit:"cover",flexShrink:0}}/>
                            :<div style={{width:"50px",height:"36px",borderRadius:"6px",background:"#F1F5F9",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"1.1rem",flexShrink:0}}>🪑</div>
                          }
                          <div>
                            <div style={{fontWeight:600,fontSize:".85rem"}}>Masa {t.label}</div>
                            <div style={{fontSize:".7rem",color:"#94A3B8"}}>{t.zone} · {t.seats} nf · {t.shape}</div>
                          </div>
                        </div>
                        <div style={{display:"flex",gap:".4rem"}}>
                          <button className="btn" onClick={()=>fillT(t)} style={{background:"#EFF6FF",color:"#2563EB",border:"1px solid #BFDBFE",borderRadius:"6px",padding:".3rem .6rem",fontSize:".72rem",fontWeight:600,cursor:"pointer"}}>Düzəlt</button>
                          <button className="btn" onClick={()=>delT(t.id)} style={{background:"#FEF2F2",color:"#DC2626",border:"1px solid #FECACA",borderRadius:"6px",padding:".3rem .6rem",fontSize:".72rem",fontWeight:600,cursor:"pointer"}}>Sil</button>
                        </div>
                      </div>
                    ))}
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      )}

      {/* ── MENYU ── */}
      {tab==="menu"&&(
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"1.5rem"}}>
          <div style={{background:"#fff",borderRadius:"14px",border:"1px solid #E2E8F0",padding:"1.4rem"}}>
            <div style={{fontWeight:700,fontSize:".95rem",marginBottom:"1rem"}}>Menyu əlavə et</div>
            <div style={{marginBottom:".8rem"}}><label style={lbl}>Restoran *</label>
              <select style={inp} value={menuRest} onChange={e=>setMenuRest(e.target.value)}>
                <option value="">Restoran seç...</option>
                {restaurants.map(r=><option key={r.id} value={r.id}>{r.name}</option>)}
              </select>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:".8rem",marginBottom:".8rem"}}>
              <div style={{gridColumn:"1/-1"}}><label style={lbl}>Yeməyin adı *</label><input style={inp} value={mName} onChange={e=>setMN(e.target.value)} placeholder="Piti"/></div>
              <div style={{gridColumn:"1/-1"}}><label style={lbl}>Təsvir</label><input style={inp} value={mDesc} onChange={e=>setMD(e.target.value)} placeholder="Quzulu şorba, nar suyu ilə"/></div>
              <div><label style={lbl}>Qiymət (₼) *</label><input style={inp} type="number" min="0" step="0.5" value={mPrice} onChange={e=>setMP(e.target.value)} placeholder="18"/></div>
              <div><label style={lbl}>Kateqoriya</label><input style={inp} value={mCat} onChange={e=>setMC(e.target.value)} placeholder="Şorba"/></div>
              <div><label style={lbl}>Emoji</label><input style={inp} value={mEmoji} onChange={e=>setME(e.target.value)} placeholder="🍲"/></div>
            </div>
            <button className="btn" onClick={addMenuItem} disabled={menuSaving||!menuRest} style={{background:"#0F172A",color:"#fff",border:"none",borderRadius:"8px",padding:".65rem 1.2rem",fontSize:".85rem",fontWeight:700,cursor:"pointer",width:"100%"}}>
              {menuSaving?"...":"+ Menyu əlavə et"}
            </button>
          </div>
          <div style={{background:"#fff",borderRadius:"14px",border:"1px solid #E2E8F0",overflow:"hidden"}}>
            <div style={{padding:"1rem 1.2rem",borderBottom:"1px solid #F1F5F9",fontWeight:700,fontSize:".95rem"}}>
              {menuRest?`${restaurants.find(r=>String(r.id)===menuRest)?.name||""} menyusu`:"Restoran seçin"}
              <span style={{marginLeft:".5rem",fontSize:".7rem",color:"#94A3B8",fontWeight:400}}>({menuItems.length} maddə)</span>
            </div>
            <div style={{maxHeight:"500px",overflowY:"auto"}}>
              {menuItems.length===0
                ?<div style={{padding:"2rem",textAlign:"center",color:"#94A3B8",fontSize:".85rem"}}>{menuRest?"Menyu boşdur":"Restoran seçin"}</div>
                :[...new Set(menuItems.map(i=>i.cat))].map(cat=>(
                  <div key={cat}>
                    <div style={{padding:".5rem 1.2rem",background:"#F8FAFC",fontSize:".65rem",fontWeight:700,letterSpacing:".08em",textTransform:"uppercase",color:"#94A3B8"}}>{cat}</div>
                    {menuItems.filter(i=>i.cat===cat).map(item=>(
                      <div key={item.id} style={{padding:".75rem 1.2rem",borderBottom:"1px solid #F8FAFC",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                        <div style={{display:"flex",alignItems:"center",gap:".7rem"}}>
                          <span style={{fontSize:"1.3rem"}}>{item.emoji||"🍽️"}</span>
                          <div>
                            <div style={{fontWeight:600,fontSize:".85rem"}}>{item.name}</div>
                            <div style={{fontSize:".7rem",color:"#94A3B8"}}>{item.desc} · {item.price}₼</div>
                          </div>
                        </div>
                        <button className="btn" onClick={()=>delMenuItem(item)} style={{background:"#FEF2F2",color:"#DC2626",border:"1px solid #FECACA",borderRadius:"6px",padding:".3rem .6rem",fontSize:".72rem",fontWeight:600,cursor:"pointer"}}>Sil</button>
                      </div>
                    ))}
                  </div>
                ))
              }
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
