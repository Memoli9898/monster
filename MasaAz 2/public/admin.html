<!DOCTYPE html>

  <style>

    body{background:#F1F5F9;font-family:'Inter',system-ui,sans-serif;}
    ::-webkit-scrollbar{width:5px;}
    ::-webkit-scrollbar-track{background:#F1F5F9;}
    ::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:10px;}
    .si:hover{background:rgba(255,255,255,.1)!important;}
    .rh:hover{background:#F8FAFC!important;}
    .btn{transition:all .15s;cursor:pointer;}
    .btn:hover:not(:disabled){filter:brightness(.92);}
    input,select,textarea{font-family:'Inter',system-ui,sans-serif;}

    /* ── LOADER ── */
    @keyframes spin{to{transform:rotate(360deg)}}
    .spin{animation:spin .7s linear infinite;}

    /* ── SIDEBAR BLINK ── */
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

    /* ── TABLE ROW yeni ── */
    @keyframes fadeYellow{0%{background:#FFFBEB}100%{background:transparent}}

    @keyframes slideRight{
      0%  {transform:translateX(110%);opacity:0;}
      55% {transform:translateX(-6px);opacity:1;}
      70% {transform:translateX(3px);}
      85% {transform:translateX(-2px);}
      100%{transform:translateX(0);opacity:1;}
    }
    @keyframes slideOut{
      0%  {transform:translateX(0);opacity:1;max-height:200px;margin-bottom:10px;}
      40% {transform:translateX(30px);opacity:.5;}
      100%{transform:translateX(110%);opacity:0;max-height:0;margin-bottom:0;}

      from{width:100%}

      0%,100%{transform:rotate(0) scale(1);}
      10%{transform:rotate(-25deg) scale(1.1);}
      25%{transform:rotate(25deg) scale(1.1);}
      40%{transform:rotate(-18deg);}
      55%{transform:rotate(18deg);}
      70%{transform:rotate(-10deg);}
      85%{transform:rotate(10deg);}
    }
    @keyframes badgePop{
      0%{transform:scale(0);}
      60%{transform:scale(1.3);}
      100%{transform:scale(1);}

      0%,100%{box-shadow:0 0 0 0 rgba(34,197,94,.6);}
      50%{box-shadow:0 0 0 10px rgba(34,197,94,0);}
    }

    .notif-enter{animation:slideRight .55s cubic-bezier(.22,.68,0,1.2) forwards;}
    .notif-exit {animation:slideOut .4s ease-in forwards;}

    /* Zəng düyməsi */
    .bell-btn{
      position:fixed;bottom:24px;right:24px;z-index:9000;
      width:54px;height:54px;border-radius:50%;
      background:#0F172A;border:none;cursor:pointer;
      display:flex;align-items:center;justify-content:center;
      font-size:1.5rem;
      box-shadow:0 4px 24px rgba(0,0,0,.3);
      transition:transform .2s, background .2s;
    }
    .bell-btn:hover{transform:scale(1.1);background:#1E293B;}
    .bell-btn.ring{animation:bellShake .65s ease;}
    .bell-btn.has-notif{animation:ringGlow 2s ease infinite;}

    .bell-badge{
      position:absolute;top:-2px;right:-2px;
      background:#EF4444;color:#fff;
      border-radius:50%;min-width:20px;height:20px;
      font-size:.6rem;font-weight:800;
      display:flex;align-items:center;justify-content:center;

      animation:badgePop .3s ease;

<script type="text/babel">
const {useState,useEffect,useMemo,useRef,useCallback} = React;

const SUPABASE_URL = "https://jhyaiuvubbrtngvyoyhi.supabase.co";
const SUPABASE_KEY = "sb_publishable_-AK2kMXWLWYqhA7V5GoW_w_tuFg-B1W";
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const TABLES = [
  {label:"A1",seats:2,zone:"Pəncərə"},{label:"A2",seats:2,zone:"Pəncərə"},
  {label:"A3",seats:2,zone:"Bar yanı"},{label:"B1",seats:4,zone:"Mərkəz"},

/* ════════════════════════════════════════════════
   SƏS — Web Audio API (heç bir fayl lazım deyil)
════════════════════════════════════════════════ */
function playSound() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    // 3 pillə: sol→mi→sol — xoş bildiriş melodiyası
    const notes = [
      {freq:523, start:0,    dur:0.15},  // C5
      {freq:659, start:0.16, dur:0.15},  // E5
      {freq:784, start:0.32, dur:0.25},  // G5
    ];
    notes.forEach(({freq,start,dur}) => {
      const osc  = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.type = "sine";
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0, ctx.currentTime + start);
      gain.gain.linearRampToValueAtTime(0.4, ctx.currentTime + start + 0.03);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + start + dur);
      osc.start(ctx.currentTime + start);
      osc.stop(ctx.currentTime + start + dur + 0.05);
    });
  } catch(e) {/* səs bloklandısa keç */}
}

/* ════════════════════════════════════════════════
   BİLDİRİŞ KOMPONENTİ
════════════════════════════════════════════════ */
const NOTIF_DURATION = 8000; // 8 saniyə

function NotifCard({notif, onDone}) {
  const [exiting, setExiting] = useState(false);
  const timerRef = useRef();

  const dismiss = useCallback(() => {
    clearTimeout(timerRef.current);
    setExiting(true);
    setTimeout(onDone, 380);
  }, [onDone]);

  useEffect(() => {
    timerRef.current = setTimeout(dismiss, NOTIF_DURATION);
    return () => clearTimeout(timerRef.current);
  }, []);

  return (
    <div className={exiting ? "notif-exit" : "notif-enter"}
      style={{
        background:"#fff",
        borderRadius:"16px",
        boxShadow:"0 12px 48px rgba(0,0,0,0.18), 0 2px 8px rgba(0,0,0,0.06)",
        overflow:"hidden",
        width:"330px",
        marginBottom:"10px",
        border:"1px solid #E2E8F0",
        position:"relative",
      }}>

      {/* Yuxarı yaşıl zolaq */}
      <div style={{height:"4px", background:"linear-gradient(90deg,#22C55E 0%,#16A34A 100%)"}}/>

      {/* İçərik */}
      <div style={{padding:"12px 14px 10px", display:"flex", alignItems:"flex-start", gap:"10px"}}>

        {/* Sol ikon dairəsi */}
        <div style={{
          width:"42px", height:"42px", borderRadius:"12px",
          background:"linear-gradient(135deg,#F0FDF4,#DCFCE7)",
          border:"1.5px solid #86EFAC",
          display:"flex", alignItems:"center", justifyContent:"center",
          fontSize:"1.3rem", flexShrink:0,
        }}>🔔</div>

        {/* Mətn bloku */}
        <div style={{flex:1, minWidth:0}}>
          <div style={{
            fontSize:"0.65rem", fontWeight:800, letterSpacing:"0.1em",
            textTransform:"uppercase", color:"#16A34A", marginBottom:"2px",
          }}>Yeni Rezervasiya!</div>

          <div style={{
            fontWeight:700, fontSize:"0.98rem", color:"#0F172A",
            marginBottom:"4px", whiteSpace:"nowrap",
            overflow:"hidden", textOverflow:"ellipsis",
          }}>{notif.name}</div>

          <div style={{fontSize:"0.74rem", color:"#64748B", lineHeight:1.55}}>
            <span>🏛️ {notif.restaurant_name || "—"}</span><br/>
            <span>🪑 Masa <b style={{color:"#0F172A"}}>{notif.table_label}</b></span>
            <span style={{margin:"0 4px"}}>·</span>
            <span>📅 {notif.date}</span>
            <span style={{margin:"0 4px"}}>·</span>
            <span>⏰ {notif.time}</span><br/>
            <span>👥 <b style={{color:"#0F172A"}}>{notif.guests} nəfər</b></span>
            {notif.pre_order_total > 0 &&
              <span style={{marginLeft:"6px", color:"#16A34A", fontWeight:600}}>
                · 💰 {notif.pre_order_total}₼
              </span>
            }
          </div>
        </div>

        {/* Bağla düyməsi */}
        <button onClick={dismiss} style={{
          background:"none", border:"none", cursor:"pointer",
          color:"#CBD5E1", fontSize:"1rem", padding:"0",
          flexShrink:0, lineHeight:1, marginTop:"1px",
          transition:"color .15s",
        }}
          onMouseEnter={e=>e.target.style.color="#94A3B8"}
          onMouseLeave={e=>e.target.style.color="#CBD5E1"}
        >✕</button>
      </div>

      {/* Progress bar */}
      <div style={{height:"3px", background:"#F1F5F9"}}>
        <div style={{
          height:"100%",
          background:"linear-gradient(90deg,#22C55E,#16A34A)",
          animation:`shrink ${NOTIF_DURATION}ms linear forwards`,
          borderRadius:"0 3px 3px 0",
        }}/>
      </div>
    </div>
  );
}

/* ════════════════════════════════════════════════
   BİLDİRİŞ KONTEYNER
════════════════════════════════════════════════ */
function NotifContainer({notifs, removeNotif}) {
  return (
    <div style={{
      position:"fixed", top:"1rem", right:"1rem",
      zIndex:9999, display:"flex", flexDirection:"column",
      alignItems:"flex-end", pointerEvents:"none",
    }}>
      {notifs.map(n => (
        <div key={n.id} style={{pointerEvents:"auto"}}>
          <NotifCard notif={n} onDone={() => removeNotif(n.id)}/>
        </div>
      ))}
    </div>
  );
}

/* ════════════════════════════════════════════════
   BADGE / STATUS
════════════════════════════════════════════════ */
const Badge = ({status}) => {
  const c = SC[status] || {bg:"#F1F5F9",text:"#64748B",border:"#CBD5E1"};
  return (
    <span style={{fontSize:"0.72rem",padding:"0.2rem 0.6rem",background:c.bg,color:c.text,border:`1px solid ${c.border}`,borderRadius:"20px",fontWeight:600,whiteSpace:"nowrap"}}>
      {status}
    </span>
  );
};

/* ════════════════════════════════════════════════
   ANA APP
════════════════════════════════════════════════ */
function App() {
  const [page,setPage]       = useState("dashboard");
  const [rows,setRows]       = useState([]);
  const [loading,setLoading] = useState(true);
  const [newIds,setNewIds]   = useState(new Set());
  const [notifs,setNotifs]   = useState([]);   // aktiv bildirişlər
  const [unread,setUnread]   = useState(0);    // oxunmamış sayı
  const [bellRing,setBellRing] = useState(false);
  const [sel,setSel]         = useState(null);
  const [sidebar,setSidebar] = useState(true);
  const [updId,setUpdId]     = useState(null);

  const [fDate,setFDate]     = useState("");
  const [fStatus,setFStatus] = useState("hamısı");
  const [fTable,setFTable]   = useState("hamısı");
  const [search,setSearch]   = useState("");
  const today = new Date().toISOString().split("T")[0];

  /* ── İlk yükləmə + Real-time subscription ── */
  useEffect(() => {
    // Bütün rezervasiyaları yüklə
    sb.from("reservations")
      .select("*")
      .order("created_at", {ascending:false})
      .then(({data}) => { setRows(data || []); setLoading(false); });

    // Real-time — YENİ rezervasiya gəldikdə
    const ch = sb.channel("admin-live")
      .on("postgres_changes",
        {event:"INSERT", schema:"public", table:"reservations"},
        ({new: r}) => {
          // 1. Cədvəldə əlavə et
          setRows(prev => [r, ...prev]);

          // 2. Sarı highlight
          setNewIds(prev => {
            const s = new Set(prev);
            s.add(r.id);
            setTimeout(() => setNewIds(p => { const n=new Set(p); n.delete(r.id); return n; }), 5000);
            return s;
          });

          // 3. Səsli bildiriş göstər
          playSound();

          // 4. Bildiriş kartı əlavə et (üst-üstə yığıla bilər)
          const nid = Date.now();
          setNotifs(prev => [...prev, {id:nid, ...r}]);

          // 5. Zəng animasiyası
          setBellRing(true);
          setTimeout(() => setBellRing(false), 700);

          // 6. Oxunmamış sayı artır
          setUnread(p => p + 1);
        }
      )
      .on("postgres_changes",
        {event:"UPDATE", schema:"public", table:"reservations"},
        ({new: r}) => {
          // Optimistik update artıq olub — bu serverdan konfirmasiya
          setRows(prev => prev.map(x => x.id === r.id ? r : x));
          setSel(prev => prev?.id === r.id ? r : prev);
        }
      )
      .subscribe();

    return () => sb.removeChannel(ch);
  }, []);

  const removeNotif = useCallback((id) => {
    setNotifs(prev => prev.filter(n => n.id !== id));
  }, []);

  /* ── Status dəyişdirmə — REFRESH OLMADAN ── */
  const updStatus = async (id, s) => {
    setUpdId(id);
    // Dərhal lokal dəyiş
    setRows(prev => prev.map(r => r.id===id ? {...r, status:s} : r));
    setSel(prev => prev?.id===id ? {...prev, status:s} : prev);
    // Arxada göndər
    await sb.from("reservations").update({status:s}).eq("id",id);
    setUpdId(null);
  };

  const todayRows   = rows.filter(r => r.date === today);
  const todayGuests = todayRows.filter(r => r.status !== "ləğv edildi").reduce((s,r) => s+r.guests, 0);
  const todayRev    = todayRows.reduce((s,r) => s+(r.pre_order_total||0), 0);
  const waiting     = rows.filter(r => r.status === "gözlənilir").length;

  const filtered = useMemo(() => rows.filter(r => {
    if(fDate && r.date !== fDate) return false;
    if(fStatus !== "hamısı" && r.status !== fStatus) return false;
    if(fTable !== "hamısı" && r.table_label !== fTable) return false;
    if(search && !r.name?.toLowerCase().includes(search.toLowerCase()) && !r.phone?.includes(search)) return false;
    return true;
  }), [rows, fDate, fStatus, fTable, search]);

  const tblStatus = TABLES.map(t => {
    const bk = todayRows.filter(r => r.table_label===t.label && r.status!=="ləğv edildi");
    return {...t, bookings:bk, busy:bk.length>0};
  });

  const navItems = [
    {id:"dashboard",  icon:"📊", label:"Dashboard"},
    {id:"reservations",icon:"📋",label:"Rezervasiyalar"},
    {id:"tables",     icon:"🪑", label:"Masalar"},
  ];

  return (
    <div style={{display:"flex", minHeight:"100vh"}}>

      {/* ── BİLDİRİŞLƏR ── */}

          setUnread(0);
          setPage("reservations");
          setFStatus("gözlənilir");

      >
        🔔
        {unread > 0 && (
          <span className="bell-badge">{unread > 9 ? "9+" : unread}</span>
        )}
      </button>

      {/* ── SIDEBAR ── */}

        width:sidebar?"220px":"60px",
        background:"#0F172A",
        display:"flex", flexDirection:"column",
        flexShrink:0, transition:"width .25s", overflow:"hidden",
      }}>
        <div style={{padding:"1.2rem",borderBottom:"1px solid rgba(255,255,255,.06)",display:"flex",alignItems:"center",gap:".7rem",minHeight:"64px"}}>
          <div style={{width:"32px",height:"32px",borderRadius:"8px",background:"#3B82F6",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"1rem",flexShrink:0}}>🍽️</div>
          {sidebar && <div><div style={{fontWeight:800,fontSize:".95rem",color:"#fff",whiteSpace:"nowrap"}}>MasaAz</div><div style={{fontSize:".58rem",color:"#475569",textTransform:"uppercase",letterSpacing:".1em",whiteSpace:"nowrap"}}>Admin Panel</div></div>}
        </div>
        <div style={{padding:".6rem .8rem",borderBottom:"1px solid rgba(255,255,255,.04)",display:"flex",alignItems:"center",gap:".5rem"}}>
          <div style={{width:"8px",height:"8px",borderRadius:"50%",background:"#22C55E",flexShrink:0,animation:"blink 2s ease-in-out infinite"}}/>
          {sidebar && <span style={{fontSize:".68rem",color:"#22C55E",fontWeight:600}}>Real-time aktiv</span>}
        </div>
        <nav style={{padding:".8rem .5rem",flex:1}}>
          {navItems.map(item => (
            <div key={item.id} className="si" onClick={() => setPage(item.id)}
              style={{display:"flex",alignItems:"center",gap:".7rem",padding:".65rem .7rem",borderRadius:"8px",marginBottom:".2rem",cursor:"pointer",
                background:page===item.id?"rgba(59,130,246,.2)":"transparent",
                borderLeft:page===item.id?"3px solid #3B82F6":"3px solid transparent",
                position:"relative",
              }}>
              <span style={{fontSize:"1.1rem",flexShrink:0}}>{item.icon}</span>
              {sidebar && <span style={{fontSize:".85rem",fontWeight:page===item.id?700:500,color:page===item.id?"#60A5FA":"#94A3B8",whiteSpace:"nowrap"}}>{item.label}</span>}
              {item.id==="reservations" && waiting>0 && (
                <span style={{position:"absolute",right:"8px",top:"50%",transform:"translateY(-50%)",background:"#EF4444",color:"#fff",borderRadius:"20px",fontSize:".6rem",fontWeight:700,padding:".1rem .4rem"}}>{waiting}</span>
              )}
            </div>
          ))}
        </nav>
        <div onClick={()=>setSidebar(p=>!p)} style={{padding:"1rem",borderTop:"1px solid rgba(255,255,255,.06)",display:"flex",justifyContent:sidebar?"flex-end":"center",cursor:"pointer"}}>
          <span style={{color:"#475569"}}>{sidebar?"◀":"▶"}</span>
        </div>
      </aside>

      {/* ── MAIN ── */}
      <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
        <header style={{background:"#fff",borderBottom:"1px solid #E2E8F0",height:"64px",display:"flex",alignItems:"center",justifyContent:"space-between",padding:"0 1.5rem",flexShrink:0}}>
          <div style={{fontWeight:700,fontSize:"1rem"}}>
            {page==="dashboard" && "Dashboard"}
            {page==="reservations" && "Rezervasiyalar"}
            {page==="tables" && "Masalar"}
          </div>
          <div style={{display:"flex",alignItems:"center",gap:"1rem"}}>
            {waiting>0 && (
              <div onClick={()=>{setFStatus("gözlənilir");setPage("reservations");}}
                style={{background:"#FEF9C3",border:"1px solid #FDE047",borderRadius:"20px",padding:".35rem .9rem",fontSize:".78rem",fontWeight:700,color:"#92400E",cursor:"pointer"}}>
                ⚠️ {waiting} cavab verilməyən
              </div>
            )}
            <div style={{fontSize:".75rem",color:"#94A3B8"}}>
              {new Date().toLocaleDateString("az-AZ",{weekday:"long",day:"numeric",month:"long"})}
            </div>
          </div>
        </header>

        <main style={{flex:1,overflow:"auto",padding:"1.5rem"}}>

          {/* LOADER */}
          {loading && (
            <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"50vh",flexDirection:"column",gap:"1rem"}}>
              <div className="spin" style={{width:"36px",height:"36px",border:"3px solid #E2E8F0",borderTop:"3px solid #3B82F6",borderRadius:"50%"}}/>

          {/* ── DASHBOARD ── */}
          {!loading && page==="dashboard" && (
            <div>
              <div style={{marginBottom:"1.5rem"}}>
                <div style={{fontSize:"1.4rem",fontWeight:800,letterSpacing:"-.02em",marginBottom:".2rem"}}>Dashboard</div>
                <div style={{fontSize:".8rem",color:"#94A3B8"}}>Canlı məlumatlar · real-time</div>
              </div>
              <div style={{display:"flex",gap:"1rem",flexWrap:"wrap",marginBottom:"1.5rem"}}>
                {[
                  {icon:"📅",label:"Bu gün rezerv",val:todayRows.length,sub:`${waiting} cavab gözləyir`},
                  {icon:"👥",label:"Bu gün qonaq",val:todayGuests,sub:"nəfər",color:"#2563EB"},
                  {icon:"⏳",label:"Cavab gözləyən",val:waiting,sub:"tezliklə cavabla",color:"#CA8A04"},
                  {icon:"💰",label:"Ön sifarişlər",val:`${todayRev}₼`,sub:"bu gün",color:"#16A34A"},
                  {icon:"📊",label:"Cəmi rezerv",val:rows.length,sub:"bütün vaxtlar",color:"#7C3AED"},
                ].map(s=>(
                  <div key={s.label} style={{background:"#fff",borderRadius:"12px",padding:"1.2rem 1.4rem",border:"1px solid #E2E8F0",flex:1,minWidth:"140px"}}>
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:".8rem"}}>
                      <div style={{fontSize:".68rem",fontWeight:600,letterSpacing:".08em",textTransform:"uppercase",color:"#94A3B8"}}>{s.label}</div>
                      <div style={{fontSize:"1.3rem"}}>{s.icon}</div>
                    </div>
                    <div style={{fontSize:"2rem",fontWeight:800,letterSpacing:"-.03em",color:s.color||"#0F172A",marginBottom:".2rem"}}>{s.val}</div>
                    <div style={{fontSize:".72rem",color:"#94A3B8"}}>{s.sub}</div>
                  </div>
                ))}
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"1.5rem"}}>
                {/* Bu günün rezervasiyaları */}
                <div style={{background:"#fff",borderRadius:"14px",border:"1px solid #E2E8F0",overflow:"hidden"}}>
                  <div style={{padding:"1rem 1.2rem",borderBottom:"1px solid #F1F5F9",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <div style={{fontWeight:700,fontSize:".9rem"}}>Bu günün rezervasiyaları</div>
                    <span style={{fontSize:".7rem",background:"#EFF6FF",color:"#2563EB",padding:".2rem .6rem",borderRadius:"20px",fontWeight:600}}>{todayRows.length}</span>
                  </div>
                  <div style={{maxHeight:"360px",overflowY:"auto"}}>
                    {todayRows.length===0
                      ? <div style={{padding:"2rem",textAlign:"center",color:"#94A3B8",fontSize:".85rem"}}>Bu gün üçün rezervasiya yoxdur</div>
                      : todayRows.map(r=>(
                        <div key={r.id} className={`rh ${newIds.has(r.id)?"new-row":""}`}
                          onClick={()=>{setSel(r);setPage("reservations");}}
                          style={{padding:".85rem 1.2rem",borderBottom:"1px solid #F8FAFC",display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer"}}>
                          <div>
                            <div style={{fontWeight:600,fontSize:".88rem",marginBottom:".15rem"}}>{r.name}</div>
                            <div style={{fontSize:".72rem",color:"#64748B"}}>⏰ {r.time} · Masa {r.table_label} · {r.guests} nf</div>
                          </div>
                          <Badge status={r.status}/>
                        </div>
                      ))
                    }
                  </div>
                </div>
                {/* Masa vəziyyəti */}
                <div style={{background:"#fff",borderRadius:"14px",border:"1px solid #E2E8F0",overflow:"hidden"}}>
                  <div style={{padding:"1rem 1.2rem",borderBottom:"1px solid #F1F5F9",fontWeight:700,fontSize:".9rem"}}>Masa vəziyyəti (bugün)</div>
                  <div style={{padding:"1rem",display:"grid",gridTemplateColumns:"1fr 1fr",gap:".6rem"}}>
                    {tblStatus.map(t=>(
                      <div key={t.label} style={{padding:".7rem .9rem",borderRadius:"10px",background:t.busy?"#FEF2F2":"#F0FDF4",border:`1px solid ${t.busy?"#FECACA":"#86EFAC"}`}}>
                        <div style={{display:"flex",justifyContent:"space-between",marginBottom:".2rem"}}>
                          <span style={{fontWeight:700,fontSize:".88rem",color:t.busy?"#DC2626":"#16A34A"}}>Masa {t.label}</span>
                          <span style={{fontSize:".65rem",color:t.busy?"#DC2626":"#16A34A",fontWeight:600}}>{t.busy?"Dolu":"Boş"}</span>
                        </div>
                        <div style={{fontSize:".68rem",color:"#64748B"}}>{t.zone} · {t.seats} nf</div>
                        {t.busy&&t.bookings[0]&&<div style={{fontSize:".65rem",color:"#EF4444",marginTop:".2rem"}}>{t.bookings[0].time} — {t.bookings[0].name}</div>}
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* ── RƏZERVASİYALAR ── */}
          {!loading && page==="reservations" && (
            <div style={{display:"flex",gap:"1.5rem",height:"calc(100vh - 130px)"}}>
              <div style={{flex:1,display:"flex",flexDirection:"column",background:"#fff",borderRadius:"14px",border:"1px solid #E2E8F0",overflow:"hidden"}}>
                {/* Filtrlər */}
                <div style={{padding:"1rem",borderBottom:"1px solid #F1F5F9",display:"flex",gap:".6rem",flexWrap:"wrap",alignItems:"center"}}>
                  <input placeholder="🔍 Ad, telefon..." value={search} onChange={e=>setSearch(e.target.value)}
                    style={{border:"1px solid #E2E8F0",borderRadius:"8px",padding:".45rem .8rem",fontSize:".8rem",outline:"none",flex:1,minWidth:"130px"}}/>
                  <input type="date" value={fDate} onChange={e=>setFDate(e.target.value)}
                    style={{border:"1px solid #E2E8F0",borderRadius:"8px",padding:".45rem .8rem",fontSize:".8rem",outline:"none",color:"#0F172A"}}/>
                  <select value={fStatus} onChange={e=>setFStatus(e.target.value)}
                    style={{border:"1px solid #E2E8F0",borderRadius:"8px",padding:".45rem .8rem",fontSize:".8rem",outline:"none",background:"#fff"}}>
                    {["hamısı","gözlənilir","təsdiqləndi","gəldi","ləğv edildi"].map(s=><option key={s} value={s}>{s}</option>)}
                  </select>
                  <select value={fTable} onChange={e=>setFTable(e.target.value)}
                    style={{border:"1px solid #E2E8F0",borderRadius:"8px",padding:".45rem .8rem",fontSize:".8rem",outline:"none",background:"#fff"}}>
                    <option value="hamısı">Bütün masalar</option>
                    {TABLES.map(t=><option key={t.label} value={t.label}>Masa {t.label}</option>)}
                  </select>
                  {(fDate||fStatus!=="hamısı"||fTable!=="hamısı"||search) && (
                    <button className="btn" onClick={()=>{setFDate("");setFStatus("hamısı");setFTable("hamısı");setSearch("");}}
                      style={{border:"1px solid #FECACA",background:"#FEF2F2",color:"#DC2626",borderRadius:"8px",padding:".45rem .8rem",fontSize:".75rem",fontWeight:600}}>
                      Sıfırla ✕
                    </button>
                  )}
                </div>
                <div style={{padding:".4rem 1rem",background:"#F8FAFC",borderBottom:"1px solid #F1F5F9",fontSize:".72rem",color:"#94A3B8"}}>{filtered.length} nəticə</div>

                {/* Cədvəl */}
                <div style={{overflowY:"auto",flex:1}}>
                  <table style={{width:"100%",borderCollapse:"collapse",fontSize:".82rem"}}>
                    <thead>
                      <tr style={{background:"#F8FAFC"}}>
                        {["Ad Soyad","Tarix / Saat","Masa","Qonaq","Status","Ön sifariş"].map(h=>(
                          <th key={h} style={{padding:".7rem .8rem",textAlign:"left",fontWeight:600,fontSize:".68rem",letterSpacing:".05em",textTransform:"uppercase",color:"#94A3B8",borderBottom:"1px solid #E2E8F0",whiteSpace:"nowrap"}}>{h}</th>
                        ))}
                      </tr>
                    </thead>
                    <tbody>
                      {filtered.map(r=>(
                        <tr key={r.id} className={`rh ${newIds.has(r.id)?"new-row":""}`} onClick={()=>setSel(r)}
                          style={{borderBottom:"1px solid #F8FAFC",cursor:"pointer",background:sel?.id===r.id?"#EFF6FF":"",transition:"background .3s"}}>
                          <td style={{padding:".75rem .8rem"}}>
                            <div style={{fontWeight:600,fontSize:".85rem"}}>{r.name}</div>
                            <div style={{fontSize:".68rem",color:"#94A3B8"}}>{r.phone}</div>
                          </td>
                          <td style={{padding:".75rem .8rem",color:"#64748B"}}>
                            <div style={{fontWeight:500}}>{r.date}</div>
                            <div style={{fontSize:".72rem"}}>{r.time}</div>
                          </td>
                          <td style={{padding:".75rem .8rem"}}>
                            <span style={{background:"#F1F5F9",padding:".18rem .5rem",borderRadius:"6px",fontWeight:600,fontSize:".75rem"}}>{r.table_label}</span>
                          </td>
                          <td style={{padding:".75rem .8rem",color:"#64748B",textAlign:"center"}}>{r.guests}</td>
                          <td style={{padding:".75rem .8rem"}}>
                            <div style={{display:"flex",alignItems:"center",gap:".4rem"}}>
                              <Badge status={r.status}/>
                              {updId===r.id && <div className="spin" style={{width:"12px",height:"12px",border:"2px solid #E2E8F0",borderTop:"2px solid #3B82F6",borderRadius:"50%"}}/>}
                            </div>
                          </td>
                          <td style={{padding:".75rem .8rem",color:r.pre_order_total?"#16A34A":"#CBD5E1",fontWeight:r.pre_order_total?700:400}}>
                            {r.pre_order_total ? `${r.pre_order_total}₼` : "—"}
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                  {filtered.length===0 && <div style={{padding:"3rem",textAlign:"center",color:"#94A3B8"}}><div style={{fontSize:"2rem",marginBottom:".5rem"}}>🔍</div><div style={{fontWeight:600}}>Nəticə tapılmadı</div></div>}
                </div>
              </div>

              {/* Detal panel */}
              {sel && (
                <div style={{width:"300px",background:"#fff",borderRadius:"14px",border:"1px solid #E2E8F0",flexShrink:0,overflow:"hidden",display:"flex",flexDirection:"column"}}>
                  <div style={{padding:"1rem 1.2rem",borderBottom:"1px solid #F1F5F9",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <div style={{fontWeight:700,fontSize:".9rem"}}>Detallar</div>
                    <button onClick={()=>setSel(null)} style={{background:"none",border:"none",cursor:"pointer",fontSize:"1.1rem",color:"#94A3B8"}}>✕</button>
                  </div>
                  <div style={{padding:"1.2rem",flex:1,overflowY:"auto"}}>
                    <div style={{fontWeight:800,fontSize:"1.1rem",marginBottom:".2rem"}}>{sel.name}</div>
                    <div style={{fontSize:".72rem",color:"#64748B",marginBottom:".5rem"}}>{sel.phone}</div>
                    <div style={{display:"flex",alignItems:"center",gap:".5rem",marginBottom:"1rem"}}>
                      <Badge status={sel.status}/>
                      {updId===sel.id && <div className="spin" style={{width:"12px",height:"12px",border:"2px solid #E2E8F0",borderTop:"2px solid #3B82F6",borderRadius:"50%"}}/>}
                    </div>
                    {[["📅 Tarix",sel.date],["⏰ Saat",sel.time],["🪑 Masa",`Masa ${sel.table_label}`],["👥 Qonaq",`${sel.guests} nəfər`],["💰 Ön sifariş",sel.pre_order_total?`${sel.pre_order_total}₼`:"Yoxdur"]].map(([k,v])=>(
                      <div key={k} style={{padding:".65rem 0",borderBottom:"1px solid #F8FAFC",display:"flex",justifyContent:"space-between"}}>
                        <span style={{fontSize:".75rem",color:"#94A3B8"}}>{k}</span>
                        <span style={{fontSize:".8rem",fontWeight:600}}>{v}</span>
                      </div>
                    ))}
                    {sel.pre_order_items?.length>0 && (
                      <div style={{marginTop:".8rem",background:"#F8FAFC",borderRadius:"8px",padding:".75rem"}}>
                        <div style={{fontSize:".62rem",fontWeight:700,color:"#94A3B8",textTransform:"uppercase",letterSpacing:".08em",marginBottom:".5rem"}}>Ön sifarişlər</div>
                        {sel.pre_order_items.map((item,i)=>(
                          <div key={i} style={{display:"flex",justifyContent:"space-between",fontSize:".78rem",marginBottom:".2rem"}}>
                            <span>{item.name} x{item.qty}</span>
                            <span style={{fontWeight:600}}>{item.price*item.qty}₼</span>
                          </div>
                        ))}
                      </div>
                    )}
                    {/* STATUS DEYİŞ — refresh olmadan */}
                    <div style={{marginTop:"1.2rem"}}>
                      <div style={{fontSize:".65rem",fontWeight:700,color:"#94A3B8",textTransform:"uppercase",letterSpacing:".08em",marginBottom:".6rem"}}>Status dəyiş</div>
                      <div style={{display:"flex",flexDirection:"column",gap:".4rem"}}>
                        {["gözlənilir","təsdiqləndi","gəldi","ləğv edildi"].map(s=>{
                          const c=SC[s]; const active=sel.status===s;
                          return (
                            <button key={s} className="btn" disabled={updId===sel.id}
                              onClick={()=>!active && updStatus(sel.id,s)}
                              style={{padding:".55rem .8rem",borderRadius:"8px",border:`1px solid ${active?c.border:"#E2E8F0"}`,background:active?c.bg:"#fff",color:active?c.text:"#64748B",fontFamily:"inherit",fontSize:".78rem",fontWeight:active?700:500,textAlign:"left",cursor:active?"default":"pointer",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                              <span>{active?"✓ ":""}{s}</span>
                            </button>
                          );
                        })}
                      </div>
                    </div>
                  </div>
                </div>
              )}
            </div>
          )}

          {/* ── MASALAR ── */}
          {!loading && page==="tables" && (
            <div>
              <div style={{marginBottom:"1.5rem"}}>
                <div style={{fontSize:"1.4rem",fontWeight:800,letterSpacing:"-.02em",marginBottom:".2rem"}}>Masalar</div>
                <div style={{fontSize:".8rem",color:"#94A3B8"}}>Bugünkü vəziyyət — real-time</div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(260px,1fr))",gap:"1rem"}}>
                {tblStatus.map(t=>(
                  <div key={t.label} style={{background:"#fff",borderRadius:"14px",border:`2px solid ${t.busy?"#FECACA":"#86EFAC"}`,overflow:"hidden"}}>
                    <div style={{padding:"1rem 1.2rem",background:t.busy?"#FEF2F2":"#F0FDF4",borderBottom:`1px solid ${t.busy?"#FECACA":"#86EFAC"}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                      <div>
                        <div style={{fontWeight:800,fontSize:"1.1rem",color:t.busy?"#DC2626":"#16A34A"}}>Masa {t.label}</div>
                        <div style={{fontSize:".72rem",color:"#64748B"}}>{t.zone} · {t.seats} nəfərlik</div>
                      </div>
                      <div style={{fontSize:"1.8rem"}}>{t.busy?"🔴":"🟢"}</div>
                    </div>
                    <div style={{padding:"1rem 1.2rem"}}>
                      {t.bookings.length===0
                        ? <div style={{color:"#94A3B8",fontSize:".8rem",textAlign:"center",padding:".5rem 0"}}>Bu gün boşdur</div>
                        : t.bookings.map(r=>(
                          <div key={r.id} style={{marginBottom:".6rem",padding:".65rem",background:"#F8FAFC",borderRadius:"8px",border:"1px solid #E2E8F0"}}>
                            <div style={{display:"flex",justifyContent:"space-between",marginBottom:".25rem"}}>
                              <span style={{fontWeight:600,fontSize:".82rem"}}>{r.name}</span>
                              <span style={{fontSize:".72rem",color:"#64748B"}}>⏰ {r.time}</span>
                            </div>
                            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:".35rem"}}>
                              <span style={{fontSize:".72rem",color:"#64748B"}}>{r.guests} nəfər</span>
                              <Badge status={r.status}/>
                            </div>
                            {r.status==="gözlənilir" && (
                              <div style={{display:"flex",gap:".4rem"}}>
                                <button className="btn" onClick={()=>updStatus(r.id,"təsdiqləndi")} disabled={updId===r.id}
                                  style={{flex:1,padding:".3rem",background:"#DCFCE7",border:"1px solid #86EFAC",color:"#16A34A",borderRadius:"6px",fontSize:".68rem",fontWeight:600,cursor:"pointer"}}>Təsdiqlə</button>
                                <button className="btn" onClick={()=>updStatus(r.id,"ləğv edildi")} disabled={updId===r.id}
                                  style={{flex:1,padding:".3rem",background:"#FEE2E2",border:"1px solid #FCA5A5",color:"#DC2626",borderRadius:"6px",fontSize:".68rem",fontWeight:600,cursor:"pointer"}}>Ləğv et</button>
                              </div>
                            )}
                            {r.status==="təsdiqləndi" && (
                              <button className="btn" onClick={()=>updStatus(r.id,"gəldi")} disabled={updId===r.id}
                                style={{width:"100%",padding:".3rem",background:"#DBEAFE",border:"1px solid #93C5FD",color:"#2563EB",borderRadius:"6px",fontSize:".68rem",fontWeight:600,cursor:"pointer"}}>Gəldi ✓</button>
                            )}
                          </div>
                        ))
                      }
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}
        </main>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
