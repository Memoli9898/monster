[build]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "/r/*"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/admin.html"
  to = "/admin.html"
  status = 200

[[redirects]]
  from = "/owner.html"
  to = "/owner.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
