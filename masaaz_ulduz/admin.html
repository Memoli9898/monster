function QRScanPage({sb}){
  const html5QrRef=useRef(null);
  const [scanning,setScanning]=useState(false);
  const [result,setResult]=useState(null);
  const [loading,setLoading]=useState(false);

  const stopScan=async()=>{
    if(html5QrRef.current){
      try{await html5QrRef.current.stop();html5QrRef.current.clear();}catch(e){}
      html5QrRef.current=null;
    }
    setScanning(false);
  };

  useEffect(()=>()=>{stopScan();},[]);

  const handleQR=async(text)=>{
    setLoading(true);
    const code=text.startsWith("MASAAZ:")?text.slice(7):text;
    const{data,error}=await sb.from("reservations").select("*").eq("booking_code",code).maybeSingle();
    setLoading(false);
    if(error||!data){setResult({status:"notfound",code});return;}
    if(data.status==="gəldi"){setResult({status:"already",row:data});return;}
    await sb.from("reservations").update({status:"gəldi"}).eq("id",data.id);
    setResult({status:"found",row:{...data,status:"gəldi"}});
  };

  const startScan=()=>{
    setResult(null);
    const scanner=new Html5Qrcode("qr-reader");
    html5QrRef.current=scanner;
    setScanning(true);
    scanner.start(
      {facingMode:"environment"},
      {fps:10,qrbox:{width:250,height:250}},
      async(text)=>{await stopScan();handleQR(text);},
      ()=>{}
    ).catch(err=>{setScanning(false);html5QrRef.current=null;setResult({status:"error",msg:"Kamera açılmadı: "+err});});
  };

  const reset=()=>{setResult(null);};

  const Card=({bg,border,children})=>(
    <div style={{background:bg,border:`2px solid ${border}`,borderRadius:"16px",padding:"2rem",textAlign:"center"}}>{children}</div>
  );

  return(
    <div style={{maxWidth:"540px",margin:"0 auto"}}>
      <div style={{marginBottom:"1.5rem"}}>
        <div style={{fontSize:"1.4rem",fontWeight:800,letterSpacing:"-.02em",marginBottom:".2rem"}}>📷 QR Oxut</div>
        <div style={{fontSize:".8rem",color:"#94A3B8"}}>Müştərinin QR kodunu oxudun — avtomatik "Gəldi" işarələnir</div>
      </div>
      {!result&&!loading&&(
        <div style={{background:"#fff",borderRadius:"16px",border:"1px solid #E2E8F0",overflow:"hidden"}}>
          <div id="qr-reader" style={{width:"100%"}}/>
          {!scanning?(
            <div style={{padding:"3rem",textAlign:"center"}}>
              <div style={{fontSize:"3.5rem",marginBottom:"1rem"}}>📷</div>
              <div style={{fontWeight:700,fontSize:"1rem",marginBottom:".4rem"}}>Müştərinin QR kodunu oxudun</div>
              <div style={{fontSize:".82rem",color:"#94A3B8",marginBottom:"1.5rem"}}>Telefon kamerasını müştərinin ekranına tutun</div>
              <button onClick={startScan} style={{background:"#0F172A",color:"#fff",border:"none",borderRadius:"10px",padding:".8rem 2rem",fontSize:".95rem",fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>📷 Kameranı Aç</button>
            </div>
          ):(
            <div style={{padding:"1rem",textAlign:"center",borderTop:"1px solid #F1F5F9"}}>
              <div style={{fontSize:".82rem",color:"#64748B",marginBottom:".7rem"}}>QR koda tutun...</div>
              <button onClick={stopScan} style={{background:"#FEF2F2",color:"#DC2626",border:"1px solid #FECACA",borderRadius:"8px",padding:".5rem 1.2rem",fontSize:".85rem",fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>✕ Ləğv et</button>
            </div>
          )}
        </div>
      )}
      {loading&&<div style={{background:"#fff",borderRadius:"16px",border:"1px solid #E2E8F0",padding:"3rem",textAlign:"center"}}><div style={{fontSize:"2rem",marginBottom:"1rem"}}>⏳</div><div style={{fontWeight:600}}>Yoxlanılır...</div></div>}
      {result&&!loading&&(
        <div>
          {result.status==="found"&&<Card bg="#F0FDF4" border="#86EFAC">
            <div style={{fontSize:"3rem",marginBottom:".7rem"}}>✅</div>
            <div style={{fontWeight:800,fontSize:"1.3rem",color:"#16A34A",marginBottom:".3rem"}}>Müştəri Gəldi!</div>
            <div style={{fontSize:".82rem",color:"#64748B",marginBottom:"1rem"}}>Status "Gəldi ✓" olaraq yeniləndi</div>
            <div style={{background:"#fff",borderRadius:"10px",border:"1px solid #BBF7D0",padding:".9rem 1rem",textAlign:"left",marginBottom:"1rem",fontSize:".83rem"}}>
              {[["Ad",result.row.name],["Restoran",result.row.restaurant_name],["Tarix",result.row.date],["Saat",result.row.time],["Masa","Masa "+result.row.table_label],["Qonaq",result.row.guests+" nəfər"]].map(([k,v])=>(
                <div key={k} style={{display:"flex",gap:".5rem",marginBottom:".3rem"}}><span style={{color:"#94A3B8",minWidth:"60px"}}>{k}:</span><span style={{fontWeight:600}}>{v}</span></div>
              ))}
            </div>
            <button onClick={reset} style={{background:"#0F172A",color:"#fff",border:"none",borderRadius:"10px",padding:".7rem 2rem",fontSize:".9rem",fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>📷 Yeni QR Oxut</button>
          </Card>}
          {result.status==="already"&&<Card bg="#EFF6FF" border="#93C5FD">
            <div style={{fontSize:"3rem",marginBottom:".7rem"}}>ℹ️</div>
            <div style={{fontWeight:800,fontSize:"1.2rem",color:"#1D4ED8",marginBottom:".3rem"}}>Artıq Qeyd Edilib</div>
            <div style={{fontSize:".82rem",color:"#64748B",marginBottom:"1rem"}}>Bu müştəri artıq "Gəldi" kimi işarələnib</div>
            <div style={{background:"#fff",borderRadius:"8px",border:"1px solid #BFDBFE",padding:".7rem 1rem",fontSize:".82rem",marginBottom:"1rem"}}><b>{result.row.name}</b> · {result.row.date} {result.row.time} · Masa {result.row.table_label}</div>
            <button onClick={reset} style={{background:"#2563EB",color:"#fff",border:"none",borderRadius:"10px",padding:".7rem 1.8rem",fontSize:".88rem",fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>📷 Yeni QR Oxut</button>
          </Card>}
          {result.status==="notfound"&&<Card bg="#FEF2F2" border="#FECACA">
            <div style={{fontSize:"3rem",marginBottom:".7rem"}}>❌</div>
            <div style={{fontWeight:800,fontSize:"1.2rem",color:"#DC2626",marginBottom:".3rem"}}>Tapılmadı</div>
            <div style={{fontSize:".82rem",color:"#64748B",marginBottom:"1rem"}}>Kod: <b>{result.code}</b></div>
            <button onClick={reset} style={{background:"#DC2626",color:"#fff",border:"none",borderRadius:"10px",padding:".7rem 1.8rem",fontSize:".88rem",fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>📷 Yenidən</button>
          </Card>}
          {result.status==="error"&&<Card bg="#FEF2F2" border="#FECACA">
            <div style={{fontSize:"3rem",marginBottom:".7rem"}}>⚠️</div>
            <div style={{fontWeight:700,color:"#DC2626",marginBottom:".5rem"}}>Kamera Xətası</div>
            <div style={{fontSize:".78rem",color:"#64748B",marginBottom:"1rem"}}>{result.msg}</div>
            <button onClick={reset} style={{background:"#0F172A",color:"#fff",border:"none",borderRadius:"10px",padding:".7rem 1.8rem",fontSize:".88rem",fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>Yenidən Cəhd Et</button>
          </Card>}
        </div>
      )}
    </div>
  );
}

function SubPayWall({admin, sub, onRefresh, onLogout}){
  const [loading,  setLoading]  = useState(false);
  const [checking, setChecking] = useState(false);
  const [msg,      setMsg]      = useState(null);
  const [payLink,  setPayLink]  = useState("");

  useEffect(()=>{
    // Owner-in qoyduğu Stripe Payment Link-i yüklə
    sb.from("platform_settings").select("value")
      .eq("key","stripe_payment_link").maybeSingle()
      .then(({data})=>{ if(data?.value) setPayLink(data.value); });
  },[]);

  const daysLeft = subDaysLeft(sub);
  const isExpired = sub && !subActive(sub);

  const pay = () => {
    if(!payLink){
      setMsg("Ödəniş linki hələ qurulmayıb. MasaAz sahibi ilə əlaqə saxlayın.");
      return;
    }
    // Restoran ID-ni client_reference_id kimi əlavə et — webhook tanısın
    const url = payLink + (payLink.includes("?")?"&":"?") + "client_reference_id=" + admin.restaurant_id;
    window.open(url, "_blank");

  const checkManually = async() => {
    setChecking(true);
    await onRefresh();
    setChecking(false);
  };

  return(
    <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#0F172A 0%,#1E3A5F 50%,#0F172A 100%)",display:"flex",alignItems:"center",justifyContent:"center",padding:"2rem",fontFamily:"Inter,system-ui,sans-serif",position:"relative"}}>

          <div key={i} style={{position:"absolute",left:l,top:t,width:s,height:s,borderRadius:"50%",background:bg,filter:"blur(60px)"}}/>

          <div style={{width:"72px",height:"72px",borderRadius:"20px",background:"linear-gradient(135deg,#3B82F6,#1D4ED8)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"2rem",margin:"0 auto .9rem",boxShadow:"0 8px 32px rgba(59,130,246,.4)"}}>🍽️</div>

            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

  const [loading,  setLoading]  = useState(false);
  const [checking, setChecking] = useState(false);
  const [msg,      setMsg]      = useState(null);
  const [payments, setPayments] = useState([]);
  const [payLink,  setPayLink]  = useState("");

  useEffect(()=>{
    if(!admin?.restaurant_id) return;
    sb.from("payment_history").select("*")
      .eq("restaurant_id", admin.restaurant_id)
      .order("created_at",{ascending:false}).limit(10)
      .then(({data})=>setPayments(data||[]));
    // Stripe Payment Link-i yüklə
    sb.from("platform_settings").select("value").eq("key","stripe_payment_link").maybeSingle()
      .then(({data})=>{ if(data?.value) setPayLink(data.value); });
  },[admin?.restaurant_id]);

  const pay = () => {
    if(!payLink){
      setMsg({text:"Ödəniş linki hələ qurulmayıb. MasaAz sahibi ilə əlaqə saxlayın.",ok:false});
      return;
    }
    const url = payLink + (payLink.includes("?")?"&":"?") + "client_reference_id=" + admin.restaurant_id;
    window.open(url, "_blank");
  };

  const daysLeft = subDaysLeft(sub);
  const active   = subActive(sub);
  const sl = !sub ? {text:"Abunəlik yoxdur",c:"#EF4444",bg:"#FEF2F2",bd:"#FECACA"}
    : sub.status==="active"&&active ? {text:"Aktiv ✅",c:"#16A34A",bg:"#F0FDF4",bd:"#86EFAC"}
    : sub.status==="trial"&&active  ? {text:"Trial 🕐",c:"#D97706",bg:"#FFFBEB",bd:"#FDE68A"}
    : {text:"Bitmişdir ❌",c:"#DC2626",bg:"#FEF2F2",bd:"#FECACA"};

  return(
    <div style={{maxWidth:"800px"}}>
      <div style={{marginBottom:"1.5rem"}}>
        <div style={{fontSize:"1.4rem",fontWeight:800,letterSpacing:"-.02em",marginBottom:".2rem"}}>💳 Abunəlik</div>
        <div style={{fontSize:".8rem",color:"#94A3B8"}}>Aylıq MasaAz platforması istifadə haqqı</div>
      </div>

      {/* Status kartı */}
      <div style={{background:"#fff",borderRadius:"16px",border:"1px solid #E2E8F0",padding:"1.4rem",marginBottom:"1.5rem",display:"flex",alignItems:"center",justifyContent:"space-between",gap:"1rem",flexWrap:"wrap"}}>
        <div style={{display:"flex",alignItems:"center",gap:"1rem"}}>
          <div style={{width:"50px",height:"50px",borderRadius:"12px",background:sl.bg,border:`1.5px solid ${sl.bd}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"1.5rem"}}>
            {active?"✅":"❌"}
          </div>
          <div>
            <span style={{display:"inline-block",padding:".25rem .7rem",background:sl.bg,color:sl.c,border:`1px solid ${sl.bd}`,borderRadius:"20px",fontSize:".8rem",fontWeight:700,marginBottom:".3rem"}}>{sl.text}</span>
            {active && daysLeft > 0 &&
              <div style={{fontSize:".78rem",color:"#64748B"}}>⏳ {daysLeft} gün qaldı · {sub.status==="active"?new Date(sub.expires_at).toLocaleDateString("az-AZ"):new Date(sub.trial_ends_at).toLocaleDateString("az-AZ")} tarixinə qədər</div>}
            {!active && <div style={{fontSize:".78rem",color:"#DC2626",fontWeight:600}}>Abunəliyi yeniləmədən panel tam işləməyəcək</div>}
          </div>
        </div>
        <button onClick={async()=>{setChecking(true);await onRefresh();setChecking(false);}}
          style={{background:"#F1F5F9",border:"1px solid #E2E8F0",borderRadius:"8px",padding:".5rem 1rem",fontSize:".8rem",color:"#64748B",cursor:"pointer",fontFamily:"inherit"}}>
          {checking?"⏳":"🔄"} Yenilə
        </button>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"1.5rem",marginBottom:"1.5rem"}}>
        {/* Tarif */}
        <div style={{background:"linear-gradient(135deg,#0F172A,#1E3A5F)",borderRadius:"16px",padding:"1.5rem",color:"#fff",position:"relative",overflow:"hidden"}}>
          <div style={{position:"absolute",top:"-20px",right:"-20px",width:"120px",height:"120px",borderRadius:"50%",background:"rgba(59,130,246,.15)"}}/>
          <div style={{position:"relative"}}>
            <div style={{fontSize:".68rem",fontWeight:600,letterSpacing:".1em",textTransform:"uppercase",color:"#94A3B8",marginBottom:".5rem"}}>Aylıq Plan</div>
            <div style={{display:"flex",alignItems:"baseline",gap:".3rem",marginBottom:"1rem"}}>
              <span style={{fontSize:"2.8rem",fontWeight:800}}>$29</span>
              <span style={{color:"#64748B",fontSize:".85rem"}}>/ay</span>
            </div>
            {["✅ Sınırsız rezervasiya","✅ Real-time bildirişlər","✅ WhatsApp mesajları","✅ Dashboard + analitika","✅ QR kod generatoru","✅ Masa idarəetməsi"].map((f,i)=>(
              <div key={i} style={{fontSize:".78rem",color:"#CBD5E1",marginBottom:".3rem"}}>{f}</div>
            ))}
            <button onClick={pay} disabled={loading}
              style={{width:"100%",marginTop:"1.2rem",background:loading?"rgba(59,130,246,.4)":"linear-gradient(135deg,#3B82F6,#2563EB)",color:"#fff",border:"none",borderRadius:"10px",padding:".8rem",fontSize:".9rem",fontWeight:700,cursor:loading?"not-allowed":"pointer",fontFamily:"inherit",boxShadow:"0 4px 16px rgba(59,130,246,.4)"}}>
              {loading?"⏳ Yüklənir...": active?"💳 Uzatmaq üçün ödə":"💳 İndi ödəniş et"}
            </button>
            {msg&&<div style={{marginTop:".7rem",padding:".5rem .8rem",borderRadius:"8px",background:"rgba(239,68,68,.2)",color:"#FCA5A5",fontSize:".78rem",textAlign:"center"}}>{msg.text}</div>}
          </div>
        </div>

        {/* Necə işləyir */}
        <div style={{background:"#fff",borderRadius:"16px",border:"1px solid #E2E8F0",padding:"1.4rem"}}>
          <div style={{fontWeight:700,fontSize:".9rem",marginBottom:"1rem"}}>📋 Necə işləyir?</div>
          {[
            {n:"1",t:"Ödəniş et",d:"Düyməyə bas → Stripe ödəniş səhifəsinə yönləndirilirsin"},
            {n:"2",t:"Kart məlumatlarını daxil et",d:"Visa / Mastercard — bütün əsas kartlar qəbul edilir"},
            {n:"3",t:"30 saniyə ərzində aktiv olur",d:"Ödəniş uğurlu → abunəlik avtomatik aktiv edilir"},
            {n:"4",t:"1 ay tam giriş",d:"Növbəti ay yenidən ödəniş et — ya da ləğv et"},
          ].map(s=>(
            <div key={s.n} style={{display:"flex",gap:".8rem",marginBottom:".9rem",alignItems:"flex-start"}}>
              <div style={{width:"24px",height:"24px",borderRadius:"50%",background:"#EFF6FF",border:"1.5px solid #BFDBFE",display:"flex",alignItems:"center",justifyContent:"center",fontSize:".72rem",fontWeight:800,color:"#2563EB",flexShrink:0}}>{s.n}</div>
              <div><div style={{fontWeight:700,fontSize:".8rem",marginBottom:".1rem"}}>{s.t}</div><div style={{fontSize:".73rem",color:"#64748B",lineHeight:1.5}}>{s.d}</div></div>
            </div>
          ))}
          <div style={{background:"#F0FDF4",borderRadius:"8px",padding:".75rem",border:"1px solid #86EFAC",fontSize:".73rem",color:"#16A34A",marginTop:".4rem"}}>
            🔒 Ödənişlər Stripe tərəfindən işlənir — kart məlumatları serverə göndərilmir
          </div>
        </div>
      </div>

      {/* Ödəniş tarixi */}
      {payments.length > 0 && (
        <div style={{background:"#fff",borderRadius:"14px",border:"1px solid #E2E8F0",overflow:"hidden"}}>
          <div style={{padding:"1rem 1.2rem",borderBottom:"1px solid #F1F5F9",fontWeight:700,fontSize:".9rem"}}>📜 Ödəniş tarixi</div>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:".8rem"}}>
            <thead><tr style={{background:"#F8FAFC"}}>
              {["Tarix","Məbləğ","Dövr","Status"].map(h=><th key={h} style={{padding:".55rem 1rem",textAlign:"left",fontWeight:600,fontSize:".65rem",letterSpacing:".05em",textTransform:"uppercase",color:"#94A3B8",borderBottom:"1px solid #E2E8F0"}}>{h}</th>)}
            </tr></thead>
            <tbody>
              {payments.map(p=>(
                <tr key={p.id} style={{borderBottom:"1px solid #F8FAFC"}}>
                  <td style={{padding:".7rem 1rem",color:"#64748B"}}>{p.created_at?.slice(0,10)}</td>
                  <td style={{padding:".7rem 1rem",fontWeight:700,color:"#16A34A"}}>${p.amount}</td>
                  <td style={{padding:".7rem 1rem",color:"#64748B",fontSize:".75rem"}}>
                    {p.period_start?new Date(p.period_start).toLocaleDateString("az-AZ"):"—"} → {p.period_end?new Date(p.period_end).toLocaleDateString("az-AZ"):"—"}
                  </td>
                  <td style={{padding:".7rem 1rem"}}>
                    <span style={{padding:".18rem .55rem",borderRadius:"20px",fontSize:".7rem",fontWeight:600,
                      background:p.status==="paid"?"#DCFCE7":p.status==="pending"?"#FEF9C3":"#FEE2E2",
                      color:p.status==="paid"?"#16A34A":p.status==="pending"?"#CA8A04":"#DC2626"
                    }}>{p.status==="paid"?"✅ Ödənilib":p.status==="pending"?"⏳ Gözlənilir":"❌ Uğursuz"}</span>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
}


// ════════════════════════════════════════════════════════════
// 🍽️ MENÜ SƏHİFƏSİ — Admin öz restoranının menüsünü idarə edir
// ════════════════════════════════════════════════════════════
const MENU_CATS = ["Soyuq içkilər","İsti içkilər","Şorbalar","Salatlar","Əsas yeməklər","Qəlyanaltılar","Desertlər","Pizzalar","Burgerlər","Digər"];

function MenuPage({admin}){
  const restId = admin?.restaurant_id;
  const [items,    setItems]   = useState([]);
  const [loading,  setLoading] = useState(true);
  const [saving,   setSaving]  = useState(false);
  const [msg,      setMsg]     = useState(null);
  const [editItem, setEditItem]= useState(null);
  const [filterCat,setFCat]   = useState("hamısı");

  // Form state
  const emptyForm = {name:"",description:"",price:"",category:"Əsas yeməklər",available:true,img_url:""};
  const [form, setForm] = useState(emptyForm);
  const setF = k => e => setForm(p=>({...p,[k]:e.target.type==="checkbox"?e.target.checked:e.target.value}));

  const show = (text,ok=true)=>{ setMsg({text,ok}); setTimeout(()=>setMsg(null),3500); };

  const load = async()=>{
    if(!restId){ setLoading(false); return; }
    setLoading(true);
    const {data} = await sb.from("menu_items").select("*")
      .eq("restaurant_id", restId).order("category").order("name");
    setItems(data||[]);
    setLoading(false);
  };

  useEffect(()=>{ load(); },[restId]);

  const save = async()=>{
    if(!form.name.trim()||!form.price){ show("Ad və qiymət mütləqdir",false); return; }
    setSaving(true);
    const payload = {
      ...form,
      restaurant_id: restId,
      price: parseFloat(form.price),
    };
    try{
      if(editItem){
        const {error} = await sb.from("menu_items").update(payload).eq("id",editItem.id);
        if(error) throw error;
        show("Yeniləndi ✓");
      } else {
        const {error} = await sb.from("menu_items").insert(payload);
        if(error) throw error;
        show("Əlavə edildi ✓");
      }
      setForm(emptyForm); setEditItem(null); load();
    } catch(e){ show("Xəta: "+(e.message||"bilinmir"),false); }
    setSaving(false);
  };

  const fill = item =>{ setEditItem(item); setForm({name:item.name,description:item.description||"",price:String(item.price),category:item.category||"Əsas yeməklər",available:item.available!==false,img_url:item.img_url||""}); };
  const clear = ()=>{ setEditItem(null); setForm(emptyForm); };

  const del = async id=>{
    if(!confirm("Bu məhsulu silmək istəyirsiniz?")) return;
    await sb.from("menu_items").delete().eq("id",id);
    show("Silindi ✓"); load();
  };

  const toggleAvail = async(item)=>{
    await sb.from("menu_items").update({available:!item.available}).eq("id",item.id);
    setItems(p=>p.map(x=>x.id===item.id?{...x,available:!x.available}:x));
  };

  const cats = ["hamısı",...new Set(items.map(i=>i.category).filter(Boolean))];
  const filtered = filterCat==="hamısı" ? items : items.filter(i=>i.category===filterCat);

  const inp  = {border:"1px solid #E2E8F0",borderRadius:"8px",padding:".55rem .8rem",fontSize:".85rem",outline:"none",width:"100%",background:"#fff",fontFamily:"inherit",color:"#0F172A"};
  const lbl  = {fontSize:".63rem",fontWeight:700,letterSpacing:".09em",textTransform:"uppercase",color:"#94A3B8",marginBottom:".35rem",display:"block"};

  if(!restId) return(
    <div style={{textAlign:"center",padding:"4rem",color:"#94A3B8"}}>
      <div style={{fontSize:"2rem",marginBottom:"1rem"}}>🔒</div>
      <div style={{fontWeight:600}}>Bu bölmə yalnız restoran adminləri üçündür</div>
    </div>
  );

  if(loading) return <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"60vh"}}><Spin s={36}/></div>;

  return(
    <div style={{display:"grid",gridTemplateColumns:"340px 1fr",gap:"1.5rem",alignItems:"start"}}>

      {/* Sol: Form */}
      <div style={{background:"#fff",borderRadius:"14px",border:"1px solid #E2E8F0",padding:"1.4rem",position:"sticky",top:"1.5rem"}}>
        <div style={{fontWeight:700,fontSize:".95rem",marginBottom:"1.2rem",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          {editItem?"✏️ Düzəlt":"➕ Yeni məhsul"}
          {editItem&&<button onClick={clear} style={{background:"none",border:"none",cursor:"pointer",color:"#94A3B8",fontSize:"1.1rem"}}>✕</button>}
        </div>

        {msg&&<div style={{background:msg.ok?"#F0FDF4":"#FEF2F2",border:`1px solid ${msg.ok?"#86EFAC":"#FECACA"}`,borderRadius:"8px",padding:".65rem .9rem",marginBottom:"1rem",color:msg.ok?"#16A34A":"#DC2626",fontSize:".82rem",fontWeight:600}}>{msg.text}</div>}

        <div style={{display:"grid",gap:".75rem",marginBottom:"1rem"}}>
          <div>
            <label style={lbl}>Məhsul adı *</label>
            <input style={inp} value={form.name} onChange={setF("name")} placeholder="Məs: Qutab"/>
          </div>
          <div>
            <label style={lbl}>Təsvir</label>
            <textarea style={{...inp,resize:"vertical"}} rows={2} value={form.description} onChange={setF("description")} placeholder="Qısa açıqlama..."/>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:".6rem"}}>
            <div>
              <label style={lbl}>Qiymət (₼) *</label>
              <input style={inp} type="number" step="0.5" min="0" value={form.price} onChange={setF("price")} placeholder="12.50"/>
            </div>
            <div>
              <label style={lbl}>Kateqoriya</label>
              <select style={inp} value={form.category} onChange={setF("category")}>
                {MENU_CATS.map(cat=><option key={cat} value={cat}>{cat}</option>)}
              </select>
            </div>
          </div>
          <div>
            <label style={lbl}>Şəkil URL (isteğe bağlı)</label>
            <input style={inp} value={form.img_url} onChange={setF("img_url")} placeholder="https://..."/>
          </div>
          <label style={{display:"flex",alignItems:"center",gap:".5rem",cursor:"pointer",fontSize:".85rem",background:"#F8FAFC",padding:".6rem .8rem",borderRadius:"8px",border:"1px solid #E2E8F0"}}>
            <input type="checkbox" checked={form.available} onChange={setF("available")} style={{width:"16px",height:"16px"}}/>
            <span style={{fontWeight:600,color:form.available?"#16A34A":"#94A3B8"}}>Aktiv (menüdə görünür)</span>
          </label>
        </div>

        <div style={{display:"flex",gap:".6rem"}}>
          <button onClick={save} disabled={saving}
            style={{flex:1,background:saving?"#94A3B8":"#0F172A",color:"#fff",border:"none",borderRadius:"10px",padding:".75rem",fontSize:".88rem",fontWeight:700,cursor:saving?"not-allowed":"pointer",fontFamily:"inherit"}}>
            {saving?"⏳ Saxlanır...":editItem?"✓ Yadda saxla":"➕ Əlavə et"}
          </button>
          {editItem&&<button onClick={clear} style={{background:"#F1F5F9",border:"1px solid #E2E8F0",borderRadius:"10px",padding:".75rem 1rem",fontSize:".85rem",fontWeight:600,cursor:"pointer",fontFamily:"inherit",color:"#64748B"}}>Ləğv</button>}
        </div>
      </div>

      {/* Sağ: Məhsul siyahısı */}
      <div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"1rem",flexWrap:"wrap",gap:".5rem"}}>
          <div style={{fontWeight:700,fontSize:"1rem"}}>{items.length} məhsul</div>
          <div style={{display:"flex",gap:".4rem",flexWrap:"wrap"}}>
            {cats.map(cat=>(
              <button key={cat} onClick={()=>setFCat(cat)}
                style={{padding:".3rem .8rem",borderRadius:"20px",border:`1.5px solid ${filterCat===cat?"#3B82F6":"#E2E8F0"}`,background:filterCat===cat?"#EFF6FF":"#fff",color:filterCat===cat?"#2563EB":"#64748B",fontSize:".75rem",fontWeight:filterCat===cat?700:500,cursor:"pointer",fontFamily:"inherit"}}>
                {cat}
              </button>
            ))}
          </div>
        </div>

        {filtered.length===0
          ? <div style={{background:"#fff",borderRadius:"14px",border:"1px solid #E2E8F0",padding:"3rem",textAlign:"center",color:"#94A3B8"}}>
              <div style={{fontSize:"2rem",marginBottom:".5rem"}}>🍽️</div>
              <div style={{fontWeight:600}}>Hələ məhsul yoxdur</div>
              <div style={{fontSize:".8rem",marginTop:".3rem"}}>Sol formdan ilk məhsulu əlavə edin</div>
            </div>
          : <div style={{display:"grid",gap:".8rem"}}>
              {filtered.map(item=>(
                <div key={item.id} style={{background:"#fff",borderRadius:"12px",border:`1.5px solid ${editItem?.id===item.id?"#3B82F6":"#E2E8F0"}`,padding:"1rem 1.2rem",display:"flex",alignItems:"center",gap:"1rem"}}>
                  {item.img_url
                    ? <img src={item.img_url} alt={item.name} style={{width:"56px",height:"56px",borderRadius:"10px",objectFit:"cover",flexShrink:0}}/>
                    : <div style={{width:"56px",height:"56px",borderRadius:"10px",background:"#F1F5F9",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"1.6rem",flexShrink:0}}>🍽️</div>
                  }
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{display:"flex",alignItems:"center",gap:".5rem",marginBottom:".2rem"}}>
                      <span style={{fontWeight:700,fontSize:".9rem"}}>{item.name}</span>
                      <span style={{fontSize:".68rem",padding:".1rem .45rem",borderRadius:"20px",background:"#F1F5F9",color:"#64748B"}}>{item.category}</span>
                      <span style={{fontSize:".68rem",padding:".1rem .45rem",borderRadius:"20px",background:item.available?"#DCFCE7":"#FEE2E2",color:item.available?"#16A34A":"#DC2626",fontWeight:700}}>{item.available?"Aktiv":"Deaktiv"}</span>
                    </div>
                    {item.description&&<div style={{fontSize:".75rem",color:"#64748B",marginBottom:".3rem",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{item.description}</div>}
                    <div style={{fontWeight:800,fontSize:"1rem",color:"#0F172A"}}>{item.price} ₼</div>
                  </div>
                  <div style={{display:"flex",gap:".4rem",flexShrink:0}}>
                    <button onClick={()=>toggleAvail(item)} title={item.available?"Deaktiv et":"Aktiv et"}
                      style={{background:item.available?"#FEF9C3":"#F0FDF4",border:`1px solid ${item.available?"#FDE047":"#86EFAC"}`,color:item.available?"#CA8A04":"#16A34A",borderRadius:"7px",padding:".35rem .65rem",fontSize:".75rem",fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>
                      {item.available?"Gizlət":"Göstər"}
                    </button>
                    <button onClick={()=>fill(item)}
                      style={{background:"#EFF6FF",border:"1px solid #BFDBFE",color:"#2563EB",borderRadius:"7px",padding:".35rem .65rem",fontSize:".75rem",fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>
                      Düzəlt
                    </button>
                    <button onClick={()=>del(item.id)}
                      style={{background:"#FEF2F2",border:"1px solid #FECACA",color:"#DC2626",borderRadius:"7px",padding:".35rem .65rem",fontSize:".75rem",fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>
                      Sil
                    </button>
                  </div>
                </div>
              ))}
            </div>
        }
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
