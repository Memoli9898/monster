function getWACreds(){
  return{inst:localStorage.getItem("wa_instance")||"",tok:localStorage.getItem("wa_token")||""};
}
async function sendWA(phone,message){
  const{inst,tok}=getWACreds();
  if(!inst||!tok)return;
  try{
    let num=(phone||"").replace(/[\s\-\(\)]/g,"");
    if(num.startsWith("+"))num=num.slice(1);
    if(num.startsWith("0"))num="994"+num.slice(1);
    if(!num.startsWith("994"))num="994"+num;
    await fetch(`https://api.green-api.com/waInstance${inst}/sendMessage/${tok}`,
      {method:"POST",headers:{"Content-Type":"application/json"},
       body:JSON.stringify({chatId:num+"@c.us",message})});
  }catch(e){console.warn("WA:",e.message);}
}

async function loadSub(restaurant_id){
  if(!restaurant_id) return null;
  const {data} = await sb.from("subscriptions")
    .select("*").eq("restaurant_id", restaurant_id).maybeSingle();
  return data;
}
function subActive(s){
  if(!s) return false;
  if(s.status==="active" && new Date(s.expires_at) > new Date()) return true;
  if(s.status==="trial"  && new Date(s.trial_ends_at) > new Date()) return true;
  return false;
}
function subDaysLeft(s){
  if(!s) return 0;
  const d = s.status==="active" ? s.expires_at : s.trial_ends_at;
  return d ? Math.ceil((new Date(d)-new Date())/864e5) : 0;
}

// ── AUTH HELPERLƏRİ ────────────────────────────────────────
const AUTH_KEY = "masaaz_admin_session";
function getSession(){
  try{
    const s = localStorage.getItem(AUTH_KEY);
    if(!s) return null;
    const parsed = JSON.parse(s);
    if(parsed.expires && Date.now() > parsed.expires) {
      localStorage.removeItem(AUTH_KEY);
      return null;
    }
    return parsed;
  } catch(e){ return null; }
}
function saveSession(admin){
  const session = {
    ...admin,
    expires: Date.now() + 30 * 24 * 60 * 60 * 1000 // 30 gün
  };
  localStorage.setItem(AUTH_KEY, JSON.stringify(session));
}
function clearSession(){
  localStorage.removeItem(AUTH_KEY);
}

let _audioCtx=null;
function getAudioCtx(){
  if(!_audioCtx){try{_audioCtx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}}
  if(_audioCtx&&_audioCtx.state==="suspended")_audioCtx.resume();
  return _audioCtx;
}
document.addEventListener("click",()=>getAudioCtx(),{once:true});
function playSound(){
  try{
    const ctx=getAudioCtx();if(!ctx)return;
    [[523,0,.18],[659,.2,.18],[784,.4,.3]].forEach(([f,w,d])=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);o.type="triangle";o.frequency.value=f;
      g.gain.setValueAtTime(0,ctx.currentTime+w);
      g.gain.linearRampToValueAtTime(.55,ctx.currentTime+w+.04);
      g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+w+d);
      o.start(ctx.currentTime+w);o.stop(ctx.currentTime+w+d+.05);
    });
  }catch(e){}
}

async function uploadImg(file){
  const ext=file.name.split(".").pop();
  const name=`${Date.now()}.${ext}`;

  const {data}=sb.storage.from("table-images").getPublicUrl(name);
  return{url:data.publicUrl,error:null};
}

function TableCanvas({tables,onPositionSave}){
  const canvasRef=useRef();
  const dragging=useRef(null);
  const [positions,setPositions]=useState(()=>{
    const m={};tables.forEach(t=>{m[t.id]={x:t.x||10,y:t.y||10};});return m;
  });
  const [dirty,setDirty]=useState({});

  useEffect(()=>{
    const m={};tables.forEach(t=>{m[t.id]={x:t.x||10,y:t.y||10};});
    setPositions(m);setDirty({});
  },[tables]);

  const onMouseDown=(e,id)=>{
    e.preventDefault();
    const canvas=canvasRef.current.getBoundingClientRect();
    dragging.current={id,startX:e.clientX,startY:e.clientY,origX:positions[id]?.x||10,origY:positions[id]?.y||10,canvas};
    document.getElementById(`tbl-${id}`)?.classList.add("dragging");
  };

  useEffect(()=>{
    const mv=e=>{
      if(!dragging.current)return;
      const{id,startX,startY,origX,origY,canvas}=dragging.current;
      const dx=(e.clientX-startX)/canvas.width*100;
      const dy=(e.clientY-startY)/canvas.height*100;
      setPositions(p=>({...p,[id]:{x:Math.max(0,Math.min(88,origX+dx)),y:Math.max(0,Math.min(82,origY+dy))}}));
    };
    const up=async()=>{
      if(!dragging.current)return;
      const{id,origX,origY}=dragging.current;
      const pos=positions;
      document.getElementById(`tbl-${id}`)?.classList.remove("dragging");
      const cur=pos[id]||{x:origX,y:origY};
      if(Math.abs(cur.x-origX)>0.5||Math.abs(cur.y-origY)>0.5){
        setDirty(p=>({...p,[id]:true}));
        await sb.from("tables").update({x:Math.round(cur.x*10)/10,y:Math.round(cur.y*10)/10}).eq("id",id);
        setDirty(p=>{const n={...p};delete n[id];return n;});
        onPositionSave&&onPositionSave();
      }
      dragging.current=null;
    };
    window.addEventListener("mousemove",mv);
    window.addEventListener("mouseup",up);
    return()=>{window.removeEventListener("mousemove",mv);window.removeEventListener("mouseup",up);};
  },[positions]);

  const shapes={
    round:<svg width="60" height="68" viewBox="0 0 68 76"><rect x="16" y="1" width="36" height="14" rx="7" fill="#E2E8F0" stroke="#CBD5E1" strokeWidth="1.2"/><rect x="16" y="61" width="36" height="14" rx="7" fill="#E2E8F0" stroke="#CBD5E1" strokeWidth="1.2"/><circle cx="34" cy="38" r="22" fill="#F1F5F9" stroke="#CBD5E1" strokeWidth="1.5"/></svg>,
    rect: <svg width="86" height="72" viewBox="0 0 96 82"><rect x="5" y="1" width="24" height="13" rx="6.5" fill="#E2E8F0" stroke="#CBD5E1" strokeWidth="1.2"/><rect x="67" y="1" width="24" height="13" rx="6.5" fill="#E2E8F0" stroke="#CBD5E1" strokeWidth="1.2"/><rect x="5" y="68" width="24" height="13" rx="6.5" fill="#E2E8F0" stroke="#CBD5E1" strokeWidth="1.2"/><rect x="67" y="68" width="24" height="13" rx="6.5" fill="#E2E8F0" stroke="#CBD5E1" strokeWidth="1.2"/><rect x="3" y="16" width="90" height="50" rx="8" fill="#F1F5F9" stroke="#CBD5E1" strokeWidth="1.5"/></svg>,
    rect6:<svg width="104" height="72" viewBox="0 0 114 82">{[4,45,86].map((x,i)=><rect key={i} x={x} y="1" width="24" height="13" rx="6.5" fill="#E2E8F0" stroke="#CBD5E1" strokeWidth="1.2"/>)}{[4,45,86].map((x,i)=><rect key={i} x={x} y="68" width="24" height="13" rx="6.5" fill="#E2E8F0" stroke="#CBD5E1" strokeWidth="1.2"/>)}<rect x="3" y="16" width="108" height="50" rx="8" fill="#F1F5F9" stroke="#CBD5E1" strokeWidth="1.5"/></svg>,
    vip:  <svg width="130" height="78" viewBox="0 0 150 88">{[4,43,82,121].map((x,i)=><rect key={i} x={x} y="1" width="24" height="13" rx="6.5" fill="#FEF3C7" stroke="#FDE68A" strokeWidth="1.2"/>)}{[4,43,82,121].map((x,i)=><rect key={i} x={x} y="74" width="24" height="13" rx="6.5" fill="#FEF3C7" stroke="#FDE68A" strokeWidth="1.2"/>)}<rect x="3" y="16" width="144" height="56" rx="10" fill="#FFFDF5" stroke="#FDE68A" strokeWidth="1.5"/></svg>,
  };

  return(
    <div>
      <div ref={canvasRef} style={{position:"relative",width:"100%",height:"420px",background:"linear-gradient(135deg,#F8FAFC,#F1F5F9)",borderRadius:"10px",border:"1px solid #E2E8F0",overflow:"hidden"}}>
        <svg style={{position:"absolute",inset:0,width:"100%",height:"100%",pointerEvents:"none",opacity:.3}}>
          {[10,20,30,40,50,60,70,80,90].map(p=><line key={`v${p}`} x1={`${p}%`} y1="0" x2={`${p}%`} y2="100%" stroke="#CBD5E1" strokeWidth=".5" strokeDasharray="4,4"/>)}
          {[10,20,30,40,50,60,70,80,90].map(p=><line key={`h${p}`} x1="0" y1={`${p}%`} x2="100%" y2={`${p}%`} stroke="#CBD5E1" strokeWidth=".5" strokeDasharray="4,4"/>)}
        </svg>
        {tables.length===0&&(
          <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",color:"#94A3B8",flexDirection:"column",gap:".5rem"}}>
            <div style={{fontSize:"2rem"}}>🪑</div><div style={{fontSize:".85rem"}}>Masa yoxdur. "İdarəetmə"-dən əlavə edin.</div>
          </div>
        )}
        {tables.map(t=>{
          const pos=positions[t.id]||{x:t.x||10,y:t.y||10};
          return(
            <div key={t.id} id={`tbl-${t.id}`} className="tbl-canvas-item" style={{left:`${pos.x}%`,top:`${pos.y}%`}} onMouseDown={e=>onMouseDown(e,t.id)}>
              <div style={{position:"relative"}}>
                {shapes[t.shape]||shapes.rect}
                <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",pointerEvents:"none"}}>
                  <div style={{fontWeight:700,fontSize:".75rem",color:"#475569"}}>{t.label}</div>
                  <div style={{fontSize:".58rem",color:"#94A3B8"}}>{t.seats}nf</div>
                </div>
                {dirty[t.id]&&<div style={{position:"absolute",top:"-8px",right:"-8px"}}><Spin s={12}/></div>}
                {t.img_url&&<img src={t.img_url} alt="" style={{position:"absolute",bottom:"-24px",left:"50%",transform:"translateX(-50%)",width:"36px",height:"26px",borderRadius:"4px",objectFit:"cover",border:"1.5px solid #fff",boxShadow:"0 2px 6px rgba(0,0,0,.15)"}}/>}
              </div>
            </div>
          );
        })}
      </div>
      <div style={{fontSize:".68rem",color:"#94A3B8",marginTop:".5rem",textAlign:"center"}}>💡 Masaları sürükləyib mövqe dəyişin — avtomatik saxlanır</div>
    </div>
  );
}

// ════════════════════════════════════════════════════════════
// ANA APP
// ════════════════════════════════════════════════════════════
function App(){
  const [admin, setAdmin] = useState(()=>getSession());
  const [page,setPage]       = useState("dashboard");
  const [rows,setRows]       = useState([]);
  const [loading,setLoading] = useState(true);
  const [newIds,setNewIds]   = useState(new Set());
  const [notifs,setNotifs]   = useState([]);
  const [unread,setUnread]   = useState(0);
  const [bellRing,setBellRing]=useState(false);
  const [sel,setSel]         = useState(null);
  const [sidebar,setSidebar] = useState(true);
  const [updId,setUpdId]     = useState(null);
  const [fDate,setFDate]     = useState("");
  const [fStatus,setFStatus] = useState("hamısı");
  const [fRest,setFRest]     = useState("hamısı");
  const [search,setSearch]   = useState("");
  const [restaurants,setRests]=useState([]);
  const [allTables,setAllTbls]=useState([]);
  const [sub,      setSub]    = useState(null);
  const [subLoaded,setSubLoaded] = useState(false);
  const today=new Date().toISOString().split("T")[0];

  const loadRests=async()=>{
    const q = sb.from("restaurants").select("*").order("name");
    // Super admin hamısını görür, restoran admini yalnız özünkünü
    if(admin && !admin.is_super && admin.restaurant_id){
      q.eq("id", admin.restaurant_id);
    }
    const{data}=await q;
    setRests(data||[]);
  };
  const loadTbls =async()=>{const{data}=await sb.from("tables").select("*").order("label");setAllTbls(data||[]);};

  useEffect(()=>{
    // Ödəniş geri dönüşü yoxla
    const params = new URLSearchParams(window.location.search);
    if(params.get("paid")==="success"){
      window.history.replaceState({},"",window.location.pathname);
      // Bir az gözlə, webhook işlənsin
      setTimeout(async()=>{
        if(admin?.restaurant_id){
          const s = await loadSub(admin.restaurant_id);
          setSub(s); setSubLoaded(true);
        }
      }, 3000);
    }
    // Sub yüklə
    if(admin?.restaurant_id){
      loadSub(admin.restaurant_id).then(s=>{ setSub(s); setSubLoaded(true); });
    } else {
      setSubLoaded(true); // super admin - abunəlik lazım deyil
    }
    Promise.all([
      sb.from("reservations").select("*").order("created_at",{ascending:false}).then(({data})=>setRows(data||[])),
      loadRests(),loadTbls(),
    ]).then(()=>setLoading(false));
    const ch=sb.channel("realtime-admin")
      .on("postgres_changes",{event:"INSERT",schema:"public",table:"reservations"},({new:r})=>{
        setRows(p=>[r,...p]);setNewIds(p=>new Set([...p,r.id]));
        playSound();setNotifs(p=>[...p,{id:Date.now(),...r}]);
        setBellRing(true);setTimeout(()=>setBellRing(false),700);setUnread(p=>p+1);
      })
      .on("postgres_changes",{event:"UPDATE",schema:"public",table:"reservations"},({new:r})=>{
        setRows(p=>p.map(x=>x.id===r.id?r:x));setSel(p=>p?.id===r.id?r:p);
      })
      .subscribe();
    return()=>sb.removeChannel(ch);
  },[]);

  const removeNotif=useCallback(id=>setNotifs(p=>p.filter(n=>n.id!==id)),[]);
  const updStatus=async(id,s)=>{
    setUpdId(id);
    setRows(p=>p.map(r=>r.id===id?{...r,status:s}:r));
    setSel(p=>p?.id===id?{...p,status:s}:p);
    // Supabase-dən məlumatı al, sonra yenilə
    const{data:rd}=await sb.from("reservations").select("*").eq("id",id).single();
    await sb.from("reservations").update({status:s}).eq("id",id);
    setUpdId(null);
    // WhatsApp bildirişi
    if(rd?.phone){
      const msgs={
        "təsdiqləndi":[
          "Salam "+rd.name+"! ✅","",
          "*Rezervasiyanız təsdiqləndi!*","",
          "🏛️ "+rd.restaurant_name,
          "📅 "+rd.date+" · ⏰ "+rd.time,
          "🪑 Masa: "+rd.table_label+" · 👥 "+rd.guests+" nəfər","",
          "Sizi gözləyirik! 🍽️",
        ].join("\n"),
        "ləğv edildi":[
          "Salam "+rd.name+",","",
          "❌ *Rezervasiyanız ləğv edildi.*","",
          rd.restaurant_name+" · "+rd.date+" "+rd.time,"",
          "Məlumat üçün bizimlə əlaqə saxlayın.",
        ].join("\n"),
        "gəldi":[
          "Salam "+rd.name+"! 👋","",
          "✅ Gəlişiniz qeyd edildi. Xoş gəlmisiniz!",
          "🍽️ "+rd.restaurant_name+" — Masa "+rd.table_label,
        ].join("\n"),
      };
      if(msgs[s]) sendWA(rd.phone,msgs[s]);
    }
  };

  // ── WhatsApp Xatırlatma: vaxt gəlib QR oxudulmayıbsa mesaj göndər ──
  const sentReminders=useRef(new Set());
  useEffect(()=>{
    const check=()=>{
      const now=new Date();
      const todayStr=now.toISOString().split("T")[0];
      const nowMin=now.getHours()*60+now.getMinutes();
      rows.forEach(r=>{
        if(r.date!==todayStr) return;
        if(r.status==="gəldi"||r.status==="ləğv edildi") return;
        const[h,m]=(r.time||"00:00").split(":").map(Number);
        const rMin=h*60+m;
        // Rezervasiya vaxtı keçibsə və ya 0-5 dəqiqə içindədirsə
        if(nowMin>=rMin && nowMin<=rMin+5){
          const key=r.id+"-"+r.time;
          if(!sentReminders.current.has(key)){
            sentReminders.current.add(key);
            const msg=[
              "Salam "+r.name+"! ⏰","",
              "📍 *"+r.restaurant_name+"* restoranında",
              "bu gün saat *"+r.time+"*-a rezervasiyanız var.","",
              "🪑 Masa: "+r.table_label+" · 👥 "+r.guests+" nəfər","",
              "Gözlənilirsiniz! 🙂",
            ].join("\n");
            sendWA(r.phone,msg);
          }
        }
      });
    };
    check(); // ilk yoxlama
    const interval=setInterval(check,60000); // hər dəqiqə
    return()=>clearInterval(interval);
  },[rows]);

  const todayRows   =rows.filter(r=>r.date===today);
  const todayGuests =todayRows.filter(r=>r.status!=="ləğv edildi").reduce((s,r)=>s+r.guests,0);
  const todayRev    =todayRows.reduce((s,r)=>s+(r.pre_order_total||0),0);
  const waiting     =rows.filter(r=>r.status==="gözlənilir").length;
  const restNames   =restaurants.map(r=>r.name);

  // Login yoxdursa — Login səhifəsi göstər
  if(!admin) return <LoginPage onLogin={(a,s)=>{saveSession(a);setAdmin(a);if(s){setSub(s);setSubLoaded(true);}else{setSubLoaded(true);}}}/>;

  // ── ABUNƏLİK YOXLAMA ─────────────────────────────────────
  // Super admin üçün lazım deyil. Restoran admini üçün sub lazımdır.
  const needsSub = !admin.is_super && subLoaded && !subActive(sub);

  // Restoran admini üçün filtered rows
  const myRows = admin.is_super ? rows : rows.filter(r=>
    restaurants.some(rest=>rest.name===r.restaurant_name)
  );

  const filtered=useMemo(()=>myRows.filter(r=>{
    if(fDate&&r.date!==fDate)return false;
    if(fStatus!=="hamısı"&&r.status!==fStatus)return false;
    if(fRest!=="hamısı"&&r.restaurant_name!==fRest)return false;
    if(search&&!r.name?.toLowerCase().includes(search.toLowerCase())&&!r.phone?.includes(search))return false;
    return true;
  }),[myRows,fDate,fStatus,fRest,search]);

  const nav=[
    {id:"dashboard",icon:"📊",label:"Dashboard"},
    {id:"analytics",icon:"📈",label:"Analitika"},
    {id:"reservations",icon:"📋",label:"Rezervasiyalar"},
    {id:"tables",icon:"🪑",label:"Masalar"},
    {id:"reviews",icon:"⭐",label:"Rəylər"},
    {id:"qr",icon:"📱",label:"QR Kodlar"},
    {id:"scan",icon:"📷",label:"QR Oxut"},
    {id:"whatsapp",icon:"💬",label:"WhatsApp"},
    {id:"menu",icon:"🍽️",label:"Menü"},
    ...(admin.is_super ? [] : [{id:"abunəlik",icon:"💳",label:"Abunəlik"}]),
  ];

  // Abunəlik yoxdursa → ödəniş ekranı göstər
  if(needsSub){
    return <SubPayWall admin={admin} sub={sub} onRefresh={async()=>{
      const s = await loadSub(admin.restaurant_id);
      setSub(s); setSubLoaded(true);
    }} onLogout={()=>{clearSession();setAdmin(null);}}/>;
  }

  return(
    <div style={{display:"flex",minHeight:"100vh"}}>
      <div style={{position:"fixed",top:"1rem",right:"1rem",zIndex:9999,display:"flex",flexDirection:"column",alignItems:"flex-end",pointerEvents:"none"}}>
        {notifs.map(n=><div key={n.id} style={{pointerEvents:"auto"}}><NotifCard n={n} onDone={()=>removeNotif(n.id)}/></div>)}
      </div>
      <button onClick={()=>{setUnread(0);setFStatus("gözlənilir");setPage("reservations");}}
        style={{position:"fixed",bottom:"24px",right:"24px",zIndex:9000,width:"52px",height:"52px",borderRadius:"50%",background:"#0F172A",border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"1.4rem",boxShadow:"0 4px 20px rgba(0,0,0,.3)",animation:bellRing?"bellShake .65s ease":unread>0?"glowPulse 2s ease infinite":"none"}}>
        🔔
        {unread>0&&<span style={{position:"absolute",top:"-3px",right:"-3px",background:"#EF4444",color:"#fff",borderRadius:"50%",minWidth:"20px",height:"20px",fontSize:".6rem",fontWeight:800,display:"flex",alignItems:"center",justifyContent:"center",border:"2.5px solid #F1F5F9"}}>{unread>9?"9+":unread}</span>}
      </button>
      <aside style={{width:sidebar?"220px":"60px",background:"#0F172A",display:"flex",flexDirection:"column",flexShrink:0,transition:"width .25s",overflow:"hidden"}}>
        <div style={{padding:"1.2rem",borderBottom:"1px solid rgba(255,255,255,.06)",display:"flex",alignItems:"center",gap:".7rem",minHeight:"64px"}}>
          <div style={{width:"32px",height:"32px",borderRadius:"8px",background:"#3B82F6",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"1rem",flexShrink:0}}>🍽️</div>
          {sidebar&&<div><div style={{fontWeight:800,fontSize:".95rem",color:"#fff",whiteSpace:"nowrap"}}>MasaAz</div><div style={{fontSize:".58rem",color:"#475569",textTransform:"uppercase",letterSpacing:".1em",whiteSpace:"nowrap"}}>Admin Panel</div></div>}
        </div>
        <div style={{padding:".6rem .8rem",borderBottom:"1px solid rgba(255,255,255,.04)",display:"flex",alignItems:"center",gap:".5rem"}}>
          <div style={{width:"8px",height:"8px",borderRadius:"50%",background:"#22C55E",flexShrink:0,animation:"blink 2s ease-in-out infinite"}}/>
          {sidebar&&<span style={{fontSize:".68rem",color:"#22C55E",fontWeight:600}}>Real-time aktiv</span>}
        </div>
        <nav style={{padding:".8rem .5rem",flex:1}}>
          {nav.map(item=>(
            <div key={item.id} onClick={()=>setPage(item.id)}
              style={{display:"flex",alignItems:"center",gap:".7rem",padding:".65rem .7rem",borderRadius:"8px",marginBottom:".2rem",cursor:"pointer",background:page===item.id?"rgba(59,130,246,.2)":"transparent",borderLeft:page===item.id?"3px solid #3B82F6":"3px solid transparent",position:"relative"}}>
              <span style={{fontSize:"1.1rem",flexShrink:0}}>{item.icon}</span>
              {sidebar&&<span style={{fontSize:".85rem",fontWeight:page===item.id?700:500,color:page===item.id?"#60A5FA":"#94A3B8",whiteSpace:"nowrap"}}>{item.label}</span>}
              {item.id==="reservations"&&waiting>0&&<span style={{position:"absolute",right:"8px",top:"50%",transform:"translateY(-50%)",background:"#EF4444",color:"#fff",borderRadius:"20px",fontSize:".6rem",fontWeight:700,padding:".1rem .4rem"}}>{waiting}</span>}
            </div>
          ))}
        </nav>
        <div onClick={()=>setSidebar(p=>!p)} style={{padding:"1rem",borderTop:"1px solid rgba(255,255,255,.06)",display:"flex",justifyContent:sidebar?"flex-end":"center",cursor:"pointer"}}>
          <span style={{color:"#475569"}}>{sidebar?"◀":"▶"}</span>
        </div>
      </aside>
      <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
        <header style={{background:"#fff",borderBottom:"1px solid #E2E8F0",height:"64px",display:"flex",alignItems:"center",justifyContent:"space-between",padding:"0 1.5rem",flexShrink:0}}>
          <div style={{fontWeight:700,fontSize:"1rem"}}>{{dashboard:"Dashboard",analytics:"Analitika",reservations:"Rezervasiyalar",tables:"Masalar",reviews:"⭐ Rəylər",qr:"📱 QR Kodlar",scan:"📷 QR Oxut",whatsapp:"💬 WhatsApp Ayarları",menu:"🍽️ Menü","abunəlik":"💳 Abunəlik"}[page]}</div>
          <div style={{display:"flex",alignItems:"center",gap:"1rem"}}>
            {waiting>0&&<div onClick={()=>{setFStatus("gözlənilir");setPage("reservations");}} style={{background:"#FEF9C3",border:"1px solid #FDE047",borderRadius:"20px",padding:".35rem .9rem",fontSize:".78rem",fontWeight:700,color:"#92400E",cursor:"pointer"}}>⚠️ {waiting} cavab verilməyən</div>}
            <div style={{display:"flex",alignItems:"center",gap:".6rem",background:"#F8FAFC",borderRadius:"10px",padding:".3rem .8rem .3rem .5rem",border:"1px solid #E2E8F0"}}>
              <div style={{width:"28px",height:"28px",borderRadius:"50%",background:"linear-gradient(135deg,#3B82F6,#8B5CF6)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:".75rem",color:"#fff",fontWeight:700,flexShrink:0}}>
                {admin.display_name?admin.display_name[0].toUpperCase():"A"}
              </div>
              <div>
                <div style={{fontSize:".75rem",fontWeight:700,color:"#0F172A",lineHeight:1}}>{admin.display_name||admin.username}</div>
                <div style={{fontSize:".6rem",color:"#94A3B8"}}>{admin.is_super?"Super Admin":"Restoran Admin"}</div>
              </div>
              <button onClick={()=>{clearSession();setAdmin(null);}} title="Çıxış"
                style={{background:"none",border:"none",cursor:"pointer",fontSize:"1rem",color:"#94A3B8",marginLeft:".2rem",padding:"2px",borderRadius:"4px",lineHeight:1}}>⏏️</button>
            </div>
            <div style={{fontSize:".75rem",color:"#94A3B8"}}>{new Date().toLocaleDateString("az-AZ",{weekday:"long",day:"numeric",month:"long"})}</div>
          </div>
        </header>
        <main style={{flex:1,overflow:"auto",padding:"1.5rem"}}>
          {loading&&<div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"60vh",flexDirection:"column",gap:"1rem"}}><Spin s={36}/><div style={{color:"#94A3B8",fontSize:".85rem"}}>Yüklənir...</div></div>}
          {!loading&&page==="dashboard"&&<DashPage todayRows={todayRows} todayGuests={todayGuests} todayRev={todayRev} waiting={waiting} rows={myRows} newIds={newIds} setSel={setSel} setPage={setPage} restaurants={restaurants} allTables={allTables} isSuper={admin.is_super}/>}
          {!loading&&page==="analytics"&&<AnalyticsPage rows={myRows} restaurants={restaurants} allTables={allTables} isSuper={admin.is_super}/>}
          {!loading&&page==="reservations"&&<ResPage filtered={filtered} sel={sel} setSel={setSel} newIds={newIds} updId={updId} updStatus={updStatus} fDate={fDate} setFDate={setFDate} fStatus={fStatus} setFStatus={setFStatus} fRest={fRest} setFRest={setFRest} search={search} setSearch={setSearch} restNames={restNames} isSuper={admin.is_super}/>}
          {!loading&&page==="tables"&&<TblsPage restaurants={restaurants} allTables={allTables} todayRows={todayRows} updStatus={updStatus} updId={updId} reloadTbls={loadTbls} isSuper={admin.is_super}/>}
          {!loading&&page==="reviews"&&<ReviewsPage restaurants={restaurants} isSuper={admin.is_super}/>}
          {!loading&&page==="qr"&&<QRPage restaurants={restaurants} allTables={allTables} isSuper={admin.is_super}/>}
          {page==="scan"&&<QRScanPage sb={sb}/>}
          {page==="whatsapp"&&<WASettingsPage sb={sb}/>}
          {page==="menu"&&<MenuPage admin={admin}/>}
          {page==="abunəlik"&&!admin.is_super&&<SubPage admin={admin} sub={sub} onRefresh={async()=>{const s=await loadSub(admin.restaurant_id);setSub(s);setSubLoaded(true);}}/>}

        </main>
      </div>
    </div>
  );
}

// ════════════════════════════════════════════════════════════
// DASHBOARD
// ════════════════════════════════════════════════════════════
function DashPage({todayRows,todayGuests,todayRev,waiting,rows,newIds,setSel,setPage,restaurants,allTables,isSuper}){
  const today=new Date().toISOString().split("T")[0];
  const [selRest,setSelRest]=useState(()=>restaurants.length===1?restaurants[0].name:restaurants.length>0?restaurants[0].name:"");
  // restaurants gec yüklənəndə default seç
  useEffect(()=>{if(!isSuper&&restaurants.length===1&&selRest==="hamısı")setSelRest(restaurants[0].name);},[restaurants]);
  const tbls=useMemo(()=>{
    if(!selRest)return[];
    const rid=restaurants.find(r=>r.name===selRest)?.id;
    return allTables.filter(t=>t.restaurant_id===rid).map(t=>{
      const bk=todayRows.filter(r=>r.restaurant_name===selRest&&r.table_label===t.label&&r.status!=="ləğv edildi");
      return{...t,busy:bk.length>0,booking:bk[0]};
    });
  },[selRest,restaurants,allTables,todayRows]);
  return(
    <div>
      <div style={{marginBottom:"1.5rem"}}>
        <div style={{fontSize:"1.4rem",fontWeight:800,letterSpacing:"-.02em",marginBottom:".2rem"}}>Dashboard</div>
        <div style={{fontSize:".8rem",color:"#94A3B8"}}>Canlı məlumatlar · real-time</div>
      </div>
      <div style={{display:"flex",gap:"1rem",flexWrap:"wrap",marginBottom:"1.5rem"}}>
        {[{icon:"📅",l:"Bu gün rezerv",v:todayRows.length,s:`${waiting} gözləyir`},{icon:"👥",l:"Bu gün qonaq",v:todayGuests,s:"nəfər",c:"#2563EB"},{icon:"⏳",l:"Cavab gözləyən",v:waiting,s:"tezliklə cavabla",c:"#CA8A04"},{icon:"💰",l:"Ön sifarişlər",v:`${todayRev}₼`,s:"bu gün",c:"#16A34A"},{icon:"📊",l:"Cəmi rezerv",v:rows.length,s:"bütün vaxtlar",c:"#7C3AED"}].map(s=>(
          <div key={s.l} style={{background:"#fff",borderRadius:"12px",padding:"1.2rem 1.4rem",border:"1px solid #E2E8F0",flex:1,minWidth:"130px"}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:".8rem"}}><div style={{fontSize:".68rem",fontWeight:600,letterSpacing:".08em",textTransform:"uppercase",color:"#94A3B8"}}>{s.l}</div><div style={{fontSize:"1.3rem"}}>{s.icon}</div></div>
            <div style={{fontSize:"2rem",fontWeight:800,letterSpacing:"-.03em",color:s.c||"#0F172A",marginBottom:".2rem"}}>{s.v}</div>
            <div style={{fontSize:".72rem",color:"#94A3B8"}}>{s.s}</div>
          </div>
        ))}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"1.5rem"}}>
        <div style={{background:"#fff",borderRadius:"14px",border:"1px solid #E2E8F0",overflow:"hidden"}}>
          <div style={{padding:"1rem 1.2rem",borderBottom:"1px solid #F1F5F9",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div style={{fontWeight:700,fontSize:".9rem"}}>Bu günün rezervasiyaları</div>
            <span style={{fontSize:".7rem",background:"#EFF6FF",color:"#2563EB",padding:".2rem .6rem",borderRadius:"20px",fontWeight:600}}>{todayRows.length}</span>
          </div>
          <div style={{maxHeight:"360px",overflowY:"auto"}}>
            {todayRows.length===0?<div style={{padding:"2rem",textAlign:"center",color:"#94A3B8",fontSize:".85rem"}}>Bu gün üçün rezervasiya yoxdur</div>
              :todayRows.map(r=>(
                <div key={r.id} onClick={()=>{setSel(r);setPage("reservations");}}
                  style={{padding:".85rem 1.2rem",borderBottom:"1px solid #F8FAFC",display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer"}}>
                  <div><div style={{fontWeight:600,fontSize:".88rem",marginBottom:".15rem"}}>{r.name}</div><div style={{fontSize:".72rem",color:"#64748B"}}>⏰ {r.time} · {r.restaurant_name} · Masa {r.table_label} · {r.guests} nf</div></div>
                  <Badge status={r.status}/>
                </div>
              ))
            }
          </div>
        </div>
        <div style={{background:"#fff",borderRadius:"14px",border:"1px solid #E2E8F0",overflow:"hidden"}}>
          <div style={{padding:"1rem 1.2rem",borderBottom:"1px solid #F1F5F9",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div style={{fontWeight:700,fontSize:".9rem"}}>Masa vəziyyəti</div>
            {isSuper
              ?<select value={selRest} onChange={e=>setSelRest(e.target.value)} style={{border:"1px solid #E2E8F0",borderRadius:"6px",padding:".2rem .5rem",fontSize:".72rem",outline:"none",background:"#fff"}}>
                <option value="">Restoran seç...</option>
                {restaurants.map(r=><option key={r.id} value={r.name}>{r.name}</option>)}
              </select>
              :<span style={{fontSize:".72rem",background:"#EFF6FF",color:"#2563EB",padding:".2rem .6rem",borderRadius:"20px",fontWeight:600}}>{restaurants[0]?.name||""}</span>
            }
          </div>
          <div style={{padding:"1rem",display:"grid",gridTemplateColumns:"1fr 1fr",gap:".6rem",maxHeight:"320px",overflowY:"auto"}}>
            {selRest==="hamısı"?<div style={{gridColumn:"1/-1",textAlign:"center",color:"#94A3B8",fontSize:".8rem",padding:"1rem"}}>Restoran seçin</div>
              :tbls.length===0?<div style={{gridColumn:"1/-1",textAlign:"center",color:"#94A3B8",fontSize:".8rem",padding:"1rem"}}>Masa tapılmadı</div>
              :tbls.map(t=>(
                <div key={t.id} style={{padding:".7rem .9rem",borderRadius:"10px",background:t.busy?"#FEF2F2":"#F0FDF4",border:`1px solid ${t.busy?"#FECACA":"#86EFAC"}`}}>
                  <div style={{display:"flex",justifyContent:"space-between"}}><span style={{fontWeight:700,fontSize:".88rem",color:t.busy?"#DC2626":"#16A34A"}}>Masa {t.label}</span><span style={{fontSize:".65rem",color:t.busy?"#DC2626":"#16A34A",fontWeight:600}}>{t.busy?"Dolu":"Boş"}</span></div>
                  <div style={{fontSize:".68rem",color:"#64748B"}}>{t.zone} · {t.seats} nf</div>
                  {t.busy&&t.booking&&<div style={{fontSize:".65rem",color:"#EF4444",marginTop:".2rem"}}>{t.booking.time} — {t.booking.name}</div>}
                </div>
              ))
            }
          </div>
        </div>
      </div>
    </div>
  );
}

// RƏZERVASİYALAR + 📞 TELEFON İLƏ LƏĞV
// ════════════════════════════════════════════════════════════
function ResPage({filtered,sel,setSel,newIds,updId,updStatus,fDate,setFDate,fStatus,setFStatus,fRest,setFRest,search,setSearch,restNames,isSuper}){
  const [phoneOpen,setPhoneOpen]=useState(false);
  const [phoneInput,setPhoneInput]=useState("");
  const [phoneResults,setPhoneResults]=useState(null);
  const [phoneCancelling,setPhoneCancelling]=useState(null);

  const searchByPhone=async()=>{
    if(!phoneInput.trim())return;
    const{data}=await sb.from("reservations").select("*").ilike("phone",`%${phoneInput.trim()}%`).order("date",{ascending:false});
    setPhoneResults(data||[]);
  };
  const cancelByPhone=async(id)=>{
    setPhoneCancelling(id);
    await sb.from("reservations").update({status:"ləğv edildi"}).eq("id",id);
    setPhoneCancelling(null);
    searchByPhone();
  };

  return(
    <div style={{display:"flex",flexDirection:"column",gap:"1rem",height:"calc(100vh - 130px)"}}>

      {/* ── TELEFON PANELİ ── */}
      <div style={{background:"#fff",borderRadius:"14px",border:"1px solid #E2E8F0",flexShrink:0}}>
        <div onClick={()=>setPhoneOpen(p=>!p)} style={{padding:".9rem 1.2rem",display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer",borderRadius:phoneOpen?"14px 14px 0 0":"14px",background:phoneOpen?"#FEF2F2":"#fff"}}>
          <div style={{display:"flex",alignItems:"center",gap:".6rem"}}>
            <span style={{fontSize:"1.1rem"}}>📞</span>
            <span style={{fontWeight:700,fontSize:".9rem",color:phoneOpen?"#DC2626":"#0F172A"}}>Müştəri nömrəsi ilə rezerv tap / ləğv et</span>
          </div>
          <span style={{color:"#94A3B8",fontSize:".8rem"}}>{phoneOpen?"▲":"▼"}</span>
        </div>
        {phoneOpen&&(
          <div style={{padding:"1rem 1.2rem",borderTop:"1px solid #FEE2E2",background:"#FFF5F5",borderRadius:"0 0 14px 14px"}}>
            <div style={{display:"flex",gap:".6rem",marginBottom:"1rem"}}>
              <input placeholder="+994 50 000 00 00" value={phoneInput} onChange={e=>setPhoneInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&searchByPhone()}
                style={{flex:1,border:"1px solid #FECACA",borderRadius:"8px",padding:".55rem .9rem",fontSize:".9rem",outline:"none",fontFamily:"inherit",background:"#fff"}}/>
              <button className="btn" onClick={searchByPhone} style={{background:"#DC2626",color:"#fff",border:"none",borderRadius:"8px",padding:".55rem 1.2rem",fontSize:".85rem",fontWeight:700,cursor:"pointer",whiteSpace:"nowrap"}}>🔍 Axtar</button>
            </div>
            {phoneResults===null&&<div style={{fontSize:".8rem",color:"#94A3B8"}}>Nömrəni yazıb Enter basın və ya "Axtar" klikləyin</div>}
            {phoneResults!==null&&phoneResults.length===0&&<div style={{fontSize:".85rem",color:"#DC2626",fontWeight:600}}>Bu nömrə ilə rezervasiya tapılmadı</div>}
            {phoneResults!==null&&phoneResults.length>0&&(
              <div style={{display:"flex",flexDirection:"column",gap:".5rem",maxHeight:"200px",overflowY:"auto"}}>
                {phoneResults.map(r=>(
                  <div key={r.id} style={{background:"#fff",border:`1px solid ${r.status==="ləğv edildi"?"#E2E8F0":"#FECACA"}`,borderRadius:"10px",padding:".75rem 1rem",display:"flex",justifyContent:"space-between",alignItems:"center",gap:"1rem"}}>
                    <div>
                      <div style={{fontWeight:700,fontSize:".88rem"}}>{r.name} <span style={{color:"#94A3B8",fontWeight:400,fontSize:".8rem"}}>· {r.phone}</span></div>
                      <div style={{fontSize:".75rem",color:"#64748B",marginTop:".2rem"}}>📅 {r.date} · ⏰ {r.time} · {r.restaurant_name} · Masa {r.table_label} · {r.guests} nf</div>
                    </div>
                    <div style={{display:"flex",alignItems:"center",gap:".5rem",flexShrink:0}}>
                      <Badge status={r.status}/>
                      {r.status!=="ləğv edildi"&&(
                        <button className="btn" onClick={()=>cancelByPhone(r.id)} disabled={phoneCancelling===r.id}

                      )}
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>
        )}
      </div>

                    <th key={h} style={{padding:".7rem .8rem",textAlign:"left",fontWeight:600,fontSize:".68rem",letterSpacing:".05em",textTransform:"uppercase",color:"#94A3B8",borderBottom:"1px solid #E2E8F0",whiteSpace:"nowrap"}}>{h}</th>

                </tr>
              </thead>
              <tbody>
                {filtered.map(r=>(
                  <tr key={r.id} className={newIds.has(r.id)?"new-row":""} onClick={()=>setSel(r)}
                    style={{borderBottom:"1px solid #F8FAFC",cursor:"pointer",background:sel?.id===r.id?"#EFF6FF":""}}>
                    <td style={{padding:".75rem .8rem"}}><div style={{fontWeight:600,fontSize:".85rem"}}>{r.name}</div><div style={{fontSize:".68rem",color:"#94A3B8"}}>{r.phone}</div></td>
                    <td style={{padding:".75rem .8rem",fontSize:".75rem",color:"#64748B"}}>{r.restaurant_name}</td>
                    <td style={{padding:".75rem .8rem",color:"#64748B"}}><div style={{fontWeight:500}}>{r.date}</div><div style={{fontSize:".72rem"}}>{r.time}</div></td>
                    <td style={{padding:".75rem .8rem"}}><span style={{background:"#F1F5F9",padding:".18rem .5rem",borderRadius:"6px",fontWeight:600,fontSize:".75rem"}}>{r.table_label}</span></td>
                    <td style={{padding:".75rem .8rem",color:"#64748B",textAlign:"center"}}>{r.guests}</td>
                    <td style={{padding:".75rem .8rem"}}><div style={{display:"flex",alignItems:"center",gap:".4rem"}}><Badge status={r.status}/>{updId===r.id&&<Spin/>}</div></td>
                    <td style={{padding:".75rem .8rem",color:r.pre_order_total?"#16A34A":"#CBD5E1",fontWeight:r.pre_order_total?700:400}}>{r.pre_order_total?`${r.pre_order_total}₼`:"—"}</td>
                  </tr>
                ))}
              </tbody>
            </table>
            {filtered.length===0&&<div style={{padding:"3rem",textAlign:"center",color:"#94A3B8"}}><div style={{fontSize:"2rem",marginBottom:".5rem"}}>🔍</div><div style={{fontWeight:600}}>Nəticə tapılmadı</div></div>}
          </div>
        </div>
        {sel&&(
          <div style={{width:"300px",background:"#fff",borderRadius:"14px",border:"1px solid #E2E8F0",flexShrink:0,overflow:"hidden",display:"flex",flexDirection:"column"}}>
            <div style={{padding:"1rem 1.2rem",borderBottom:"1px solid #F1F5F9",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div style={{fontWeight:700,fontSize:".9rem"}}>Detallar</div>
              <button onClick={()=>setSel(null)} style={{background:"none",border:"none",cursor:"pointer",fontSize:"1.1rem",color:"#94A3B8"}}>✕</button>
            </div>
            <div style={{padding:"1.2rem",flex:1,overflowY:"auto"}}>
              <div style={{fontWeight:800,fontSize:"1.1rem",marginBottom:".15rem"}}>{sel.name}</div>
              <div style={{fontSize:".72rem",color:"#64748B",marginBottom:".15rem"}}>{sel.phone}</div>
              <div style={{fontSize:".72rem",color:"#94A3B8",marginBottom:".5rem"}}>{sel.restaurant_name}</div>
              <div style={{display:"flex",alignItems:"center",gap:".5rem",marginBottom:"1rem"}}><Badge status={sel.status}/>{updId===sel.id&&<Spin/>}</div>
              {[["📅 Tarix",sel.date],["⏰ Saat",sel.time],["🪑 Masa",`Masa ${sel.table_label}`],["👥 Qonaq",`${sel.guests} nəfər`],["💰 Ön sifariş",sel.pre_order_total?`${sel.pre_order_total}₼`:"Yoxdur"]].map(([k,v])=>(
                <div key={k} style={{padding:".65rem 0",borderBottom:"1px solid #F8FAFC",display:"flex",justifyContent:"space-between"}}>
                  <span style={{fontSize:".75rem",color:"#94A3B8"}}>{k}</span><span style={{fontSize:".8rem",fontWeight:600}}>{v}</span>
                </div>
              ))}
              {sel.pre_order_items?.length>0&&(
                <div style={{marginTop:".8rem",background:"#F8FAFC",borderRadius:"8px",padding:".75rem"}}>
                  <div style={{fontSize:".62rem",fontWeight:700,color:"#94A3B8",textTransform:"uppercase",letterSpacing:".08em",marginBottom:".5rem"}}>Ön sifarişlər</div>
                  {sel.pre_order_items.map((item,i)=>(
                    <div key={i} style={{display:"flex",justifyContent:"space-between",fontSize:".78rem",marginBottom:".2rem"}}>
                      <span>{item.name} x{item.qty}</span><span style={{fontWeight:600}}>{item.price*item.qty}₼</span>
                    </div>
                  ))}
                </div>
              )}
              <div style={{marginTop:"1.2rem"}}>
                <div style={{fontSize:".65rem",fontWeight:700,color:"#94A3B8",textTransform:"uppercase",letterSpacing:".08em",marginBottom:".6rem"}}>Status dəyiş</div>
                <div style={{display:"flex",flexDirection:"column",gap:".4rem"}}>
                  {["gözlənilir","təsdiqləndi","gəldi","ləğv edildi"].map(s=>{
                    const c=SC[s];const active=sel.status===s;
                    return(
                      <button key={s} className="btn" disabled={updId===sel.id} onClick={()=>!active&&updStatus(sel.id,s)}
                        style={{padding:".55rem .8rem",borderRadius:"8px",border:`1px solid ${active?c.border:"#E2E8F0"}`,background:active?c.bg:"#fff",color:active?c.text:"#64748B",fontFamily:"inherit",fontSize:".78rem",fontWeight:active?700:500,textAlign:"left",cursor:active?"default":"pointer"}}>
                        {active?"✓ ":""}{s}
                      </button>
                    );
                  })}
                </div>
              </div>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// MASALAR — Kanvas + Kart siyahısı
// ════════════════════════════════════════════════════════════
function TblsPage({restaurants,allTables,todayRows,updStatus,updId,reloadTbls,isSuper}){
  const [selRest,setSelRest]=useState(()=>restaurants.length===1?restaurants[0].name:restaurants.length>0?restaurants[0].name:"");
  const restTbls=useMemo(()=>{
    if(!selRest)return[];
    const rid=restaurants.find(r=>r.name===selRest)?.id;
    return allTables.filter(t=>t.restaurant_id===rid);
  },[selRest,restaurants,allTables]);
  const tblStatus=restTbls.map(t=>{
    const bk=todayRows.filter(r=>r.restaurant_name===selRest&&r.table_label===t.label&&r.status!=="ləğv edildi");
    return{...t,bookings:bk,busy:bk.length>0};
  });
  return(
    <div>
      <div style={{marginBottom:"1.5rem",display:"flex",justifyContent:"space-between",alignItems:"flex-end"}}>
        <div><div style={{fontSize:"1.4rem",fontWeight:800,letterSpacing:"-.02em",marginBottom:".2rem"}}>Masalar</div><div style={{fontSize:".8rem",color:"#94A3B8"}}>Masa planı + bugünkü vəziyyət</div></div>
        {isSuper&&<select value={selRest} onChange={e=>setSelRest(e.target.value)} style={{border:"1px solid #E2E8F0",borderRadius:"8px",padding:".5rem .8rem",fontSize:".82rem",outline:"none",background:"#fff"}}>
          <option value="">Restoran seç...</option>
          {restaurants.map(r=><option key={r.id} value={r.name}>{r.name}</option>)}
        </select>}
        {!isSuper&&restaurants.length===1&&<div style={{background:"#EFF6FF",color:"#2563EB",border:"1px solid #BFDBFE",borderRadius:"8px",padding:".5rem 1rem",fontSize:".82rem",fontWeight:600}}>{restaurants[0].name}</div>}
      </div>
      {!selRest
        ?<div style={{background:"#fff",borderRadius:"14px",border:"1px solid #E2E8F0",padding:"3rem",textAlign:"center",color:"#94A3B8"}}>Yuxarıdan restoran seçin</div>
        :<div>
          <div style={{background:"#fff",borderRadius:"14px",border:"1px solid #E2E8F0",padding:"1.2rem",marginBottom:"1.5rem"}}>
            <div style={{fontWeight:700,fontSize:".9rem",marginBottom:"1rem"}}>Restoran planı — masaları sürükləyib mövqe dəyişin</div>
            <TableCanvas tables={restTbls} onPositionSave={reloadTbls}/>
          </div>
          {tblStatus.length===0
            ?<div style={{background:"#fff",borderRadius:"14px",border:"1px solid #E2E8F0",padding:"3rem",textAlign:"center",color:"#94A3B8"}}>Bu restoran üçün masa tapılmadı. "İdarəetmə" bölməsindən əlavə edin.</div>
            :<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(240px,1fr))",gap:"1rem"}}>
              {tblStatus.map(t=>(
                <div key={t.id} style={{background:"#fff",borderRadius:"14px",border:`2px solid ${t.busy?"#FECACA":"#86EFAC"}`,overflow:"hidden"}}>
                  {t.img_url&&<img src={t.img_url} alt={t.label} style={{width:"100%",height:"120px",objectFit:"cover"}}/>}
                  <div style={{padding:"1rem 1.2rem",background:t.busy?"#FEF2F2":"#F0FDF4",borderBottom:`1px solid ${t.busy?"#FECACA":"#86EFAC"}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <div><div style={{fontWeight:800,fontSize:"1.1rem",color:t.busy?"#DC2626":"#16A34A"}}>Masa {t.label}</div><div style={{fontSize:".72rem",color:"#64748B"}}>{t.zone} · {t.seats} nəfərlik</div></div>
                    <div style={{fontSize:"1.6rem"}}>{t.busy?"🔴":"🟢"}</div>
                  </div>
                  <div style={{padding:"1rem 1.2rem"}}>
                    {t.bookings.length===0
                      ?<div style={{color:"#94A3B8",fontSize:".8rem",textAlign:"center",padding:".5rem 0"}}>Bu gün boşdur</div>
                      :t.bookings.map(r=>(
                        <div key={r.id} style={{marginBottom:".6rem",padding:".65rem",background:"#F8FAFC",borderRadius:"8px",border:"1px solid #E2E8F0"}}>
                          <div style={{display:"flex",justifyContent:"space-between",marginBottom:".2rem"}}><span style={{fontWeight:600,fontSize:".82rem"}}>{r.name}</span><span style={{fontSize:".72rem",color:"#64748B"}}>⏰ {r.time}</span></div>
                          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:".35rem"}}><span style={{fontSize:".72rem",color:"#64748B"}}>{r.guests} nəfər</span><Badge status={r.status}/></div>
                          {r.status==="gözlənilir"&&<div style={{display:"flex",gap:".4rem"}}><button className="btn" onClick={()=>updStatus(r.id,"təsdiqləndi")} disabled={updId===r.id} style={{flex:1,padding:".3rem",background:"#DCFCE7",border:"1px solid #86EFAC",color:"#16A34A",borderRadius:"6px",fontSize:".68rem",fontWeight:600,cursor:"pointer"}}>Təsdiqlə</button><button className="btn" onClick={()=>updStatus(r.id,"ləğv edildi")} disabled={updId===r.id} style={{flex:1,padding:".3rem",background:"#FEE2E2",border:"1px solid #FCA5A5",color:"#DC2626",borderRadius:"6px",fontSize:".68rem",fontWeight:600,cursor:"pointer"}}>Ləğv et</button></div>}
                          {r.status==="təsdiqləndi"&&<button className="btn" onClick={()=>updStatus(r.id,"gəldi")} disabled={updId===r.id} style={{width:"100%",padding:".3rem",background:"#DBEAFE",border:"1px solid #93C5FD",color:"#2563EB",borderRadius:"6px",fontSize:".68rem",fontWeight:600,cursor:"pointer"}}>Gəldi ✓</button>}
                        </div>
                      ))
                    }
                  </div>
                </div>
              ))}
            </div>
          }
        </div>
      }
    </div>
  );
}

// İDARƏETMƏ — Restoran + Masa + Menyu
// ════════════════════════════════════════════════════════════
function ManagePage({restaurants,allTables,reload,isSuper,admin}){
  // Restoran admini yalnız öz restoranını görür
  const myRestaurants = isSuper ? restaurants : restaurants.filter(r=>r.id===admin?.restaurant_id);
  const myTables = isSuper ? allTables : allTables.filter(t=>t.restaurant_id===admin?.restaurant_id);
  // Non-super üçün "tables" tabından başla, öz restoranı avtomatik seçili olsun
  const defaultTab = isSuper ? "restaurants" : "tables";
  const [tab,setTab]=useState(defaultTab);
  const [saving,setSaving]=useState(false);
  const [msg,setMsg]=useState(null);
  const showMsg=(text,ok=true)=>{setMsg({text,ok});setTimeout(()=>setMsg(null),3500);};

  // Restoran
  const [editR,setEditR]=useState(null);
  const [rName,setRName]=useState("");const [rCuisine,setRC]=useState("");const [rLoc,setRL]=useState("");
  const [rEmoji,setRE]=useState("🍽️");const [rAccent,setRA]=useState("#E63946");const [rTags,setRT]=useState("");
  const [rRating,setRRat]=useState("4.5");const [rPrice,setRP]=useState("₼₼");const [rAvail,setRAvl]=useState(true);
  const fillR=r=>{setEditR(r);setRName(r.name);setRC(r.cuisine||"");setRL(r.location||"");setRE(r.emoji||"🍽️");setRA(r.accent||"#E63946");setRT((r.tags||[]).join(", "));setRRat(String(r.rating||4.5));setRP(r.price_range||"₼₼");setRAvl(r.available!==false);};

              <div><label style={lbl}>Qiymət (₼) *</label><input style={inp} type="number" min="0" step="0.5" value={mPrice} onChange={e=>setMP(e.target.value)} placeholder="18"/></div>
              <div><label style={lbl}>Kateqoriya</label><input style={inp} value={mCat} onChange={e=>setMC(e.target.value)} placeholder="Şorba"/></div>
              <div><label style={lbl}>Emoji</label><input style={inp} value={mEmoji} onChange={e=>setME(e.target.value)} placeholder="🍲"/></div>
            </div>
            <button className="btn" onClick={addMenuItem} disabled={menuSaving||!menuRest} style={{background:"#0F172A",color:"#fff",border:"none",borderRadius:"8px",padding:".65rem 1.2rem",fontSize:".85rem",fontWeight:700,cursor:"pointer",width:"100%"}}>
              {menuSaving?"...":"+ Menyu əlavə et"}
            </button>
          </div>
          <div style={{background:"#fff",borderRadius:"14px",border:"1px solid #E2E8F0",overflow:"hidden"}}>
            <div style={{padding:"1rem 1.2rem",borderBottom:"1px solid #F1F5F9",fontWeight:700,fontSize:".95rem"}}>
              {menuRest?`${myRestaurants.find(r=>String(r.id)===menuRest)?.name||""} menyusu`:"Restoran seçin"}
              <span style={{marginLeft:".5rem",fontSize:".7rem",color:"#94A3B8",fontWeight:400}}>({menuItems.length} maddə)</span>
            </div>
            <div style={{maxHeight:"500px",overflowY:"auto"}}>
              {menuItems.length===0
                ?<div style={{padding:"2rem",textAlign:"center",color:"#94A3B8",fontSize:".85rem"}}>{menuRest?"Menyu boşdur":"Restoran seçin"}</div>
                :[...new Set(menuItems.map(i=>i.cat))].map(cat=>(
                  <div key={cat}>
                    <div style={{padding:".5rem 1.2rem",background:"#F8FAFC",fontSize:".65rem",fontWeight:700,letterSpacing:".08em",textTransform:"uppercase",color:"#94A3B8"}}>{cat}</div>
                    {menuItems.filter(i=>i.cat===cat).map(item=>(
                      <div key={item.id} style={{padding:".75rem 1.2rem",borderBottom:"1px solid #F8FAFC",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                        <div style={{display:"flex",alignItems:"center",gap:".7rem"}}>
                          <span style={{fontSize:"1.3rem"}}>{item.emoji||"🍽️"}</span>
                          <div><div style={{fontWeight:600,fontSize:".85rem"}}>{item.name}</div><div style={{fontSize:".7rem",color:"#94A3B8"}}>{item.desc} · {item.price}₼</div></div>
                        </div>
                        <button className="btn" onClick={()=>delMenuItem(item)} style={{background:"#FEF2F2",color:"#DC2626",border:"1px solid #FECACA",borderRadius:"6px",padding:".3rem .6rem",fontSize:".72rem",fontWeight:600,cursor:"pointer"}}>Sil</button>
                      </div>
                    ))}
                  </div>
                ))
              }
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// 📈 ANALİTİKA SƏHİFƏSİ
// ════════════════════════════════════════════════════════════
function AnalyticsPage({rows, restaurants, allTables, isSuper}){
  const [period, setPeriod] = useState("7");
  const [selRest, setSelRest] = useState(()=>restaurants.length===1?restaurants[0].name:"hamısı");
  useEffect(()=>{if(!isSuper&&restaurants.length===1&&selRest==="hamısı")setSelRest(restaurants[0].name);},[restaurants]);

  const now = new Date();
  const days = parseInt(period);

  const inRange = (dateStr) => {
    const d = new Date(dateStr);
    const diff = (now - d) / (1000*60*60*24);
    return diff <= days;
  };

  const filtRows = rows.filter(r => {
    if(!inRange(r.date)) return false;
    if(selRest!=="hamısı" && r.restaurant_name!==selRest) return false;
    return r.status !== "ləğv edildi";
  });

  // Günlük rezervasiya sayı
  const dailyMap = {};
  for(let i=days-1; i>=0; i--){
    const d = new Date(now);
    d.setDate(d.getDate()-i);
    const key = d.toISOString().split("T")[0];
    dailyMap[key] = 0;
  }
  filtRows.forEach(r => { if(dailyMap[r.date]!==undefined) dailyMap[r.date]++; });
  const dailyData = Object.entries(dailyMap);
  const maxDay = Math.max(...Object.values(dailyMap), 1);

  // Saat analizi
  const hourMap = {};
  filtRows.forEach(r => { hourMap[r.time] = (hourMap[r.time]||0)+1; });
  const hourData = Object.entries(hourMap).sort((a,b)=>a[0].localeCompare(b[0]));
  const maxHour = Math.max(...Object.values(hourMap), 1);

  // Restoran payı
  const restMap = {};
  filtRows.forEach(r => { restMap[r.restaurant_name||"Digər"] = (restMap[r.restaurant_name||"Digər"]||0)+1; });
  const restData = Object.entries(restMap).sort((a,b)=>b[1]-a[1]);
  const totalRest = restData.reduce((s,[,v])=>s+v,0)||1;

  // Masa populyarlığı
  const tableMap = {};
  filtRows.forEach(r => { tableMap[r.table_label||"?"] = (tableMap[r.table_label||"?"]||0)+1; });
  const tableData = Object.entries(tableMap).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const maxTable = Math.max(...Object.values(tableMap),1);

  // Sadiq müştərilər
  const custMap = {};
  rows.filter(r=>r.status!=="ləğv edildi").forEach(r => {
    if(!r.phone) return;
    if(!custMap[r.phone]) custMap[r.phone] = {name:r.name, phone:r.phone, count:0, total:0, last:""};
    custMap[r.phone].count++;
    custMap[r.phone].total += r.pre_order_total||0;
    if(r.date > custMap[r.phone].last) custMap[r.phone].last = r.date;
  });
  const topCustomers = Object.values(custMap).sort((a,b)=>b.count-a.count).slice(0,5);

  // Ümumi statistika
  const totalRevenue = filtRows.reduce((s,r)=>s+(r.pre_order_total||0),0);
  const avgGuests = filtRows.length ? (filtRows.reduce((s,r)=>s+r.guests,0)/filtRows.length).toFixed(1) : 0;
  const cancelRate = rows.length ? Math.round(rows.filter(r=>r.status==="ləğv edildi").length/rows.length*100) : 0;

  // AI Tövsiyələri
  const aiTips = [];
  const peakHour = hourData.sort((a,b)=>b[1]-a[1])[0];
  if(peakHour) aiTips.push({icon:"⏰", tip:`"${peakHour[0]}" saatı ən sıx vaxtdır (${peakHour[1]} rezerv). Bu saatda əlavə personal lazım ola bilər.`, type:"info"});
  if(cancelRate > 20) aiTips.push({icon:"⚠️", tip:`Ləğvetmə faizi yüksəkdir: ${cancelRate}%. Müştərilərə xatırlatma göndərmək faydalı ola bilər.`, type:"warn"});
  if(topCustomers[0]?.count >= 3) aiTips.push({icon:"⭐", tip:`${topCustomers[0].name} ${topCustomers[0].count} dəfə gəlib — VIP müştəri kimi qeyd edin, endirim təklif edin!`, type:"success"});
  const quietHour = hourData.sort((a,b)=>a[1]-b[1])[0];
  if(quietHour) aiTips.push({icon:"💡", tip:`"${quietHour[0]}" saatında az rezerv var. Bu saatda kampaniya başlatsanız doluluk artacaq.`, type:"info"});
  const topTable = tableData[0];
  if(topTable) aiTips.push({icon:"🏆", tip:`Masa ${topTable[0]} ən çox seçilən masadır (${topTable[1]} dəfə). Onu premium zone kimi tanıtın!`, type:"success"});

  const colors = ["#3B82F6","#22C55E","#F59E0B","#EF4444","#8B5CF6","#06B6D4","#F97316","#EC4899"];

  return(
    <div>
      {/* Header */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end",marginBottom:"1.5rem",flexWrap:"wrap",gap:"1rem"}}>
        <div>
          <div style={{fontSize:"1.4rem",fontWeight:800,letterSpacing:"-.02em",marginBottom:".2rem"}}>📈 Analitika</div>
          <div style={{fontSize:".8rem",color:"#94A3B8"}}>Biznes göstəriciləri və AI tövsiyələri</div>
        </div>
        <div style={{display:"flex",gap:".6rem",flexWrap:"wrap"}}>
          {isSuper&&<select value={selRest} onChange={e=>setSelRest(e.target.value)} style={{border:"1px solid #E2E8F0",borderRadius:"8px",padding:".45rem .8rem",fontSize:".82rem",outline:"none",background:"#fff"}}>
            <option value="hamısı">Bütün restoranlar</option>
            {restaurants.map(r=><option key={r.id} value={r.name}>{r.name}</option>)}
          </select>}
          {!isSuper&&restaurants.length===1&&<span style={{border:"1px solid #BFDBFE",borderRadius:"8px",padding:".45rem .8rem",fontSize:".82rem",background:"#EFF6FF",color:"#2563EB",fontWeight:600}}>{restaurants[0].name}</span>}
          {["7","30","90"].map(d=>(
            <button key={d} onClick={()=>setPeriod(d)} style={{padding:".45rem .9rem",borderRadius:"8px",border:`1px solid ${period===d?"#3B82F6":"#E2E8F0"}`,background:period===d?"#EFF6FF":"#fff",color:period===d?"#2563EB":"#64748B",fontSize:".82rem",fontWeight:period===d?700:500,cursor:"pointer",fontFamily:"inherit"}}>
              {d} gün
            </button>
          ))}
        </div>
      </div>

      {/* KPI kartları */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(180px,1fr))",gap:"1rem",marginBottom:"1.5rem"}}>
        {[
          {icon:"📋",label:"Cəmi rezerv",val:filtRows.length,sub:`Son ${days} gün`,color:"#3B82F6"},
          {icon:"💰",label:"Ön sifariş gəliri",val:`${totalRevenue}₼`,sub:`Son ${days} gün`,color:"#16A34A"},
          {icon:"👥",label:"Orta qonaq",val:`${avgGuests} nf`,sub:"rezerv başına",color:"#8B5CF6"},
          {icon:"❌",label:"Ləğvetmə",val:`${cancelRate}%`,sub:"bütün vaxtlar",color:cancelRate>20?"#EF4444":"#64748B"},
          {icon:"🏆",label:"Ən aktiv masa",val:tableData[0]?`Masa ${tableData[0][0]}`:"—",sub:tableData[0]?`${tableData[0][1]} dəfə`:"məlumat yoxdur",color:"#F59E0B"},
        ].map(s=>(
          <div key={s.label} style={{background:"#fff",borderRadius:"12px",padding:"1.2rem",border:"1px solid #E2E8F0"}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:".7rem"}}>
              <div style={{fontSize:".65rem",fontWeight:600,letterSpacing:".08em",textTransform:"uppercase",color:"#94A3B8"}}>{s.label}</div>
              <div style={{fontSize:"1.2rem"}}>{s.icon}</div>
            </div>
            <div style={{fontSize:"1.8rem",fontWeight:800,color:s.color,letterSpacing:"-.02em",marginBottom:".2rem"}}>{s.val}</div>
            <div style={{fontSize:".7rem",color:"#94A3B8"}}>{s.sub}</div>
          </div>
        ))}
      </div>

      {/* AI TÖVSİYƏLƏRİ */}
      <div style={{background:"linear-gradient(135deg,#0F172A,#1E3A5F)",borderRadius:"16px",padding:"1.4rem",marginBottom:"1.5rem"}}>
        <div style={{display:"flex",alignItems:"center",gap:".7rem",marginBottom:"1.2rem"}}>
          <div style={{width:"36px",height:"36px",borderRadius:"10px",background:"linear-gradient(135deg,#3B82F6,#8B5CF6)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"1.2rem"}}>🤖</div>
          <div>
            <div style={{fontWeight:800,fontSize:".95rem",color:"#fff"}}>AI Tövsiyələri</div>
            <div style={{fontSize:".7rem",color:"#64748B"}}>Məlumatlarınıza əsaslanan ağıllı təkliflər</div>
          </div>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:".7rem"}}>
          {aiTips.length===0&&<div style={{color:"#475569",fontSize:".85rem"}}>Tövsiyə üçün daha çox məlumat lazımdır</div>}
          {aiTips.map((t,i)=>(
            <div key={i} style={{background:t.type==="warn"?"rgba(245,158,11,.15)":t.type==="success"?"rgba(34,197,94,.15)":"rgba(59,130,246,.15)",borderRadius:"10px",padding:".8rem 1rem",display:"flex",gap:".7rem",alignItems:"flex-start",border:`1px solid ${t.type==="warn"?"rgba(245,158,11,.3)":t.type==="success"?"rgba(34,197,94,.3)":"rgba(59,130,246,.3)"}`}}>
              <span style={{fontSize:"1.1rem",flexShrink:0}}>{t.icon}</span>
              <span style={{fontSize:".82rem",color:"#E2E8F0",lineHeight:1.5}}>{t.tip}</span>
            </div>
          ))}
        </div>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"1.5rem",marginBottom:"1.5rem"}}>
        {/* Günlük qrafik */}
        <div style={{background:"#fff",borderRadius:"14px",border:"1px solid #E2E8F0",padding:"1.2rem"}}>
          <div style={{fontWeight:700,fontSize:".9rem",marginBottom:"1.2rem"}}>Günlük rezervasiyalar</div>
          <div style={{display:"flex",alignItems:"flex-end",gap:"4px",height:"140px"}}>
            {dailyData.map(([date,count])=>(
              <div key={date} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:"4px",height:"100%",justifyContent:"flex-end"}}>
                <div style={{fontSize:".55rem",color:"#94A3B8",fontWeight:600}}>{count||""}</div>
                <div style={{width:"100%",background:`linear-gradient(to top, #3B82F6, #60A5FA)`,borderRadius:"4px 4px 0 0",height:`${(count/maxDay)*100}%`,minHeight:count?"4px":"2px",opacity:count?1:.2,transition:"height .3s"}}/>
                <div style={{fontSize:".5rem",color:"#94A3B8",transform:"rotate(-45deg)",transformOrigin:"center",whiteSpace:"nowrap"}}>{date.slice(5)}</div>
              </div>
            ))}
          </div>
        </div>

        {/* Saat analizi */}
        <div style={{background:"#fff",borderRadius:"14px",border:"1px solid #E2E8F0",padding:"1.2rem"}}>
          <div style={{fontWeight:700,fontSize:".9rem",marginBottom:"1.2rem"}}>Populyar saatlar</div>
          {hourData.length===0&&<div style={{color:"#94A3B8",fontSize:".85rem",textAlign:"center",padding:"2rem"}}>Məlumat yoxdur</div>}
          <div style={{display:"flex",flexDirection:"column",gap:".5rem"}}>
            {hourData.sort((a,b)=>b[1]-a[1]).slice(0,6).map(([hour,count])=>(
              <div key={hour} style={{display:"flex",alignItems:"center",gap:".7rem"}}>
                <div style={{width:"48px",fontSize:".78rem",fontWeight:600,color:"#0F172A",flexShrink:0}}>{hour}</div>
                <div style={{flex:1,background:"#F1F5F9",borderRadius:"20px",height:"10px",overflow:"hidden"}}>
                  <div style={{width:`${count/maxHour*100}%`,height:"100%",background:"linear-gradient(90deg,#3B82F6,#8B5CF6)",borderRadius:"20px",transition:"width .4s"}}/>
                </div>
                <div style={{width:"30px",fontSize:".75rem",color:"#64748B",textAlign:"right",flexShrink:0}}>{count}</div>
              </div>
            ))}
          </div>
        </div>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"1.5rem",marginBottom:"1.5rem"}}>
        {/* Restoran payı */}
        <div style={{background:"#fff",borderRadius:"14px",border:"1px solid #E2E8F0",padding:"1.2rem"}}>
          <div style={{fontWeight:700,fontSize:".9rem",marginBottom:"1.2rem"}}>Restoran payları</div>
          {restData.length===0&&<div style={{color:"#94A3B8",fontSize:".85rem",textAlign:"center",padding:"2rem"}}>Məlumat yoxdur</div>}
          <div style={{display:"flex",flexDirection:"column",gap:".7rem"}}>
            {restData.map(([name,count],i)=>(
              <div key={name}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:".3rem"}}>
                  <span style={{fontSize:".82rem",fontWeight:600,color:"#0F172A"}}>{name}</span>
                  <span style={{fontSize:".78rem",color:"#64748B"}}>{count} ({Math.round(count/totalRest*100)}%)</span>
                </div>
                <div style={{background:"#F1F5F9",borderRadius:"20px",height:"8px",overflow:"hidden"}}>
                  <div style={{width:`${count/totalRest*100}%`,height:"100%",background:colors[i%colors.length],borderRadius:"20px",transition:"width .4s"}}/>
                </div>
              </div>
            ))}
          </div>
        </div>

        {/* Populyar masalar */}
        <div style={{background:"#fff",borderRadius:"14px",border:"1px solid #E2E8F0",padding:"1.2rem"}}>
          <div style={{fontWeight:700,fontSize:".9rem",marginBottom:"1.2rem"}}>Ən populyar masalar</div>
          {tableData.length===0&&<div style={{color:"#94A3B8",fontSize:".85rem",textAlign:"center",padding:"2rem"}}>Məlumat yoxdur</div>}
          <div style={{display:"flex",flexDirection:"column",gap:".5rem"}}>
            {tableData.map(([label,count],i)=>(
              <div key={label} style={{display:"flex",alignItems:"center",gap:".7rem"}}>
                <div style={{width:"24px",height:"24px",borderRadius:"6px",background:colors[i%colors.length]+"20",display:"flex",alignItems:"center",justifyContent:"center",fontSize:".65rem",fontWeight:700,color:colors[i%colors.length],flexShrink:0}}>#{i+1}</div>
                <div style={{flex:1,background:"#F1F5F9",borderRadius:"20px",height:"10px",overflow:"hidden"}}>
                  <div style={{width:`${count/maxTable*100}%`,height:"100%",background:colors[i%colors.length],borderRadius:"20px"}}/>
                </div>
                <div style={{width:"70px",fontSize:".75rem",color:"#64748B",flexShrink:0}}>Masa {label} · {count}</div>
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* Sadiq müştərilər */}
      <div style={{background:"#fff",borderRadius:"14px",border:"1px solid #E2E8F0",overflow:"hidden"}}>
        <div style={{padding:"1rem 1.2rem",borderBottom:"1px solid #F1F5F9",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{fontWeight:700,fontSize:".9rem"}}>🏅 Sadiq müştərilər</div>
          <span style={{fontSize:".7rem",color:"#94A3B8"}}>Bütün vaxtlar</span>
        </div>
        {topCustomers.length===0&&<div style={{padding:"2rem",textAlign:"center",color:"#94A3B8"}}>Məlumat yoxdur</div>}
        {topCustomers.map((c,i)=>(
          <div key={c.phone} style={{padding:".9rem 1.2rem",borderBottom:"1px solid #F8FAFC",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div style={{display:"flex",alignItems:"center",gap:".9rem"}}>
              <div style={{width:"36px",height:"36px",borderRadius:"50%",background:["linear-gradient(135deg,#FFD700,#FFA500)","linear-gradient(135deg,#C0C0C0,#A0A0A0)","linear-gradient(135deg,#CD7F32,#8B5A2B)","linear-gradient(135deg,#3B82F6,#1D4ED8)","linear-gradient(135deg,#8B5CF6,#5B21B6)"][i],display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:".85rem",color:"#fff",flexShrink:0}}>
                {i===0?"🥇":i===1?"🥈":i===2?"🥉":`#${i+1}`}
              </div>
              <div>
                <div style={{fontWeight:700,fontSize:".88rem"}}>{c.name}</div>
                <div style={{fontSize:".72rem",color:"#94A3B8"}}>{c.phone} · Son: {c.last}</div>
              </div>
            </div>
            <div style={{textAlign:"right"}}>
              <div style={{fontWeight:700,fontSize:".9rem",color:"#0F172A"}}>{c.count} rezerv</div>
              {c.total>0&&<div style={{fontSize:".72rem",color:"#16A34A",fontWeight:600}}>{c.total}₼ ön sifariş</div>}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ⭐ RƏYLƏR SƏHİFƏSİ
// ════════════════════════════════════════════════════════════
function ReviewsPage({restaurants, isSuper}){
  const [reviews,setReviews]=useState([]);
  const [loading,setLoading]=useState(true);
  const [filterRest,setFilterRest]=useState(()=>!isSuper&&restaurants.length===1?restaurants[0].name:"hamısı");
  const [filterStar,setFilterStar]=useState("hamısı");

  useEffect(()=>{if(!isSuper&&restaurants.length===1)setFilterRest(restaurants[0].name);},[restaurants]);
  useEffect(()=>{
    sb.from("reviews").select("*").order("created_at",{ascending:false})
      .then(({data})=>{setReviews(data||[]);setLoading(false);})
      .catch(()=>setLoading(false));
  },[]);

  const filtered=reviews.filter(r=>{
    if(filterRest!=="hamısı"&&r.restaurant_name!==filterRest)return false;
    if(filterStar!=="hamısı"&&r.stars!==parseInt(filterStar))return false;
    return true;
  });

  const avgRating=reviews.length?(reviews.reduce((s,r)=>s+r.stars,0)/reviews.length).toFixed(1):0;
  const starDist=[5,4,3,2,1].map(s=>({s,count:reviews.filter(r=>r.stars===s).length}));

  return(
    <div>
      <div style={{marginBottom:"1.5rem"}}>
        <div style={{fontSize:"1.4rem",fontWeight:800,letterSpacing:"-.02em",marginBottom:".2rem"}}>⭐ Müştəri Rəyləri</div>
        <div style={{fontSize:".8rem",color:"#94A3B8"}}>Rezervasiyadan sonra avtomatik toplanan rəylər</div>
      </div>

      {loading&&<div style={{textAlign:"center",padding:"3rem",color:"#94A3B8"}}>Yüklənir...</div>}

      {!loading&&(
        <>
          {/* Ümumi rating */}
          <div style={{display:"grid",gridTemplateColumns:"200px 1fr",gap:"1.5rem",marginBottom:"1.5rem"}}>

// 📱 QR KOD SƏHİFƏSİ
// ════════════════════════════════════════════════════════════
function QRPage({restaurants, allTables, isSuper}){
  const [selRest, setSelRest] = useState(()=>restaurants.length===1?String(restaurants[0].id):"");
  const [qrMode, setQrMode] = useState("table");
  const [generated, setGenerated] = useState([]);
  const BASE_URL = window.location.origin; // Avtomatik — deployment-ə görə dəyişir

  const restTables = useMemo(()=>{
    if(!selRest) return [];
    const rid = parseInt(selRest);
    return allTables.filter(t=>t.restaurant_id===rid);
  },[selRest,allTables]);

  const generate = () => {
    const rest = restaurants.find(r=>String(r.id)===selRest);
    if(!rest) return;
    // URL: /r/restoran-adi formatı — App.jsx-dəki router ilə uyğun
    const restSlug = rest.name.toLowerCase().replace(/\s+/g,"-");
    if(qrMode==="restaurant"){
      setGenerated([{
        label: rest.name,
        url: `${BASE_URL}/r/${encodeURIComponent(rest.name)}`,
        subtitle: "Restoran girişi",
      }]);
    } else {
      if(restTables.length===0){
        alert("Bu restoran üçün masa tapılmadı. Əvvəlcə İdarəetmə bölməsindən masa əlavə edin.");
        return;
      }
      setGenerated(restTables.map(t=>({
        label: `Masa ${t.label}`,
        url: `${BASE_URL}/r/${encodeURIComponent(rest.name)}?table=${encodeURIComponent(t.label)}`,
        subtitle: `${t.zone ? t.zone+" · " : ""}${t.seats} nəfərlik`,
      })));
    }
  };

  const getQRUrl = (url) =>
    `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(url)}&bgcolor=ffffff&color=0f172a&margin=10`;

  const printAll = () => {
    const win = window.open("","_blank");
    const css = "body{font-family:system-ui,sans-serif;background:#fff;margin:0;padding:20px;}.grid{display:flex;flex-wrap:wrap;gap:20px;}.card{border:1.5px solid #E2E8F0;border-radius:12px;padding:16px;text-align:center;width:180px;break-inside:avoid;}.label{font-weight:800;font-size:14px;margin-top:8px;}.sub{font-size:11px;color:#94A3B8;margin-top:3px;}img{width:150px;height:150px;}@media print{body{padding:0}.grid{gap:10px}.card{width:160px;padding:10px;}}";
    const cards = generated.map(g=>"<div class=\"card\"><img src=\""+getQRUrl(g.url)+"\" alt=\""+g.label+"\"/><div class=\"label\">"+g.label+"</div><div class=\"sub\">"+g.subtitle+"</div></div>").join("");
    const html = "<!DOCTYPE html><html><head><title>MasaAz QR Kodlar</title><style>"+css+"</style></head><body><h2 style=\"margin-bottom:16px;font-size:18px;\">MasaAz QR Kodlar</h2><div class=\"grid\">"+cards+"</div><script>window.print();<\/script></body></html>";
    win.document.write(html);
    win.document.close();
  };

  return(
    <div>
      <div style={{marginBottom:"1.5rem"}}>
        <div style={{fontSize:"1.4rem",fontWeight:800,letterSpacing:"-.02em",marginBottom:".2rem"}}>📱 QR Kodlar</div>
        <div style={{fontSize:".8rem",color:"#94A3B8"}}>Masalara qoyun — müştəri skan edib birbaşa rezerv etsin</div>
      </div>

      <div style={{background:"#fff",borderRadius:"14px",border:"1px solid #E2E8F0",padding:"1.4rem",marginBottom:"1.5rem"}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr auto",gap:"1rem",alignItems:"flex-end",flexWrap:"wrap"}}>
          <div>
            <label style={{fontSize:".65rem",fontWeight:600,letterSpacing:".08em",textTransform:"uppercase",color:"#94A3B8",display:"block",marginBottom:".3rem"}}>Restoran</label>
            {isSuper
              ?<select value={selRest} onChange={e=>setSelRest(e.target.value)} style={{width:"100%",border:"1px solid #E2E8F0",borderRadius:"8px",padding:".55rem .8rem",fontSize:".85rem",outline:"none",background:"#fff"}}>
                <option value="">Restoran seç...</option>
                {restaurants.map(r=><option key={r.id} value={r.id}>{r.name}</option>)}
              </select>
              :<div style={{border:"1px solid #BFDBFE",borderRadius:"8px",padding:".55rem .8rem",fontSize:".85rem",background:"#EFF6FF",color:"#2563EB",fontWeight:600}}>{restaurants[0]?.name||"—"}</div>
            }
          </div>
          <div>
            <label style={{fontSize:".65rem",fontWeight:600,letterSpacing:".08em",textTransform:"uppercase",color:"#94A3B8",display:"block",marginBottom:".3rem"}}>QR növü</label>
            <div style={{display:"flex",gap:".4rem"}}>
              {[{v:"table",l:"🪑 Hər masa üçün"},{v:"restaurant",l:"🏛️ Restoran üçün"}].map(m=>(
                <button key={m.v} onClick={()=>setQrMode(m.v)} style={{flex:1,padding:".5rem .6rem",borderRadius:"8px",border:`1px solid ${qrMode===m.v?"#3B82F6":"#E2E8F0"}`,background:qrMode===m.v?"#EFF6FF":"#fff",color:qrMode===m.v?"#2563EB":"#64748B",fontSize:".75rem",fontWeight:qrMode===m.v?700:500,cursor:"pointer",fontFamily:"inherit"}}>{m.l}</button>
              ))}
            </div>
          </div>
          <button onClick={generate} disabled={!selRest} style={{background:selRest?"#0F172A":"#E2E8F0",color:selRest?"#fff":"#94A3B8",border:"none",borderRadius:"8px",padding:".6rem 1.2rem",fontSize:".85rem",fontWeight:700,cursor:selRest?"pointer":"not-allowed",fontFamily:"inherit",whiteSpace:"nowrap"}}>
            QR Yarat ✨
          </button>
        </div>
      </div>

      {generated.length>0&&(
        <>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"1rem"}}>
            <div style={{fontWeight:700,fontSize:".9rem"}}>{generated.length} QR kod hazırlandı</div>
            <button onClick={printAll} style={{background:"#16A34A",color:"#fff",border:"none",borderRadius:"8px",padding:".5rem 1.1rem",fontSize:".82rem",fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>🖨️ Hamısını Çap Et</button>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:"1rem"}}>
            {generated.map((g,i)=>(
              <div key={i} style={{background:"#fff",borderRadius:"14px",border:"1px solid #E2E8F0",padding:"1.2rem",textAlign:"center"}}>
                <img src={getQRUrl(g.url)} alt={g.label} style={{width:"160px",height:"160px",borderRadius:"8px"}}/>
                <div style={{fontWeight:800,fontSize:".95rem",marginTop:".7rem",color:"#0F172A"}}>{g.label}</div>
                <div style={{fontSize:".7rem",color:"#94A3B8",marginBottom:".8rem"}}>{g.subtitle}</div>
                <div style={{fontSize:".6rem",color:"#CBD5E1",wordBreak:"break-all",background:"#F8FAFC",borderRadius:"6px",padding:".4rem",marginBottom:".7rem"}}>{g.url}</div>
                <a href={g.url} target="_blank" style={{fontSize:".75rem",color:"#3B82F6",textDecoration:"none",fontWeight:600}}>🔗 Linki aç →</a>
              </div>
            ))}
          </div>
          <div style={{marginTop:"1rem",background:"#FEF9C3",borderRadius:"10px",padding:"1rem 1.2rem",border:"1px solid #FDE047",fontSize:".8rem",color:"#92400E"}}>
            💡 <b>İstifadə qaydası:</b> QR kodları çap edin → laminate edin → hər masaya qoyun. Müştəri telefonu ilə skan edir → birbaşa həmin masanı seçmiş halda rezervasiya forması açılır!
          </div>
        </>
      )}

      {generated.length===0&&selRest&&(
        <div style={{background:"#fff",borderRadius:"14px",border:"2px dashed #E2E8F0",padding:"3rem",textAlign:"center",color:"#94A3B8"}}>
          <div style={{fontSize:"2.5rem",marginBottom:".7rem"}}>📱</div>
          <div style={{fontWeight:600,marginBottom:".3rem"}}>QR yaratmaq hazırsınız</div>
          <div style={{fontSize:".82rem",marginBottom:".5rem"}}>"QR Yarat" düyməsinə basın</div>
          {qrMode==="table"&&restTables.length===0&&(
            <div style={{marginTop:".8rem",background:"#FEF9C3",border:"1px solid #FDE047",borderRadius:"8px",padding:".6rem 1rem",fontSize:".78rem",color:"#92400E"}}>
              ⚠️ Bu restoran üçün masa yoxdur — əvvəlcə <b>İdarəetmə</b> bölməsindən masa əlavə edin
            </div>
          )}
        </div>
      )}
      {!selRest&&(
        <div style={{background:"#fff",borderRadius:"14px",border:"2px dashed #E2E8F0",padding:"3rem",textAlign:"center",color:"#94A3B8"}}>
          <div style={{fontSize:"2.5rem",marginBottom:".7rem"}}>👆</div>
          <div style={{fontWeight:600}}>Yuxarıdan restoran seçin</div>
        </div>
      )}
    </div>
  );
}
