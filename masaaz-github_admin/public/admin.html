<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MasaAz Admin — Restoran Paneli</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #F1F5F9; font-family: 'Inter', system-ui, sans-serif; }
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: #F1F5F9; }
    ::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 10px; }
    .sidebar-item { transition: all 0.15s ease; }
    .sidebar-item:hover { background: rgba(255,255,255,0.08) !important; }
    .card-hover { transition: box-shadow 0.2s, transform 0.2s; }
    .card-hover:hover { box-shadow: 0 8px 24px rgba(0,0,0,0.08); transform: translateY(-2px); }
    .row-hover:hover { background: #F8FAFC !important; }
    .btn { transition: all 0.15s ease; cursor: pointer; }
    .btn:hover { filter: brightness(0.92); }
    input, select, textarea { font-family: 'Inter', system-ui, sans-serif; }
    select option { background: #fff; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useMemo } = React;

    // ── MOCK DATA ──
    const RESTAURANT = {
      name: "Nargiz Restaurant",
      address: "Nizami küçəsi 42, Bakı",
      phone: "+994 12 555 0001",
      email: "info@nargiz.az",
      plan: "Pro",
      planExpiry: "2025-03-15",
    };

    const generateReservations = () => {
      const names = ["Əli Həsənov","Leyla Məmmədova","Nicat Quliyev","Günel Əliyeva","Rauf Babayev","Aytən Hüseynova","Kamran Nəcəfov","Sevinc Rzayeva","Tural Abbasov","Nərmin Cəfərova","Orxan Musayev","Zəhra İsmayılova"];
      const tables = ["A1","A2","A3","B1","B2","C1","C2","VIP"];
      const statuses = ["təsdiqləndi","gözlənilir","gəldi","ləğv edildi"];
      const statusWeights = [0.5, 0.25, 0.15, 0.1];
      const notes = ["","Pəncərə yanında olsun","Ad günüdür, tort gətirəcəyik","Vegetarian menyu lazımdır","Allergiyam var - qoz yox","","Körpə üçün yer lazımdır",""];

      return Array.from({ length: 38 }, (_, i) => {
        const date = new Date();
        date.setDate(date.getDate() + Math.floor(Math.random() * 14) - 5);
        const hour = 12 + Math.floor(Math.random() * 10);
        const minute = Math.random() > 0.5 ? "00" : "30";
        const rand = Math.random();
        let statusIdx = 0;
        let cum = 0;
        for (let s = 0; s < statusWeights.length; s++) {
          cum += statusWeights[s];
          if (rand < cum) { statusIdx = s; break; }
        }
        return {
          id: `RZ${String(i + 1001).padStart(4,"0")}`,
          name: names[i % names.length],
          phone: `+994 5${Math.floor(Math.random()*3+0)} ${Math.floor(100+Math.random()*900)} ${Math.floor(10+Math.random()*90)} ${Math.floor(10+Math.random()*90)}`,
          date: date.toISOString().split("T")[0],
          time: `${String(hour).padStart(2,"0")}:${minute}`,
          guests: Math.floor(Math.random() * 7) + 1,
          table: tables[i % tables.length],
          status: statuses[statusIdx],
          note: notes[i % notes.length],
          preOrder: Math.random() > 0.55 ? Math.floor(Math.random() * 80 + 20) : 0,
          createdAt: new Date(date.getTime() - Math.random() * 86400000 * 3).toISOString(),
        };
      }).sort((a, b) => a.date.localeCompare(b.date) || a.time.localeCompare(b.time));
    };

    const ALL_RESERVATIONS = generateReservations();

    const TABLES = [
      { label: "A1", seats: 2, zone: "Pəncərə" },
      { label: "A2", seats: 2, zone: "Pəncərə" },
      { label: "A3", seats: 2, zone: "Bar yanı" },
      { label: "B1", seats: 4, zone: "Mərkəz" },
      { label: "B2", seats: 4, zone: "Mərkəz" },
      { label: "C1", seats: 6, zone: "Terras" },
      { label: "C2", seats: 4, zone: "Terras" },
      { label: "VIP", seats: 8, zone: "VIP" },
    ];

    const STATUS_COLORS = {
      "təsdiqləndi": { bg: "#DCFCE7", text: "#16A34A", border: "#86EFAC" },
      "gözlənilir":  { bg: "#FEF9C3", text: "#CA8A04", border: "#FDE047" },
      "gəldi":       { bg: "#DBEAFE", text: "#2563EB", border: "#93C5FD" },
      "ləğv edildi": { bg: "#FEE2E2", text: "#DC2626", border: "#FCA5A5" },
    };

    const today = new Date().toISOString().split("T")[0];
    const todayStr = today;

    function StatusBadge({ status }) {
      const c = STATUS_COLORS[status] || { bg: "#F1F5F9", text: "#64748B", border: "#CBD5E1" };
      return (
        <span style={{ fontSize: "0.72rem", padding: "0.2rem 0.6rem", background: c.bg, color: c.text, border: `1px solid ${c.border}`, borderRadius: "20px", fontWeight: 600, whiteSpace: "nowrap" }}>
          {status}
        </span>
      );
    }

    function Stat({ label, value, sub, color, icon }) {
      return (
        <div className="card-hover" style={{ background: "#fff", borderRadius: "12px", padding: "1.2rem 1.4rem", border: "1px solid #E2E8F0", flex: 1, minWidth: "140px" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: "0.8rem" }}>
            <div style={{ fontSize: "0.7rem", fontWeight: 600, letterSpacing: "0.08em", textTransform: "uppercase", color: "#94A3B8" }}>{label}</div>
            <div style={{ fontSize: "1.3rem" }}>{icon}</div>
          </div>
          <div style={{ fontSize: "2rem", fontWeight: 800, letterSpacing: "-0.03em", color: color || "#0F172A", marginBottom: "0.2rem" }}>{value}</div>
          {sub && <div style={{ fontSize: "0.72rem", color: "#94A3B8" }}>{sub}</div>}
        </div>
      );
    }

    function App() {
      const [page, setPage] = useState("dashboard");
      const [reservations, setReservations] = useState(ALL_RESERVATIONS);
      const [filterDate, setFilterDate] = useState("");
      const [filterStatus, setFilterStatus] = useState("hamısı");
      const [filterTable, setFilterTable] = useState("hamısı");
      const [search, setSearch] = useState("");
      const [selectedRes, setSelectedRes] = useState(null);
      const [sidebarOpen, setSidebarOpen] = useState(true);

      // Stats
      const todayRes = reservations.filter(r => r.date === todayStr);
      const todayConfirmed = todayRes.filter(r => r.status === "təsdiqləndi" || r.status === "gəldi");
      const todayGuests = todayConfirmed.reduce((s, r) => s + r.guests, 0);
      const todayRevenue = todayRes.reduce((s, r) => s + r.preOrder, 0);
      const upcomingRes = reservations.filter(r => r.date >= todayStr && r.status !== "ləğv edildi");
      const totalRevenue = reservations.reduce((s, r) => s + r.preOrder, 0);
      const cancelRate = Math.round(reservations.filter(r => r.status === "ləğv edildi").length / reservations.length * 100);

      // Filter
      const filtered = useMemo(() => {
        return reservations.filter(r => {
          if (filterDate && r.date !== filterDate) return false;
          if (filterStatus !== "hamısı" && r.status !== filterStatus) return false;
          if (filterTable !== "hamısı" && r.table !== filterTable) return false;
          if (search && !r.name.toLowerCase().includes(search.toLowerCase()) && !r.id.toLowerCase().includes(search.toLowerCase()) && !r.phone.includes(search)) return false;
          return true;
        });
      }, [reservations, filterDate, filterStatus, filterTable, search]);

      // Today's table status
      const tableStatus = TABLES.map(t => {
        const todayBookings = todayRes.filter(r => r.table === t.label && r.status !== "ləğv edildi");
        return { ...t, bookings: todayBookings, busy: todayBookings.length > 0 };
      });

      const updateStatus = (id, newStatus) => {
        setReservations(prev => prev.map(r => r.id === id ? { ...r, status: newStatus } : r));
        if (selectedRes?.id === id) setSelectedRes(prev => ({ ...prev, status: newStatus }));
      };

      const navItems = [
        { id: "dashboard", icon: "📊", label: "Dashboard" },
        { id: "reservations", icon: "📋", label: "Rezervasiyalar" },
        { id: "tables", icon: "🪑", label: "Masalar" },
        { id: "settings", icon: "⚙️", label: "Tənzimləmələr" },
      ];

      return (
        <div style={{ display: "flex", minHeight: "100vh", background: "#F1F5F9" }}>

          {/* SIDEBAR */}
          <aside style={{ width: sidebarOpen ? "220px" : "60px", background: "#0F172A", display: "flex", flexDirection: "column", flexShrink: 0, transition: "width 0.25s ease", overflow: "hidden" }}>
            {/* Logo */}
            <div style={{ padding: "1.2rem", borderBottom: "1px solid rgba(255,255,255,0.06)", display: "flex", alignItems: "center", gap: "0.7rem", minHeight: "64px" }}>
              <div style={{ width: "32px", height: "32px", borderRadius: "8px", background: "#3B82F6", display: "flex", alignItems: "center", justifyContent: "center", fontSize: "1rem", flexShrink: 0 }}>🍽️</div>
              {sidebarOpen && (
                <div style={{ overflow: "hidden" }}>
                  <div style={{ fontWeight: 800, fontSize: "0.95rem", color: "#fff", whiteSpace: "nowrap" }}>MasaAz</div>
                  <div style={{ fontSize: "0.58rem", color: "#475569", textTransform: "uppercase", letterSpacing: "0.1em", whiteSpace: "nowrap" }}>Admin Panel</div>
                </div>
              )}
            </div>

            {/* Nav */}
            <nav style={{ padding: "0.8rem 0.5rem", flex: 1 }}>
              {navItems.map(item => (
                <div key={item.id} className="sidebar-item"
                  onClick={() => setPage(item.id)}
                  style={{ display: "flex", alignItems: "center", gap: "0.7rem", padding: "0.65rem 0.7rem", borderRadius: "8px", marginBottom: "0.2rem", cursor: "pointer", background: page === item.id ? "rgba(59,130,246,0.2)" : "transparent", borderLeft: page === item.id ? "3px solid #3B82F6" : "3px solid transparent" }}>
                  <span style={{ fontSize: "1.1rem", flexShrink: 0 }}>{item.icon}</span>
                  {sidebarOpen && <span style={{ fontSize: "0.85rem", fontWeight: page === item.id ? 700 : 500, color: page === item.id ? "#60A5FA" : "#94A3B8", whiteSpace: "nowrap" }}>{item.label}</span>}
                </div>
              ))}
            </nav>

            {/* Plan */}
            {sidebarOpen && (
              <div style={{ margin: "0.5rem", padding: "0.8rem", background: "rgba(59,130,246,0.1)", border: "1px solid rgba(59,130,246,0.2)", borderRadius: "10px" }}>
                <div style={{ fontSize: "0.62rem", color: "#60A5FA", fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: "0.2rem" }}>Pro Plan</div>
                <div style={{ fontSize: "0.7rem", color: "#64748B" }}>15 Mart 2025-ə qədər</div>
              </div>
            )}

            {/* Toggle */}
            <div onClick={() => setSidebarOpen(p => !p)} style={{ padding: "1rem", borderTop: "1px solid rgba(255,255,255,0.06)", display: "flex", justifyContent: sidebarOpen ? "flex-end" : "center", cursor: "pointer" }}>
              <span style={{ color: "#475569", fontSize: "1rem" }}>{sidebarOpen ? "◀" : "▶"}</span>
            </div>
          </aside>

          {/* MAIN */}
          <div style={{ flex: 1, display: "flex", flexDirection: "column", overflow: "hidden" }}>

            {/* TOP BAR */}
            <header style={{ background: "#fff", borderBottom: "1px solid #E2E8F0", height: "64px", display: "flex", alignItems: "center", justifyContent: "space-between", padding: "0 1.5rem", flexShrink: 0 }}>
              <div>
                <div style={{ fontWeight: 700, fontSize: "1rem", color: "#0F172A" }}>{RESTAURANT.name}</div>
                <div style={{ fontSize: "0.72rem", color: "#94A3B8" }}>📍 {RESTAURANT.address}</div>
              </div>
              <div style={{ display: "flex", alignItems: "center", gap: "1rem" }}>
                <div style={{ textAlign: "right" }}>
                  <div style={{ fontSize: "0.8rem", fontWeight: 600, color: "#0F172A" }}>Bugün</div>
                  <div style={{ fontSize: "0.7rem", color: "#94A3B8" }}>{new Date().toLocaleDateString("az-AZ", { weekday: "long", day: "numeric", month: "long" })}</div>
                </div>
                <div style={{ width: "36px", height: "36px", borderRadius: "50%", background: "#0F172A", display: "flex", alignItems: "center", justifyContent: "center", color: "#fff", fontWeight: 700, fontSize: "0.85rem" }}>
                  {RESTAURANT.name.charAt(0)}
                </div>
              </div>
            </header>

            {/* PAGE CONTENT */}
            <main style={{ flex: 1, overflow: "auto", padding: "1.5rem" }}>

              {/* ── DASHBOARD ── */}
              {page === "dashboard" && (
                <div>
                  <div style={{ marginBottom: "1.5rem" }}>
                    <div style={{ fontSize: "1.4rem", fontWeight: 800, letterSpacing: "-0.02em", marginBottom: "0.2rem" }}>Dashboard</div>
                    <div style={{ fontSize: "0.8rem", color: "#94A3B8" }}>Bugünkü vəziyyətə ümumi baxış</div>
                  </div>

                  {/* Stats */}
                  <div style={{ display: "flex", gap: "1rem", flexWrap: "wrap", marginBottom: "1.5rem" }}>
                    <Stat icon="📅" label="Bu gün rezerv" value={todayRes.length} sub={`${todayConfirmed.length} təsdiqlənib`} color="#0F172A" />
                    <Stat icon="👥" label="Bu gün qonaq" value={todayGuests} sub="nəfər gözlənilir" color="#2563EB" />
                    <Stat icon="💰" label="Ön sifariş" value={`${todayRevenue}₼`} sub="bugün üçün" color="#16A34A" />
                    <Stat icon="📈" label="Cəmi gəlir" value={`${totalRevenue}₼`} sub="bütün ön sifarişlər" color="#7C3AED" />
                    <Stat icon="❌" label="Ləğvetmə" value={`${cancelRate}%`} sub="ümumi faiz" color="#DC2626" />
                  </div>

                  {/* Today's reservations */}
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "1.5rem" }}>
                    <div style={{ background: "#fff", borderRadius: "14px", border: "1px solid #E2E8F0", overflow: "hidden" }}>
                      <div style={{ padding: "1rem 1.2rem", borderBottom: "1px solid #F1F5F9", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                        <div style={{ fontWeight: 700, fontSize: "0.9rem" }}>Bu günün rezervasiyaları</div>
                        <span style={{ fontSize: "0.7rem", background: "#EFF6FF", color: "#2563EB", padding: "0.2rem 0.6rem", borderRadius: "20px", fontWeight: 600 }}>{todayRes.length} rezerv</span>
                      </div>
                      <div style={{ maxHeight: "340px", overflowY: "auto" }}>
                        {todayRes.length === 0 ? (
                          <div style={{ padding: "2rem", textAlign: "center", color: "#94A3B8", fontSize: "0.85rem" }}>Bu gün üçün rezervasiya yoxdur</div>
                        ) : todayRes.map(r => (
                          <div key={r.id} className="row-hover"
                            onClick={() => { setSelectedRes(r); setPage("reservations"); }}
                            style={{ padding: "0.85rem 1.2rem", borderBottom: "1px solid #F8FAFC", display: "flex", justifyContent: "space-between", alignItems: "center", cursor: "pointer" }}>
                            <div>
                              <div style={{ fontWeight: 600, fontSize: "0.88rem", marginBottom: "0.15rem" }}>{r.name}</div>
                              <div style={{ fontSize: "0.72rem", color: "#64748B" }}>⏰ {r.time} · Masa {r.table} · {r.guests} nəfər</div>
                            </div>
                            <StatusBadge status={r.status} />
                          </div>
                        ))}
                      </div>
                    </div>

                    {/* Table status */}
                    <div style={{ background: "#fff", borderRadius: "14px", border: "1px solid #E2E8F0", overflow: "hidden" }}>
                      <div style={{ padding: "1rem 1.2rem", borderBottom: "1px solid #F1F5F9" }}>
                        <div style={{ fontWeight: 700, fontSize: "0.9rem" }}>Masa vəziyyəti (bugün)</div>
                      </div>
                      <div style={{ padding: "1rem", display: "grid", gridTemplateColumns: "1fr 1fr", gap: "0.6rem" }}>
                        {tableStatus.map(t => (
                          <div key={t.label} style={{ padding: "0.7rem 0.9rem", borderRadius: "10px", background: t.busy ? "#FEF2F2" : "#F0FDF4", border: `1px solid ${t.busy ? "#FECACA" : "#86EFAC"}` }}>
                            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "0.2rem" }}>
                              <span style={{ fontWeight: 700, fontSize: "0.88rem", color: t.busy ? "#DC2626" : "#16A34A" }}>Masa {t.label}</span>
                              <span style={{ fontSize: "0.65rem", color: t.busy ? "#DC2626" : "#16A34A", fontWeight: 600 }}>{t.busy ? "Dolu" : "Boş"}</span>
                            </div>
                            <div style={{ fontSize: "0.68rem", color: "#64748B" }}>{t.zone} · {t.seats} nf</div>
                            {t.busy && t.bookings[0] && (
                              <div style={{ fontSize: "0.65rem", color: "#EF4444", marginTop: "0.2rem" }}>{t.bookings[0].time} — {t.bookings[0].name}</div>
                            )}
                          </div>
                        ))}
                      </div>
                    </div>
                  </div>

                  {/* Upcoming */}
                  <div style={{ marginTop: "1.5rem", background: "#fff", borderRadius: "14px", border: "1px solid #E2E8F0", overflow: "hidden" }}>
                    <div style={{ padding: "1rem 1.2rem", borderBottom: "1px solid #F1F5F9", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                      <div style={{ fontWeight: 700, fontSize: "0.9rem" }}>Gələcək rezervasiyalar</div>
                      <span style={{ fontSize: "0.7rem", background: "#F0FDF4", color: "#16A34A", padding: "0.2rem 0.6rem", borderRadius: "20px", fontWeight: 600 }}>{upcomingRes.length} rezerv</span>
                    </div>
                    <div style={{ overflowX: "auto" }}>
                      <table style={{ width: "100%", borderCollapse: "collapse", fontSize: "0.82rem" }}>
                        <thead>
                          <tr style={{ background: "#F8FAFC" }}>
                            {["Kod","Ad","Tarix","Saat","Masa","Qonaq","Status","Ön sifariş"].map(h => (
                              <th key={h} style={{ padding: "0.7rem 1rem", textAlign: "left", fontWeight: 600, fontSize: "0.7rem", letterSpacing: "0.05em", textTransform: "uppercase", color: "#94A3B8", whiteSpace: "nowrap" }}>{h}</th>
                            ))}
                          </tr>
                        </thead>
                        <tbody>
                          {upcomingRes.slice(0, 8).map(r => (
                            <tr key={r.id} className="row-hover" onClick={() => { setSelectedRes(r); setPage("reservations"); }} style={{ borderBottom: "1px solid #F8FAFC", cursor: "pointer" }}>
                              <td style={{ padding: "0.75rem 1rem", fontWeight: 700, color: "#2563EB", fontSize: "0.75rem" }}>{r.id}</td>
                              <td style={{ padding: "0.75rem 1rem", fontWeight: 500 }}>{r.name}</td>
                              <td style={{ padding: "0.75rem 1rem", color: "#64748B" }}>{r.date}</td>
                              <td style={{ padding: "0.75rem 1rem", color: "#64748B" }}>{r.time}</td>
                              <td style={{ padding: "0.75rem 1rem" }}><span style={{ background: "#F1F5F9", padding: "0.15rem 0.5rem", borderRadius: "6px", fontWeight: 600, fontSize: "0.75rem" }}>{r.table}</span></td>
                              <td style={{ padding: "0.75rem 1rem", color: "#64748B" }}>{r.guests} nf</td>
                              <td style={{ padding: "0.75rem 1rem" }}><StatusBadge status={r.status} /></td>
                              <td style={{ padding: "0.75rem 1rem", color: r.preOrder ? "#16A34A" : "#CBD5E1", fontWeight: r.preOrder ? 700 : 400 }}>{r.preOrder ? `${r.preOrder}₼` : "—"}</td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    </div>
                  </div>
                </div>
              )}

              {/* ── RESERVATIONS ── */}
              {page === "reservations" && (
                <div style={{ display: "flex", gap: "1.5rem", height: "calc(100vh - 130px)" }}>
                  {/* List */}
                  <div style={{ flex: 1, display: "flex", flexDirection: "column", background: "#fff", borderRadius: "14px", border: "1px solid #E2E8F0", overflow: "hidden" }}>
                    {/* Filters */}
                    <div style={{ padding: "1rem", borderBottom: "1px solid #F1F5F9", display: "flex", gap: "0.6rem", flexWrap: "wrap", alignItems: "center" }}>
                      <div style={{ fontWeight: 700, fontSize: "0.9rem", marginRight: "0.5rem", whiteSpace: "nowrap" }}>Rezervasiyalar</div>
                      <input
                        placeholder="🔍 Ad, kod, telefon..."
                        value={search}
                        onChange={e => setSearch(e.target.value)}
                        style={{ border: "1px solid #E2E8F0", borderRadius: "8px", padding: "0.45rem 0.8rem", fontSize: "0.8rem", outline: "none", flex: 1, minWidth: "140px" }}
                      />
                      <input type="date" value={filterDate} onChange={e => setFilterDate(e.target.value)}
                        style={{ border: "1px solid #E2E8F0", borderRadius: "8px", padding: "0.45rem 0.8rem", fontSize: "0.8rem", outline: "none", color: "#0F172A" }} />
                      <select value={filterStatus} onChange={e => setFilterStatus(e.target.value)}
                        style={{ border: "1px solid #E2E8F0", borderRadius: "8px", padding: "0.45rem 0.8rem", fontSize: "0.8rem", outline: "none", color: "#0F172A", background: "#fff" }}>
                        {["hamısı","təsdiqləndi","gözlənilir","gəldi","ləğv edildi"].map(s => <option key={s} value={s}>{s}</option>)}
                      </select>
                      <select value={filterTable} onChange={e => setFilterTable(e.target.value)}
                        style={{ border: "1px solid #E2E8F0", borderRadius: "8px", padding: "0.45rem 0.8rem", fontSize: "0.8rem", outline: "none", color: "#0F172A", background: "#fff" }}>
                        <option value="hamısı">Bütün masalar</option>
                        {TABLES.map(t => <option key={t.label} value={t.label}>Masa {t.label}</option>)}
                      </select>
                      {(filterDate || filterStatus !== "hamısı" || filterTable !== "hamısı" || search) && (
                        <button className="btn" onClick={() => { setFilterDate(""); setFilterStatus("hamısı"); setFilterTable("hamısı"); setSearch(""); }}
                          style={{ border: "1px solid #FECACA", background: "#FEF2F2", color: "#DC2626", borderRadius: "8px", padding: "0.45rem 0.8rem", fontSize: "0.75rem", fontWeight: 600 }}>
                          Filtrləri sıfırla ✕
                        </button>
                      )}
                    </div>

                    {/* Count */}
                    <div style={{ padding: "0.5rem 1rem", background: "#F8FAFC", borderBottom: "1px solid #F1F5F9", fontSize: "0.72rem", color: "#64748B" }}>
                      {filtered.length} nəticə tapıldı
                    </div>

                    {/* Table */}
                    <div style={{ overflowY: "auto", flex: 1 }}>
                      <table style={{ width: "100%", borderCollapse: "collapse", fontSize: "0.82rem" }}>
                        <thead style={{ position: "sticky", top: 0, background: "#fff", zIndex: 10 }}>
                          <tr style={{ background: "#F8FAFC" }}>
                            {["Kod","Ad Soyad","Tarix / Saat","Masa","Qonaq","Status","Qeyd","Ön sifariş"].map(h => (
                              <th key={h} style={{ padding: "0.7rem 0.8rem", textAlign: "left", fontWeight: 600, fontSize: "0.68rem", letterSpacing: "0.05em", textTransform: "uppercase", color: "#94A3B8", whiteSpace: "nowrap", borderBottom: "1px solid #E2E8F0" }}>{h}</th>
                            ))}
                          </tr>
                        </thead>
                        <tbody>
                          {filtered.map(r => (
                            <tr key={r.id} className="row-hover"
                              onClick={() => setSelectedRes(r)}
                              style={{ borderBottom: "1px solid #F8FAFC", cursor: "pointer", background: selectedRes?.id === r.id ? "#EFF6FF" : "#fff" }}>
                              <td style={{ padding: "0.75rem 0.8rem", fontWeight: 700, color: "#2563EB", fontSize: "0.73rem" }}>{r.id}</td>
                              <td style={{ padding: "0.75rem 0.8rem" }}>
                                <div style={{ fontWeight: 600, fontSize: "0.82rem" }}>{r.name}</div>
                                <div style={{ fontSize: "0.68rem", color: "#94A3B8" }}>{r.phone}</div>
                              </td>
                              <td style={{ padding: "0.75rem 0.8rem", color: "#64748B" }}>
                                <div style={{ fontWeight: 500 }}>{r.date}</div>
                                <div style={{ fontSize: "0.72rem" }}>{r.time}</div>
                              </td>
                              <td style={{ padding: "0.75rem 0.8rem" }}><span style={{ background: "#F1F5F9", padding: "0.18rem 0.5rem", borderRadius: "6px", fontWeight: 600, fontSize: "0.75rem" }}>{r.table}</span></td>
                              <td style={{ padding: "0.75rem 0.8rem", color: "#64748B", textAlign: "center" }}>{r.guests}</td>
                              <td style={{ padding: "0.75rem 0.8rem" }}><StatusBadge status={r.status} /></td>
                              <td style={{ padding: "0.75rem 0.8rem", color: "#64748B", fontSize: "0.72rem", maxWidth: "120px", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{r.note || "—"}</td>
                              <td style={{ padding: "0.75rem 0.8rem", color: r.preOrder ? "#16A34A" : "#CBD5E1", fontWeight: r.preOrder ? 700 : 400 }}>{r.preOrder ? `${r.preOrder}₼` : "—"}</td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                      {filtered.length === 0 && (
                        <div style={{ padding: "3rem", textAlign: "center", color: "#94A3B8" }}>
                          <div style={{ fontSize: "2rem", marginBottom: "0.5rem" }}>🔍</div>
                          <div style={{ fontSize: "0.9rem", fontWeight: 600 }}>Nəticə tapılmadı</div>
                          <div style={{ fontSize: "0.78rem", marginTop: "0.3rem" }}>Filtrləri dəyişdirməyi sınayın</div>
                        </div>
                      )}
                    </div>
                  </div>

                  {/* Detail panel */}
                  {selectedRes && (
                    <div style={{ width: "300px", background: "#fff", borderRadius: "14px", border: "1px solid #E2E8F0", flexShrink: 0, overflow: "hidden", display: "flex", flexDirection: "column" }}>
                      <div style={{ padding: "1rem 1.2rem", borderBottom: "1px solid #F1F5F9", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                        <div style={{ fontWeight: 700, fontSize: "0.9rem" }}>Detallar</div>
                        <button onClick={() => setSelectedRes(null)} style={{ background: "none", border: "none", cursor: "pointer", fontSize: "1.1rem", color: "#94A3B8" }}>✕</button>
                      </div>
                      <div style={{ padding: "1.2rem", flex: 1, overflowY: "auto" }}>
                        <div style={{ marginBottom: "1rem" }}>
                          <div style={{ fontWeight: 800, fontSize: "1.1rem", marginBottom: "0.2rem" }}>{selectedRes.name}</div>
                          <div style={{ fontSize: "0.75rem", color: "#94A3B8", marginBottom: "0.5rem" }}>{selectedRes.id}</div>
                          <StatusBadge status={selectedRes.status} />
                        </div>

                        {[
                          ["📞 Telefon", selectedRes.phone],
                          ["📅 Tarix", selectedRes.date],
                          ["⏰ Saat", selectedRes.time],
                          ["🪑 Masa", `Masa ${selectedRes.table}`],
                          ["👥 Qonaq", `${selectedRes.guests} nəfər`],
                          ["💰 Ön sifariş", selectedRes.preOrder ? `${selectedRes.preOrder}₼` : "Yoxdur"],
                        ].map(([k, v]) => (
                          <div key={k} style={{ padding: "0.65rem 0", borderBottom: "1px solid #F8FAFC", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                            <span style={{ fontSize: "0.75rem", color: "#94A3B8" }}>{k}</span>
                            <span style={{ fontSize: "0.8rem", fontWeight: 600 }}>{v}</span>
                          </div>
                        ))}

                        {selectedRes.note && (
                          <div style={{ marginTop: "1rem", background: "#FFFBEB", border: "1px solid #FDE68A", borderRadius: "8px", padding: "0.75rem" }}>
                            <div style={{ fontSize: "0.65rem", fontWeight: 700, color: "#92400E", textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: "0.3rem" }}>Qeyd</div>
                            <div style={{ fontSize: "0.78rem", color: "#78350F" }}>{selectedRes.note}</div>
                          </div>
                        )}

                        {/* Status update */}
                        <div style={{ marginTop: "1.2rem" }}>
                          <div style={{ fontSize: "0.65rem", fontWeight: 700, color: "#94A3B8", textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: "0.6rem" }}>Status dəyiş</div>
                          <div style={{ display: "flex", flexDirection: "column", gap: "0.4rem" }}>
                            {["təsdiqləndi","gözlənilir","gəldi","ləğv edildi"].map(s => {
                              const c = STATUS_COLORS[s];
                              const isActive = selectedRes.status === s;
                              return (
                                <button key={s} className="btn"
                                  onClick={() => updateStatus(selectedRes.id, s)}
                                  style={{ padding: "0.55rem 0.8rem", borderRadius: "8px", border: `1px solid ${isActive ? c.border : "#E2E8F0"}`, background: isActive ? c.bg : "#fff", color: isActive ? c.text : "#64748B", fontFamily: "inherit", fontSize: "0.78rem", fontWeight: isActive ? 700 : 500, textAlign: "left", display: "flex", alignItems: "center", gap: "0.5rem" }}>
                                  {isActive ? "✓ " : ""}{s}
                                </button>
                              );
                            })}
                          </div>
                        </div>
                      </div>
                    </div>
                  )}
                </div>
              )}

              {/* ── TABLES ── */}
              {page === "tables" && (
                <div>
                  <div style={{ marginBottom: "1.5rem" }}>
                    <div style={{ fontSize: "1.4rem", fontWeight: 800, letterSpacing: "-0.02em", marginBottom: "0.2rem" }}>Masalar</div>
                    <div style={{ fontSize: "0.8rem", color: "#94A3B8" }}>Bugünkü masa vəziyyəti və rezervasiyalar</div>
                  </div>
                  <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(280px, 1fr))", gap: "1rem" }}>
                    {tableStatus.map(t => {
                      const upcoming = t.bookings.sort((a, b) => a.time.localeCompare(b.time));
                      return (
                        <div key={t.label} className="card-hover" style={{ background: "#fff", borderRadius: "14px", border: `2px solid ${t.busy ? "#FECACA" : "#86EFAC"}`, overflow: "hidden" }}>
                          <div style={{ padding: "1rem 1.2rem", background: t.busy ? "#FEF2F2" : "#F0FDF4", borderBottom: "1px solid " + (t.busy ? "#FECACA" : "#86EFAC"), display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                            <div>
                              <div style={{ fontWeight: 800, fontSize: "1.1rem", color: t.busy ? "#DC2626" : "#16A34A" }}>Masa {t.label}</div>
                              <div style={{ fontSize: "0.72rem", color: "#64748B" }}>{t.zone} · {t.seats} nəfərlik</div>
                            </div>
                            <div style={{ fontSize: "1.8rem" }}>{t.busy ? "🔴" : "🟢"}</div>
                          </div>
                          <div style={{ padding: "1rem 1.2rem" }}>
                            {upcoming.length === 0 ? (
                              <div style={{ color: "#94A3B8", fontSize: "0.8rem", textAlign: "center", padding: "0.5rem 0" }}>Bu gün boşdur</div>
                            ) : upcoming.map(r => (
                              <div key={r.id} style={{ marginBottom: "0.6rem", padding: "0.65rem", background: "#F8FAFC", borderRadius: "8px", border: "1px solid #E2E8F0" }}>
                                <div style={{ display: "flex", justifyContent: "space-between", marginBottom: "0.25rem" }}>
                                  <span style={{ fontWeight: 600, fontSize: "0.82rem" }}>{r.name}</span>
                                  <span style={{ fontSize: "0.72rem", color: "#64748B" }}>⏰ {r.time}</span>
                                </div>
                                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                                  <span style={{ fontSize: "0.72rem", color: "#64748B" }}>{r.guests} nəfər</span>
                                  <StatusBadge status={r.status} />
                                </div>
                              </div>
                            ))}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}

              {/* ── SETTINGS ── */}
              {page === "settings" && (
                <div style={{ maxWidth: "560px" }}>
                  <div style={{ marginBottom: "1.5rem" }}>
                    <div style={{ fontSize: "1.4rem", fontWeight: 800, letterSpacing: "-0.02em", marginBottom: "0.2rem" }}>Tənzimləmələr</div>
                    <div style={{ fontSize: "0.8rem", color: "#94A3B8" }}>Restoran məlumatları</div>
                  </div>

                  {/* Plan card */}
                  <div style={{ background: "linear-gradient(135deg, #0F172A, #1E3A5F)", borderRadius: "14px", padding: "1.5rem", marginBottom: "1.5rem", color: "#fff" }}>
                    <div style={{ fontSize: "0.65rem", letterSpacing: "0.15em", textTransform: "uppercase", color: "#60A5FA", marginBottom: "0.5rem" }}>Aktiv plan</div>
                    <div style={{ fontSize: "1.8rem", fontWeight: 800, marginBottom: "0.3rem" }}>Pro Plan</div>
                    <div style={{ fontSize: "0.8rem", color: "#94A3B8", marginBottom: "1rem" }}>15 Mart 2025-ə qədər aktiv</div>
                    <div style={{ display: "flex", gap: "1rem", flexWrap: "wrap" }}>
                      {["✓ Limitsiz rezervasiya", "✓ Masa idarəetməsi", "✓ Ön sifariş", "✓ SMS bildiriş"].map(f => (
                        <span key={f} style={{ fontSize: "0.75rem", color: "#CBD5E1" }}>{f}</span>
                      ))}
                    </div>
                    <button className="btn" style={{ marginTop: "1.2rem", background: "#3B82F6", color: "#fff", border: "none", borderRadius: "8px", padding: "0.6rem 1.2rem", fontFamily: "inherit", fontSize: "0.82rem", fontWeight: 700 }}>
                      Planı yenilə →
                    </button>
                  </div>

                  {/* Info form */}
                  <div style={{ background: "#fff", borderRadius: "14px", border: "1px solid #E2E8F0", overflow: "hidden" }}>
                    <div style={{ padding: "1rem 1.2rem", borderBottom: "1px solid #F1F5F9", fontWeight: 700, fontSize: "0.9rem" }}>Restoran məlumatları</div>
                    <div style={{ padding: "1.2rem" }}>
                      {[
                        { label: "Restoran adı", value: RESTAURANT.name },
                        { label: "Ünvan", value: RESTAURANT.address },
                        { label: "Telefon", value: RESTAURANT.phone },
                        { label: "Email", value: RESTAURANT.email },
                      ].map(f => (
                        <div key={f.label} style={{ marginBottom: "1rem" }}>
                          <label style={{ fontSize: "0.68rem", fontWeight: 600, letterSpacing: "0.1em", textTransform: "uppercase", color: "#94A3B8", display: "block", marginBottom: "0.4rem" }}>{f.label}</label>
                          <input defaultValue={f.value}
                            style={{ width: "100%", border: "1px solid #E2E8F0", borderRadius: "8px", padding: "0.7rem 0.9rem", fontSize: "0.88rem", outline: "none", color: "#0F172A" }} />
                        </div>
                      ))}
                      <button className="btn" style={{ background: "#0F172A", color: "#fff", border: "none", borderRadius: "8px", padding: "0.75rem 1.5rem", fontFamily: "inherit", fontSize: "0.85rem", fontWeight: 700, marginTop: "0.5rem" }}>
                        Saxla
                      </button>
                    </div>
                  </div>
                </div>
              )}

            </main>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
